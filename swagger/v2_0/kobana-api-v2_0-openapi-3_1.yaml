    v2_dda_bank_billet:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: 'Identificador único do boleto DDA (UUID). Utilize este valor para consultar, liberar ou rejeitar o boleto via API.'
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        status:
          type: string
          readOnly: true
          enum:
            - pending
            - released
            - rejected
            - paid
          description: 'Status interno do boleto DDA na plataforma Kobana. Representa o fluxo de aprovação pelo cliente: `pending` (disponível para ação: liberar ou rejeitar), `released` (liberado pelo cliente para pagamento — campo `released_at` preenchido), `rejected` (rejeitado pelo cliente — transição irreversível — campo `rejected_at` preenchido), `paid` (pago via Kobana — campo `payment_uid` preenchido).'
          example: pending
        external_status:
          type: string
          nullable: true
          readOnly: true
          enum:
            - open
            - overdue
            - paid
            - canceled
            - downloaded
            - blocked
          description: 'Status externo do boleto informado pelo provedor. Completamente independente do campo `status` e pode mudar a qualquer momento via sincronização. `open` (em aberto, disponível para pagamento), `overdue` (vencido — podem incidir juros e multa), `paid` (pago confirmado pelo banco — pode ocorrer antes ou independente de `status: paid`), `canceled` (cancelado pelo beneficiário ou banco), `downloaded` (baixado — equivale a pago para fins de processamento interno), `blocked` (bloqueado — o boleto foi criado, mas ainda não está disponível para pagamento).'
          example: open
        barcode:
          type: string
          nullable: true
          readOnly: true
          description: Código de barras do boleto (44 dígitos). Pode ser nulo quando o boleto ainda está em fase de sincronização inicial.
          example: '34193497900000150001740000000148050088825000'
        line:
          type: string
          nullable: true
          readOnly: true
          description: Linha digitável do boleto — representação formatada do código de barras para digitação manual. Pode ser nula durante sincronização inicial.
          example: 34191.74001 00000.148050 08882.500009 3 49790000015000
        our_number:
          type: string
          nullable: true
          readOnly: true
          description: Nosso número atribuído pelo banco emissor. Identificador único do boleto no sistema bancário do beneficiário.
          example: '123556238'
        description:
          type: string
          nullable: true
          readOnly: true
          description: Descrição ou instruções do boleto informadas pelo beneficiário (cedente).
          example: Pagamento de serviço
        nominal_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor original (face) do boleto em reais (BRL), sem acréscimos ou descontos. Pode diferir do `amount` após o vencimento quando juros/multa são aplicados.'
          example: 150
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor atualizado do boleto em reais (BRL), já considerando juros, multa, descontos e abatimentos aplicáveis. Pode diferir do `nominal_amount` após o vencimento.'
          example: 76
        min_payment_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor mínimo aceito para pagamento do boleto em reais (BRL). Relevante quando `allow_parcial_payment` é `true`.
          example: 10
        max_payment_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor máximo aceito para pagamento do boleto em reais (BRL).
          example: 200
        expire_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data de vencimento do boleto (formato ISO 8601: AAAA-MM-DD). Após essa data, podem incidir juros e multa conforme configurado pelo beneficiário.'
          example: '2026-04-01'
        issue_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data de emissão do boleto pelo beneficiário (formato ISO 8601: AAAA-MM-DD).'
          example: '2026-03-04'
        reference_month:
          type: string
          nullable: true
          readOnly: true
          enum:
            - january
            - february
            - march
            - april
            - may
            - june
            - july
            - august
            - september
            - october
            - november
            - december
          description: 'Mês de referência/competência do boleto (ex: mês do serviço cobrado). Valores em inglês.'
          example: march
        beneficiary_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome ou razão social do beneficiário (cedente) — empresa ou pessoa que emitiu o boleto e receberá o pagamento.
          example: Kobana Tecnologia Ltda.
        beneficiary_cnpj_cpf:
          type: string
          nullable: true
          readOnly: true
          description: CPF ou CNPJ do beneficiário (cedente).
          example: 05.813.794/0001-26
        beneficiary_bank_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome do banco onde o beneficiário possui conta para recebimento.
          example: Banco do Brasil
        beneficiary_bank_number:
          type: string
          nullable: true
          readOnly: true
          description: 'Código COMPE (3 dígitos) do banco do beneficiário. Ex: `001` (Banco do Brasil), `341` (Itaú), `237` (Bradesco).'
          example: '001'
        owner_cnpj_cpf:
          type: string
          nullable: true
          readOnly: true
          description: CPF ou CNPJ do pagador (sacado). Corresponde ao CNPJ/CPF cadastrado na conta DDA.
          example: 83.191.445/0001-23
        owner_person_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome ou razão social do pagador (sacado) — empresa ou pessoa em cujo nome o boleto foi emitido.
          example: Empresa Pagadora S.A.
        fine_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo da multa por atraso em reais (BRL). Aplicável após a `fine_date`.
          example: 2.4
        fine_percentage:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Percentual da multa por atraso sobre o valor do boleto. Aplicável após a `fine_date`.
          example: 2.4
        fine_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data a partir da qual a multa por atraso passa a ser cobrada (formato ISO 8601).
          example: '2026-04-02'
        interest_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo de juros por dia de atraso em reais (BRL). Aplicável após a `interest_date`.
          example: 2.4
        interest_percentage:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Percentual de juros por dia/mês de atraso. Aplicável após a `interest_date`.
          example: 2.4
        interest_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data a partir da qual os juros por atraso passam a incidir (formato ISO 8601).
          example: '2026-04-03'
        discount_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo de desconto para pagamento antecipado em reais (BRL). Válido até a `discount_date`.
          example: 5
        discount_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data limite para obter o desconto por pagamento antecipado (formato ISO 8601). Após essa data, o desconto não se aplica.'
          example: '2026-03-31'
        reduction_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor do abatimento concedido pelo beneficiário em reais (BRL). Diferente do desconto, o abatimento reduz o valor total independente da data de pagamento.'
          example: 0
        allow_parcial_payment:
          type: boolean
          nullable: true
          readOnly: true
          description: 'Indica se o boleto aceita pagamento parcial (valor inferior ao total). Quando `true`, o pagamento pode ser feito com valor entre `min_payment_amount` e `max_payment_amount`.'
          example: false
        released_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto foi liberado para pagamento pelo cliente. Preenchido apenas quando `status` é `released` ou `paid`.
        rejected_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto foi rejeitado pelo cliente. Preenchido apenas quando `status` é `rejected`.
        payment_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: UUID do pagamento Kobana vinculado a este boleto DDA. Permite rastrear o pagamento originado a partir deste boleto. Preenchido quando o boleto é associado a um pagamento via API.
        dda_account_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: 'UUID da conta DDA (Dda::Account) que originou este boleto. Permite atribuir cada boleto à sua conta DDA quando a conta macro possui múltiplas contas DDA (CNPJs distintos). Nulo para registros legados ainda não backfillados.'
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto DDA foi recebido e registrado na plataforma Kobana.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: 'Data e hora (ISO 8601) da última atualização deste boleto (alteração de status, sincronização de dados, etc.).'
    v2_payment_account:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: UUID da conta de pagamento
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        financial_account_uid:
          type: string
          readOnly: true
          description: UUID da conta financeira associada
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        connection_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: Conexão bancária da conta.
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        agreement_code:
          type: string
          nullable: true
          description: Código do convênio
          example: '123456'
        provider_data:
          type: object
          nullable: true
          description: Dados específicos do provider.
          properties:
            service_point_number:
              type: string
              nullable: true
              description: Número do ponto de atendimento. Envie `null` para limpar o valor.
              example: '0001'
            cooperative_cnpj:
              type: string
              nullable: true
              description: CNPJ da cooperativa Sicoob do titular da conta. Envie `null` para limpar o valor.
              examples:
                - 13.009.717/0001-46
                - '13009717000146'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        balance_validation_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a validação de saldo foi habilitada
        remittance_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a remessa EDI foi habilitada
        remittance_enabled:
          type: boolean
          writeOnly: true
          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_new_payment_account:
      type: object
      description: Cria uma conta de pagamento sob uma conta financeira.
      required:
        - financial_account_uid
      properties:
        financial_account_uid:
          type: string
          description: UUID da Conta Financeira que receberá a nova conta de pagamento
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        agreement_code:
          type: string
          nullable: true
          description: Código do convênio (até 30 caracteres)
          example: '123456'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        remittance_enabled:
          type: boolean
          nullable: true
          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        provider_data:
          type: object
          nullable: true
          description: Atributos específicos do provider bancário.
          properties:
            service_point_number:
              type: string
              nullable: true
              description: 'Número do ponto de atendimento (ex.: `numeroPa` no Sicoob).'
              example: '0001'
            cooperative_cnpj:
              type: string
              nullable: true
              description: CNPJ da cooperativa Sicoob do titular da conta.
              example: 13.009.717/0001-46
    v2_payment_bank_billet:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pagamento
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        kind:
          type: string
          readOnly: true
          enum:
            - bank_billet
            - darf
            - utility
            - gru
            - pix
            - tax
          description: Tipo do Pagamento
          example: pix
        amount:
          type: number
          readOnly: true
          format: float
          example: 120.99
          description: |
            Quantia
        scheduled_to:
          type: string
          readOnly: true
          nullable: true
          format: date
          example: '2023-12-12'
          description: Data de Agendamento
        status:
          readOnly: true
          type: string
          description: |
            Status do Pagamento.

            `pending`: Pendente.
            `rejected`: Rejeitado.
            `approved`: Aprovado.
            `reproved`: Reprovado.
            `failed`: Falha.
            `confirmed`: Confirmado.
            `canceled`: Cancelado.
            `awaiting_approval`: Aguardando Aprovação.
            `scheduled`: Agendado.
            `awaiting_scheduled_date`: Aguardando Data Agendada.
            `overdue`: Vencido.
            `awaiting_funds`: Aguardando Saldo.
            `finishing`: Finalizando
        registration_status:
          readOnly: true
          type: string
          description: |
            Status de Registro.

            `pending`: Pendente.
            `requested`: Requisitado.
            `confirmed`: Confirmado.
            `rejected`: Rejeitado.
            `failed`: Falha
        confirmed_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data em que a Kobana processou a confirmação da operação. Não representa necessariamente a data em que o valor saiu da conta — para isso use transaction_date.
        rejected_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Rejeição
        rejected_error:
          type: string
          readOnly: true
          nullable: true
          description: Motivo da rejeição retornado pelo banco
        transaction_code:
          readOnly: true
          nullable: true
          type: string
          description: Código de Autenticação
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        transaction_date:
          readOnly: true
          nullable: true
          type: string
          format: date-time
          description: Data oficial da liquidação/débito informada pelo banco (data da autenticação). Reflete quando o valor efetivamente saiu da conta.
          example: '2023-12-12'
        financial_account_uid:
          type: string
          readOnly: true
          format: uuid
          description: UID da Conta Financeira de Origem
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payment_account_uid:
          type: string
          readOnly: true
          nullable: true
          format: uuid
          description: 'Conta de pagamento de origem. Quando não informada na criação, usou-se automaticamente a mais antiga da conta financeira.'
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        batch_uid:
          type: string
          readOnly: true
          nullable: true
          format: uuid
          description: UID do Lote ao qual este pagamento pertence
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        external_id:
          type: string
          nullable: true
          example: 123456-abc-789
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          items:
            type: string
            example: tag1
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem do Pagamento.

            `api`: API.
            `dda`: DDA.
            `view`: Manual
        beneficiary:
          readOnly: true
          nullable: true
          type: object
          description: Dados do Beneficiário (quando disponível)
          properties:
            name:
              type: string
              nullable: true
              description: Nome ou Razão Social do Beneficiário
              example: João da Silva
            document_number:
              type: string
              nullable: true
              description: CPF ou CNPJ do Beneficiário
              example: 111.321.322-09
        bank_billet:
          type: object
          description: Dados do boleto a ser pago.
          properties:
            code:
              type: string
              readOnly: true
              description: Código de Barras ou Linha Digitável
            beneficiary:
              type: object
              description: Dados do Beneficiário
              properties:
                document_number:
                  type: string
                  nullable: true
                  readOnly: true
                  description: Número do Documento (CPF ou CNPJ)
                  example: 111.321.322-09
                name:
                  type: string
                  nullable: true
                  readOnly: true
                  description: Nome Completo ou Razão Social
                  example: João da Silva
        formats:
          readOnly: true
          nullable: true
          type: object
          description: URLs do comprovante de pagamento (disponível após confirmação)
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  nullable: true
                  description: URL HTML do comprovante
                png:
                  type: string
                  nullable: true
                  description: URL PNG do comprovante
                pdf:
                  type: string
                  nullable: true
                  description: URL PDF do comprovante
        identifier:
          type: string
          nullable: true
          description: |
            Identificação do pagamento no comprovante do provedor financeiro. (Uso exclusivo do banco)

            Bancos que aceitam esse campo (via API): Itaú
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro no banco de dados
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro no banco de dados
      required:
        - bank_billet
