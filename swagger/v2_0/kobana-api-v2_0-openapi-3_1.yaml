          type: object
          nullable: true
          readOnly: true
          description: Configurações da conta Pix
        validated_at:
          type: string
          nullable: true
          format: date_time
          readOnly: true
          description: Data de validação da conta Pix
        enabled_at:
          type: string
          nullable: true
          format: date_time
          readOnly: true
          description: Data de habilitação da conta Pix
