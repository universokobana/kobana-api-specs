          example: 2.5
        reduction_type:
          type: integer
          writeOnly: true
          enum:
            - 1
            - 2
            - 3
          description: |-
            Tipo de abatimento:
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                * `3` Não se aplica — remove o abatimento (`none`)
