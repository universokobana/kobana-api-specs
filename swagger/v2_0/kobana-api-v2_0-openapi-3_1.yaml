            * `individual` Pessoa Física
            * `juridical` Pessoa Jurídica
          enum:
            - individual
            - juridical
        customer_mobile_local_code:
          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
