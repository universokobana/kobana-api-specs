                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-06-29T21:46:27+07:00'
                    updated_at: '2026-06-29T21:46:27+07:00'
                    pix:
                      qrcode: 00020126330014br.gov.bcb.pix01111335366962052040000530398654040
                      beneficiary:
                        name: Margret Santos LTDA
                        document_number: 34.414.342/0000-99
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    $ref: '#/components/schemas/v2_payment_command'
