  '/v2/charge/automatic_pix/recurrences/{recurrence_uid}/pix':
    post:
      summary: Criar nova cobrança PIX automática
      tags:
        - Pix Automático - Cobrança
      security:
        - bearerAuth: []
      description: Cria uma nova cobrança PIX automática para uma recorrência.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: recurrence_uid
          in: path
          required: true
          description: UID da recorrência PIX automática
          example: 9e45d2e2-90b7-4908-a013-1e5ea23e5a00
          schema:
            type: string
      responses:
        '201':
          description: Cobrança PIX automática criada com txid personalizado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019d41ad-6b44-73be-bc24-eff05a7ec975
                  automatic_pix_recurrence_uid: 019d41ad-6b01-75f3-bca5-67d2c259f451
                  financial_account_uid: 019d41ad-6b20-70d0-9879-fda59f7799fd
                  txid: BSCustomValue12345678901234567
                  additional_info: null
                  expire_at: '2026-04-30'
                  amount: 15000
                  next_business_day: false
                  retry_policy: allow_3r7d
                  financial_provider_created_at: null
                  financial_provider_status: pending
                  financial_provider_status_updates: []
                  debtor:
                    email: null
                    address: null
                  recipient_financial_account:
                    kind: checking
                    account_number: '12345'
                    agency_number: '1234'
                    bank:
                      number: '001'
                      ispb_number: '00000000'
                      name: BANCO DO BRASIL S.A.
                    person_info:
                      document_type: CPF
                      document_number: 636.947.809-12
                      kind: natural
                      name: João Silva
                  retries: []
                  cancellation: null
                  rejection: null
                  received_pix: []
                  external_id: null
                  custom_data: {}
                  tags: []
                  created_at: '2026-03-31T04:16:17+02:00'
                  updated_at: '2026-03-31T04:16:17+02:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `201`.'
                    example: 201
                  data:
                    $ref: '#/components/schemas/v2_automatic_pix_pix_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: ID Externo duplicado
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: external_id
                    detail: External já existe para esta conta
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                financial_account_uid:
                  type: string
                  description: UID da conta financeira.
                amount:
                  type: number
                  format: float
                  description: Valor da cobrança.
                retry_policy:
                  type: string
                  enum:
                    - disallow
                    - allow_3r7d
                  description: Política de retentativa.
                next_business_day:
                  type: boolean
                  description: Se deve considerar próximo dia útil.
                expire_at:
                  type: string
                  format: datetime
                  description: Data de expiração da cobrança.
                additional_info:
                  type: string
                  description: Informações adicionais da cobrança.
                  nullable: true
                txid:
                  type: string
                  description: Identificador da transação (opcional; gerado automaticamente se omitido).
                  nullable: true
                debtor:
                  type: object
                  description: Dados adicionais do devedor
                  properties:
                    email:
                      type: object
                      properties:
                        address:
                          type: string
                          description: Endereço de email.
                    address:
                      type: object
                      properties:
                        street:
                          type: string
                          description: Logradouro.
                        number:
                          type: string
                          description: Número.
                        complement:
                          type: string
                          description: Complemento.
                        neighborhood:
                          type: string
                          description: Bairro.
                        state:
                          type: string
                          description: Estado (UF).
                        city_name:
                          type: string
                          description: Nome da cidade.
                        zip_code:
                          type: string
                          description: CEP.
                recipient_financial_account:
                  type: object
                  description: Conta financeira do recebedor
                  properties:
                    kind:
                      type: string
                      enum:
                        - checking
                        - savings
                        - payment
                      description: Tipo de conta
                    account_number:
                      type: string
                      description: Número da conta
                    agency_number:
                      type: string
                      description: Número da agência
                    bank:
                      type: object
                      properties:
                        ispb_number:
                          type: string
                          description: Código ISPB do banco
                    person_info:
                      type: object
                      properties:
                        document_type:
                          type: string
                          enum:
                            - CPF
                            - CNPJ
                          description: Tipo do documento
                        document_number:
                          type: string
                          description: Número do documento do titular
                        kind:
                          type: string
                          enum:
                            - natural
                            - juridical
                          description: Tipo de pessoa
                        name:
                          type: string
                          description: Nome do titular
                  required:
                    - kind
                    - account_number
                    - agency_number
                    - bank
                    - person_info
              required:
