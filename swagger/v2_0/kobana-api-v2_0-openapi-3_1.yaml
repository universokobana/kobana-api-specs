                    - tag2
                  validated_at: null
                  enabled_at: null
                  created_at: '2026-05-21T03:32:58+03:00'
                  updated_at: '2026-05-21T03:32:58+03:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  data:
                    $ref: '#/components/schemas/v2_automatic_pix_account_object'
        '401':
          description: Falha de autenticação
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Dados inválidos
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: financial_account
                    detail: Conta Financeira é obrigatório(a)
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_new_automatic_pix_account'
