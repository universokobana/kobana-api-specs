          nullable: true
          description: ID da Notificação
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Enviado para o Servidor de E-mail
            * `failed` Falha no Envio para o Servidor de E-mail
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - read
            - clicked
        status_occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que o status ocorreu.
        last_clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado pela última vez.
        last_read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido pela última vez.
        clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado.
        click_count:
          type: integer
          description: Quantidade que foi clicado.
        read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido.
        read_count:
          type: integer
          description: Quantidade que foi lido.
        subject:
          type: string
          nullable: true
          description: Assunto do email
        email_account_id:
          type: integer
          nullable: true
          description: ID da conta de e-email
        email_template_id:
          type: integer
          nullable: true
          description: ID template de e-email
        bank_billet_in_pdf:
          type: boolean
          description: Indicativo se boleto em pdf
