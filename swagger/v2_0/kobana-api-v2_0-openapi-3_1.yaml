components:
  schemas:
    v2_error:
      type: object
      required:
        - status
        - errors
      properties:
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: 'Status HTTP do erro. Ex: `400`.'
          examples:
            - 400
            - 401
            - 422
            - 500
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              title:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
                examples:
                  - Token de API inválido
                  - Parâmetro obrigatório
              code:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Código do erro. Ex: `validation_error`.'
                examples:
                  - validation_error
                  - authentication_error
                  - not_found
              param:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Nome do parâmetro que falhou a validação. Ex: `amount`.'
                examples:
                  - amount
                  - customer_email
                  - expire_at
              detail:
                anyOf:
                  - type: string
                  - type: 'null'
                  - type: object
                description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
                examples:
                  - não pode ficar em branco
                  - deve ser um email válido
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      anyOf:
                        - type: string
                        - type: 'null'
                    code:
                      anyOf:
                        - type: string
                        - type: 'null'
                    param:
                      anyOf:
                        - type: string
                        - type: 'null'
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                        - type: object
                  additionalProperties: false
                description: Erros aninhados
            additionalProperties: false
      additionalProperties: false
    v2_pagination:
      type: object
      required:
        - page
      properties:
        prev_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da página anterior.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=1'
            - null
        next_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da próxima página.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=3'
            - null
        page:
          type: integer
          minimum: 1
          description: Número da página atual.
          examples:
            - 1
            - 2
            - 10
      additionalProperties: false
    v2_pix_command:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        uid:
          type: string
          format: uuid
          readOnly: true
          description: 'Identificador público (UUID) do Comando. Utilizado como parâmetro na consulta individual (`GET /commands/{uid}`).'
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
            `destroy`: Exclusão do registro.
        resource_type:
          type: string
          readOnly: true
          nullable: true
          description: 'Tipo do recurso ao qual o Comando pertence (ex.: `BankBillet`, `Pix`, `Financial::Account`).'
        resource_uid:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Identificador público (UUID) do recurso ao qual o Comando pertence.
        financial_provider_slug:
          type: string
          readOnly: true
          nullable: true
          description: Slug do provedor financeiro (banco) responsável pela execução do Comando.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        confirmation_via:
          type: string
          enum:
            - api
            - edi
          readOnly: true
          nullable: true
          description: |
            Origem da confirmação do Comando.

            `api`: confirmado via resposta da API do banco (inclui webhooks, Recuperator e sync).
            `edi`: confirmado via retorno CNAB (arquivo de baixa).
            `null`: Sem origem registrada.
        pix:
          $ref: '#/components/schemas/v2_pix'
    v2_pix:
      type: object
      required:
        - amount
        - pix_account_uid
        - expire_at
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID do Pix (DEPRECATED: use uid)'
          example: 123
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pix
          examples:
            - 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
          description: Quantia em reais
          examples:
            - 120.99
            - 50
            - 1000.5
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          enum:
            - opened
            - paid
            - overdue
            - canceled
            - generation_failed
          description: |
            Status do Pix.

            * `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            * `paid`: Cobrança Pix paga.
            * `overdue`: Cobrança Pix em atraso.
            * `canceled`: Cobrança Pix cancelada.
            * `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
          examples:
            - opened
            - paid
            - canceled
        pix_account_id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID da Conta Pix (DEPRECATED: use pix_account_uid)'
          example: 456
        pix_account_uid:
          type: string
          format: uuid
          description: UID da Conta Pix
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        txid:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 35
            - type: 'null'
