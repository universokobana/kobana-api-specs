                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-05-21T03:34:00+03:00'
                    updated_at: '2026-05-21T03:34:00+03:00'
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    $ref: '#/components/schemas/v2_payment_command'
