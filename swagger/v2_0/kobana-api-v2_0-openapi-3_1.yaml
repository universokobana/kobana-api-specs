              properties:
                name:
                  type: string
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  description: CPF/CNPJ do beneficiário
                  example: 123.456.789-00
            identifier:
              type: string
              nullable: true
              description: |
                Identificação da transferência no comprovante do provedor financeiro. (Uso exclusivo do banco)

                Bancos que aceitam esse campo (via API): Itaú
            kind:
              type: string
              enum:
                - internal
              description: Tipo da transferência (deve ser "internal")
            internal:
              type: object
              required:
                - data
              description: Dados específicos da conta destino (dados dentro de data)
              properties:
                data:
                  type: object
                  required:
                    - agency_number
