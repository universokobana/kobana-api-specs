          nullable: true
          example: '2024-01-01T00:00:00Z'
        financial_provider_external_id:
          type: string
          nullable: true
          example: provider_loc_123
        external_id:
          type: string
          nullable: true
          example: location_123
        tags:
          type: array
          items:
            type: string
          nullable: true
          example:
            - tag1
            - tag2
        tag_list:
