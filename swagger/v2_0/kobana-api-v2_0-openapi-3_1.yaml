                        description: Número da Agência
                      agency_digit:
                        type: string
                        description: Dígito da Agência
                      account_number:
                        type: string
                        description: Número da Conta
                      account_digit:
                        type: string
                        description: Dígito da Conta
              - type: object
                required:
                  - uid
                description: Transferência existente.
                properties:
                  uid:
                    type: string
                    format: uuid
                    description: UID de uma Transferência
                    example: 018df180-7208-727b-a10a-ea545e4a75a8
