            * `mailbox.entry.file.received` Arquivo recebido na caixa de entrada.
            * `mailbox.entry.file.sent` Arquivo enviado para a caixa de saída.
            * `mailbox.file.db.created` Arquivo criado.
            * `mailbox.file.db.updated` Arquivo atualizado.
            * `mailbox.file.db.deleted` Arquivo excluído.
            * `mailbox.channel.s3.db.created` Canal S3 criado.
            * `mailbox.channel.s3.db.updated` Canal S3 atualizado.
            * `mailbox.channel.s3.db.deleted` Canal S3 excluído.
            * `mailbox.channel.s3.fetch_all` Arquivo obtido do canal S3.
            * `mailbox.channel.email.db.created` Canal de Email criado.
            * `mailbox.channel.email.db.updated` Canal de Email atualizado.
            * `mailbox.channel.email.db.deleted` Canal de Email excluído.
            * `mailbox.channel.whatsapp.db.created` Canal WhatsApp criado.
            * `mailbox.channel.whatsapp.db.updated` Canal WhatsApp atualizado.
            * `mailbox.channel.whatsapp.db.deleted` Canal WhatsApp excluído.
            * `mailbox.channel.sftp.db.created` Canal SFTP criado.
            * `mailbox.channel.sftp.db.updated` Canal SFTP atualizado.
            * `mailbox.channel.sftp.db.deleted` Canal SFTP excluído.
            * `mailbox.channel.sftp.fetch_all` Arquivo obtido do canal SFTP.
            * `mailbox.channel.syncthing.db.created` Canal Syncthing criado.
            * `mailbox.channel.syncthing.db.updated` Canal Syncthing atualizado.
            * `mailbox.channel.syncthing.db.deleted` Canal Syncthing excluído.
            * `email_account.db.created` Conta de e-mail criada.
            * `email_account.db.updated` Conta de e-mail atualizada.
            * `email_account.db.deleted` Conta de e-mail excluída.
            * `email_account.identity.pending` Aguardando identidade
            * `email_account.identity.created` Identidade criada
            * `email_account.identity.error` Identidade já existente
            * `email_account.identity.failure` Falha da identidade
            * `email_account.dns.not_ready` DNS não pronto
            * `email_account.dns.awaiting` Aguardando validação DNS
            * `email_account.dns.validated` DNS validado
            * `email_account.dns.error` Falha na validação do DNS
            * `email_account.dns.failure` Falha na tentativa do DNS
            * `integration.connection.db.created` Conexão criada.
            * `integration.connection.db.updated` Conexão atualizada.
            * `integration.connection.db.deleted` Conexão excluída.
            * `webhook.db.created` Webhook criado.
            * `webhook.db.updated` Webhook atualizado.
            * `webhook.db.deleted` Webhook excluído.
            * `enotas.nfe.generated` Enotas: nota fiscal gerada
        sent_error:
          type: string
          nullable: true
          maxLength: 255
          description: Erro ocorrido no envio
        email_notification_id:
          type: integer
          nullable: true
          description: ID da Notificação
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Enviado para o Servidor de E-mail
            * `failed` Falha no Envio para o Servidor de E-mail
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - read
            - clicked
        status_occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que o status ocorreu.
        last_clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado pela última vez.
        last_read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido pela última vez.
        clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado.
        click_count:
          type: integer
          description: Quantidade que foi clicado.
        read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido.
        read_count:
          type: integer
          description: Quantidade que foi lido.
        subject:
          type: string
          nullable: true
          description: Assunto do email
        email_account_id:
          type: integer
          nullable: true
          description: ID da conta de e-email
        email_template_id:
          type: integer
          nullable: true
          description: ID template de e-email
        bank_billet_in_pdf:
          type: boolean
          description: Indicativo se boleto em pdf
        bcc:
          type: string
          nullable: true
          description: Lista do destinatários das cópias ocultas
        cc:
          type: string
          nullable: true
          description: Lista do destinatários
        from_address:
          type: string
          nullable: true
          description: Endereço do remetente
        reply_to_address:
          type: string
          nullable: true
          description: Endereço de resposta
    v2_webhook:
      type: object
      required:
        - url
        - events
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook
        uid:
          type: string
          readOnly: true
          description: UID do webhook
        name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome de identificação do webhook
        url:
          type: string
          maxLength: 255
          description: Endereço onde as requisições serão realizadas
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
