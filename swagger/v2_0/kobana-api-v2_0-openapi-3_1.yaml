    patch:
      summary: Atualizar Conta de Pagamento
      tags:
        - Contas de Pagamento
      security:
        - bearerAuth: []
      description: 'Atualiza atributos editáveis de uma conta de pagamento. Aceita `remittance_enabled` (booleano, controla a geração de remessas EDI), `provider_data.service_point_number` (string, ponto de atendimento — por exemplo `numeroPa` no Sicoob) e `provider_data.cooperative_cnpj` (string, CNPJ da cooperativa Sicoob). O corpo aceita PATCH parcial: envie apenas os campos que deseja atualizar.'
      parameters:
        - name: User-Agent
          in: header
          required: false
