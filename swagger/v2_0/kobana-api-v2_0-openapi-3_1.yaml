        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `register`: Registro.
            `cancel`: Cancelamento.
            `update`: Alteração.
            `add`: Inclusão.
            `remove`: Exclusão.
            `approve`: Liberação.
            `reprove`: Rejeição.
            `reschedule`: Reagendamento.
            `add_pix`: Adicionar Pix ao Boleto.
            `protest`: Protesto.
            `unregister`: Desregistro.
            `refund`: Devolução.
            `retry`: Reenvio.
        resource_type:
          type: string
          readOnly: true
          nullable: true
          description: 'Tipo do recurso ao qual o Comando pertence (ex.: `BankBillet`, `Pix`, `Financial::Account`).'
        resource_uid:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Identificador público (UUID) do recurso ao qual o Comando pertence.
        financial_provider_slug:
          type: string
          readOnly: true
          nullable: true
          description: Slug do provedor financeiro (banco) responsável pela execução do Comando.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        confirmation_via:
          type: string
          enum:
            - api
            - edi
          readOnly: true
          nullable: true
          description: |
            Origem da confirmação do Comando.

            `api`: confirmado via resposta da API do banco (inclui webhooks, Recuperator e sync).
            `edi`: confirmado via retorno CNAB (arquivo de baixa).
            `null`: Sem origem registrada.
