    v2_edi_box:
      create:
        type: object
        required:
          - resource
          - account_owner
          - letter_owner
        properties:
          resource:
            type: object
            description: Recurso associado à caixa postal
            required:
              - type
              - uid
            example:
              type: financial.account
              uid: 01948afe-3014-7e81-9a88-badcfc1fd4d6
            properties:
              type:
                type: string
                example: financial.account
                description: |
                  Tipo do Recurso

                  `charge.bank_billet_account`: Carteira de Cobrança
                  `financial.account`: Conta Financeira
              uid:
                type: string
                description: UID do recurso
                example: 01948afe-3014-7e81-9a88-badcfc1fd4d6
          name:
            type: string
            nullable: true
            description: Nome de identificação da caixa postal
          operation:
            type: string
            enum:
              - charge
              - statement
              - payment
            description: |
              Tipo de operação que será trafegada na caixa postal

              `charge`: Cobrança
              `statement`: Extrato
              `payment`: Pagamento
          kind:
