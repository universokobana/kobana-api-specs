        active:
          type: boolean
          nullable: true
          description: 'Define se o webhook estará ativo, recebendo notificações. O valor padrão é `true`.'
          example: null
        ssl_verification_enabled:
          type: boolean
          nullable: true
          description: Define se a verificação SSL está habilitada no webhook.
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts). Se informado, o webhook apenas receberá notificações de eventos relacionados à carteira indicada.'
          example: null
          deprecated: true
        auth_kind:
          type: string
          nullable: true
          enum:
            - none
            - basic_auth
            - bearer
            - api_key
          readOnly: true
          description: 'Tipo de autenticação configurado. Retornado nas respostas. Para configurar, envie o objeto `auth` no body.'
        auth:
          type: object
          nullable: true
          writeOnly: true
          description: Configuração de autenticação do endpoint receptor. Apenas para criação/atualização — não retornado nas respostas.
          properties:
            kind:
              type: string
              enum:
                - none
                - basic_auth
                - bearer
                - api_key
              description: 'Tipo de autenticação: `none`, `basic_auth`, `bearer` ou `api_key`.'
            username:
              type: string
              nullable: true
              description: Usuário (somente `basic_auth`).
            password:
              type: string
              nullable: true
              description: Senha (somente `basic_auth`). Deixe em branco para manter a senha atual.
            token:
              type: string
              nullable: true
              description: Token (somente `bearer`). Deixe em branco para manter o token atual.
            header_name:
              type: string
              nullable: true
              description: 'Nome do header (somente `api_key`). Ex: `X-API-Key`.'
            header_value:
              type: string
              nullable: true
              description: Valor do header (somente `api_key`). Deixe em branco para manter o valor atual.
    v2_bank_billet_query:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: ID único do registro no formato UUID
        status:
          type: string
          readOnly: true
          description: |-
            Situação da consulta:
            * `pending` Pendente (somente quando configurado para não processar automaticamente)
            * `success` Realizada com sucesso
            * `error` Falha na consulta
          enum:
            - pending
            - success
            - error
        error_message:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem de erro quando a consulta é processada mas os dados não são retornados.
        line_or_barcode:
          type: string
          required: true
          writeOnly: true
          description: |-
            Linha Digitável ou Código de Barras, nos formatos:
            Linha Digitável: 34191.79001 01043.510047 91020.150008 7 75870000001000
            Código de Barras: 34197758700000010001790010104351004791020150
        line:
          type: string
          readOnly: true
          description: Linha Digitável
          example: 34191.79001 01043.510047 91020.150008 7 75870000001000
        barcode:
          type: string
          readOnly: true
          description: Código de Barras
          example: '34197758700000010001790010104351004791020150'
        expire_at:
          type: string
          nullable: true
          format: date
          readOnly: true
          description: Data de Vencimento
          example: '2023-10-10'
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor a pagar
          example: 30
        minimum_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor mínimo
          example: 20
        maximum_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor máximo
          example: 50
        original_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor original
          example: 25
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário
          properties:
            document_number:
              type: string
              nullable: true
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: true
              description: Nome Completo ou Razão Social
              example: João da Silva
        guarantor:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário Final
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        guarantor_drawer:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Sacador Avalista
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        payer:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        fine:
          type: object
          nullable: true
          readOnly: true
          description: Multa
          example: '{"amount": 100, "percentage": 2.0}'
        interest:
          type: object
          nullable: true
          readOnly: true
          description: Juros
          example: '{"amount": 50, "percentage": 1.0}'
        discount:
          type: object
          nullable: true
          readOnly: true
          description: Desconto
          example: '{"amount": 200, "percentage": 5.0}'
        external_id:
          type: string
          nullable: true
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          example: null
