      description: 'Retorna informações sobre o usuário autenticado, incluindo dados da conta, usuário e token de acesso.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
      responses:
        '200':
          description: Informações do usuário sem usuário associado ao token
          content:
            application/json:
              example:
                status: 200
                data:
                  account:
                    id: 886
                    uid: 019e47f3-ef9a-775b-b5d2-a5007b86476a
                    email: f3027262cc24b4e8b9f8372ee3fd3a7d@koepp-king.example
                    account_type: individual
                    gender: Feminino
                    cpf: 055.785.786-40
                    address_street_name: Av. Burkhard Hehn Simões
                    address_state: RJ
                    address_neighborhood: São Francisco
                    address_postal_code: '24360440'
                    address_number: '120'
                    address_complement: '709'
                    phone_number: '2199999999'
                    first_name: Margret
                    middle_name: Simões
                    last_name: Gonçalo
                    date_of_birth: '1970-03-01'
                    business_category: null
                    business_subcategory: null
                    business_website: null
                    business_name: null
                    business_legal_name: null
                    business_type: null
                    business_cnpj: null
                    address_city_name: Rio de Janeiro
                    full_name: Margret Simões Gonçalo
                    mother_name: Lenadra Simões Gonçalo
                    father_name: José Simões Gonçalo
                    billing_email: null
                    configuration: null
                    simple_opting: false
                    rate_limits: {}
                    parent_id: null
                    parent_uid: null
                    nickname: null
                    feature_flags: []
                    subscription: null
                  user: null
                  access_token:
                    uid: a5978433-9036-4bb7-8118-234b7378ecf4
                    external_id: null
                    description: null
                    scopes:
                      - all
                      - read
                      - login
                    source: user
                    purpose: null
                    expires_in: 7200
                    expires_at: '2026-05-21T05:33:49+03:00'
                    version: 2
                    tags: []
                    custom_data: null
                    warning_flags: []
                    reminder_emails:
                      - label: Tech Team
                        address: tech@example.com
                    created_at: '2026-05-21T03:33:49+03:00'
                    created_by: null
                    updated_at: '2026-05-21T03:33:49+03:00'
                    updated_by: null
                    enabled_at: '2026-05-21T03:33:49+03:00'
                    enabled_by: null
                    disabled_at: null
                    disabled_by: null
                    revoked_at: null
                    revoked_by: null
                    last_used_at: null
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                    example: 200
                  data:
                    type: object
                    properties:
                      account:
                        $ref: '#/components/schemas/v2_account'
                      user:
                        oneOf:
                          - $ref: '#/components/schemas/v2_user'
                          - type: 'null'
                        description: Será `null` quando o token não foi criado por um usuário.
                        type: 'null'
                      access_token:
                        type: object
                        description: Informações do token de acesso
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
components:
  schemas:
    v2_error:
      type: object
      required:
        - status
        - errors
      properties:
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: 'Status HTTP do erro. Ex: `400`.'
          examples:
            - 400
            - 401
            - 422
            - 500
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              title:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
                examples:
                  - Token de API inválido
                  - Parâmetro obrigatório
              code:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Código do erro. Ex: `validation_error`.'
                examples:
                  - validation_error
                  - authentication_error
                  - not_found
              param:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Nome do parâmetro que falhou a validação. Ex: `amount`.'
                examples:
                  - amount
                  - customer_email
                  - expire_at
              detail:
                anyOf:
                  - type: string
                  - type: 'null'
                  - type: object
                description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
                examples:
                  - não pode ficar em branco
                  - deve ser um email válido
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      anyOf:
                        - type: string
                        - type: 'null'
                    code:
                      anyOf:
                        - type: string
                        - type: 'null'
                    param:
                      anyOf:
                        - type: string
                        - type: 'null'
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                        - type: object
                  additionalProperties: false
                description: Erros aninhados
            additionalProperties: false
      additionalProperties: false
    v2_pagination:
      type: object
      required:
        - page
      properties:
        prev_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da página anterior.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=1'
            - null
        next_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da próxima página.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=3'
            - null
        page:
          type: integer
          minimum: 1
          description: Número da página atual.
          examples:
            - 1
            - 2
            - 10
      additionalProperties: false
    v2_pix_command:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
            `destroy`: Exclusão do registro.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        pix:
          $ref: '#/components/schemas/v2_pix'
    v2_pix:
      type: object
      required:
        - amount
        - pix_account_uid
        - expire_at
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID do Pix (DEPRECATED: use uid)'
          example: 123
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pix
          examples:
            - 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
          description: Quantia em reais
          examples:
            - 120.99
            - 50
            - 1000.5
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          enum:
            - opened
            - paid
            - overdue
            - canceled
            - generation_failed
          description: |
            Status do Pix.

            * `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            * `paid`: Cobrança Pix paga.
            * `overdue`: Cobrança Pix em atraso.
            * `canceled`: Cobrança Pix cancelada.
            * `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
          examples:
            - opened
            - paid
            - canceled
        pix_account_id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID da Conta Pix (DEPRECATED: use pix_account_uid)'
          example: 456
        pix_account_uid:
          type: string
          format: uuid
          description: UID da Conta Pix
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        txid:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 35
            - type: 'null'
          description: TXID do Pix - Identificador único da transação
          examples:
            - E12345678202201011200123456789AB
            - null
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        canceled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de cancelamento do Pix
          example: '2023-12-02T10:03:56-03:00'
        registered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de registro no provedor
          example: '2023-12-02T10:03:56-03:00'
        paid_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora do pagamento
          example: '2023-12-02T10:03:56-03:00'
        paid_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor efetivamente pago
          example: 120.99
        registration_status:
          type: string
          readOnly: true
          nullable: true
          description: Status do registro no provedor
          enum:
            - pending
            - skipped
            - requested
            - confirmed
            - rejected
            - failed
          example: confirmed
        revoke_days:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 365
            - type: 'null'
          description: Número de dias ativo após o vencimento. OBRIGATÓRIO e deve ser maior que zero quando o Pix possui juros (interest) ou multa (fine) configurados.
          examples:
            - 1
            - 7
            - 30
            - null
        message:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          description: Mensagem de solicitação ao pagador
          examples:
            - Pagamento da fatura 123
            - Cobrança mensal
            - null
        message_payer:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          readOnly: true
          description: Mensagem para o pagador (campo readOnly)
          examples:
            - Pagamento da fatura 123
            - null
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do beneficiário do Pix
          properties:
            document_number:
              type: string
              description: CPF/CNPJ do beneficiário
              example: '12345678900'
            name:
              type: string
              description: Nome do beneficiário
              example: João Silva
        url:
          type: string
          readOnly: true
          nullable: true
          description: URL para visualização do Pix
          example: 'https://kobana.com.br/p/abc123'
        formats:
          type: object
          readOnly: true
          nullable: true
          description: URLs com formatos disponíveis para o Pix
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML padrão
                  example: 'https://kobana.com.br/p/abc123'
                png:
                  type: string
                  description: URL PNG padrão
                  example: 'https://kobana.com.br/p/abc123.png'
                pdf:
                  type: string
                  description: URL PDF padrão
                  example: 'https://kobana.com.br/p/abc123.pdf'
            qrcode:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode'
                png:
                  type: string
                  description: URL PNG QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.png'
                pdf:
                  type: string
                  description: URL PDF QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.pdf'
        additional_info:
          anyOf:
            - type: object
              additionalProperties:
                type: string
                maxLength: 200
              maxProperties: 10
            - type: 'null'
          description: Informações adicionais para o pagador (máximo 10 pares chave-valor)
          examples:
            - Pedido: '12345'
              Cliente: João Silva
            - Referência: FATURA-001
            - null
        qrcode:
          type: object
          description: QR Code do Pix
          readOnly: true
          properties:
            emv:
              anyOf:
                - type: string
                  pattern: '^[0-9A-Za-z\+\/\=\.\:\-\*]+$'
                - type: 'null'
              description: QR Code no formato EMV.
              readOnly: true
              examples:
                - 00020126...
                - null
            png:
              anyOf:
                - type: string
                  contentEncoding: base64
                  contentMediaType: image/png
                - type: 'null'
              description: QR Code no formato PNG em base64.
              readOnly: true
              examples:
                - iVBORw0KGgoAAAANSUhEUgAA...
                - null
        registration_kind:
          type: string
          enum:
            - instant
            - billing
          default: instant
          writeOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        kind:
          type: string
          enum:
            - instant
            - billing
          readOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        command_ids:
          type: array
          readOnly: true
          items:
            type: integer
            description: IDs dos registros de Comandos do Pix
        payments:
          type: array
          readOnly: true
          items:
            type: string
            format: uuid
            description: UID do Recebimento
          description: Lista de UIDs dos Recebimentos vinculados ao Pix
          examples:
            - - 018df180-7208-727b-a10a-ea545e4a75a8
            - []
            - - 018df180-7208-727b-a10a-ea545e4a75a8
              - 018df180-8319-8a9c-b21b-fa656f5b86b9
        end_to_end_id:
          anyOf:
            - type: string
              pattern: '^[A-Z]{1}[0-9]{8}[0-9]{4}[0-9]{2}[0-9]{2}[0-9]{4}[0-9a-zA-Z]{11}$'
            - type: 'null'
          readOnly: true
          description: End To End Id do Pix - Identificador único da transferência
          examples:
            - E12345678202301011200123456789AB
            - null
        custom_data:
          anyOf:
            - type: object
              additionalProperties:
                anyOf:
                  - type: string
                  - type: number
                  - type: boolean
                  - type: 'null'
            - type: 'null'
          examples:
            - codigo: '123'
              vip: true
            - referencia: PEDIDO-001
              prioridade: alta
            - null
          description: Hash com chave e valor no formato JSON.
        external_id:
          type: string
          nullable: true
          description: Identificador externo para o Pix
          example: pix_123
        virtual_pix_uid:
          type: string
          readOnly: true
          nullable: true
          description: UID do Pix gerado por membro BackOffice. (BackOffice precisa estar habilitado).
          example: null
        fine:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de multa (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo do Multa: none=Sem multa, amount=Por valor, percentage=Por porcentagem'
              enum:
                - none
                - amount
                - percentage
              example: amount
            amount:
              type: number
              format: float
              nullable: true
              description: Valor da Multa
              example: 50
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual da Multa
              example: 5
        reduction:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de abatimento (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de Abatimento: none=Não se aplica, amount=Por valor, percentage=Por porcentagem'
              enum:
                - none
                - amount
                - percentage
              example: amount
            amount:
              type: number
              format: float
              nullable: true
              description: Valor do Abatimento
              example: 25
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual do Abatimento
              example: 2.5
        interest:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de juros (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de Juros: daily_amount_calendar, daily_percentage_calendar, monthly_percentage_calendar, yearly_percentage_calendar, daily_amount_business, daily_percentage_business, monthly_percentage_business, yearly_percentage_business'
              enum:
                - daily_amount_calendar
                - daily_percentage_calendar
                - monthly_percentage_calendar
                - yearly_percentage_calendar
                - daily_amount_business
                - daily_percentage_business
                - monthly_percentage_business
                - yearly_percentage_business
              example: daily_percentage_calendar
            amount:
              type: number
              format: float
              nullable: true
              description: Valor do Juros
              example: 20
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual do Juros
              example: 2.5
        discounts:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de descontos (retorna como objeto nested com até 3 descontos)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de desconto: fixed_amount, fixed_percentage, advance_amount_calendar, advance_amount_business, advance_percentage_calendar, advance_percentage_business'
              enum:
                - fixed_amount
                - fixed_percentage
                - advance_amount_calendar
                - advance_amount_business
                - advance_percentage_calendar
                - advance_percentage_business
              example: fixed_amount
            discount_first:
              type: object
              nullable: true
              description: Primeiro desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do primeiro desconto
                  example: 10
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do primeiro desconto
                  example: 5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o primeiro desconto
                  example: 5
            discount_second:
              type: object
              nullable: true
              description: Segundo desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do segundo desconto
                  example: 5
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do segundo desconto
                  example: 2.5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o segundo desconto
                  example: 10
            discount_third:
              type: object
              nullable: true
              description: Terceiro desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do terceiro desconto
                  example: 2.5
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do terceiro desconto
                  example: 1
                days:
                  type: integer
                  nullable: true
                  description: Dias para o terceiro desconto
                  example: 15
        ignore_whatsapp:
          type: boolean
          nullable: true
          default: false
          description: Nunca enviar este Pix por WhatsApp
          example: false
        password_protected_mode:
          type: integer
          nullable: true
          enum:
            - 0
            - 1
            - 2
          description: 'Modo de proteção por senha: 0=desabilitado, 1=últimos 4 dígitos, 2=primeiros 5 dígitos'
        tags:
          type: array
          nullable: true
          description: Tags associadas ao pix
          example: null
          items:
            type: string
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao pix
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_pix_update:
      type: object
      properties:
        amount:
          type: number
          format: float
          description: Quantia
          example: 120.99
        pix_account_uid:
          type: string
          format: uuid
          nullable: true
          description: |
            UID da Conta Pix para alterar a chave Pix do recebedor.

            Este campo é útil quando você deseja alterar a chave Pix no provedor financeiro.

            **Importante**: Somente são aceitas contas Pix que estejam ativas (status `active`).
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          description: |
            Status do Pix.

            `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            `paid`: Cobrança Pix paga.
            `overdue`: Cobrança Pix em atraso.
            `canceled`: Cobrança Pix cancelada.
            `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        revoke_days:
          type: integer
          nullable: true
          description: Número de dias ativo após o vencimento
          example: 1
        message:
          type: string
          nullable: true
          description: Mensagem de solicitação ao pagador
        additional_info:
          type: object
          nullable: true
          description: Informações adicionais para o pagador
          example:
            Chave: Valor
        fine_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Multa:
                                * `0` Sem multa (isento)
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        fine_amount:
          type: string
          nullable: true
          example: '50.00'
          description: Valor da Multa
        fine_percentage:
          type: string
          nullable: true
          example: '5'
          description: Percentual da Multa
        reduction_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Abatimento:
                                * `0` Não se aplica
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        reduction_amount:
          type: string
          nullable: true
          example: '25.00'
          description: Valor do Abatimento
        reduction_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual do Abatimento
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Juros:
                              * `0` Não se Aplica (isento)
                              * `1` Por valor Diário
                              * `2` Por porcentagem Diária
                              * `3` Por porcentagem Mensal
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        interest_amount:
          type: string
          nullable: true
          example: '20.00'
          description: Valor da Multa
        interest_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual da Multa
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
