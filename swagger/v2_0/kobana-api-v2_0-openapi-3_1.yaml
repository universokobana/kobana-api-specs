          type: string
          maxLength: 8
          description: CEP (formato 99999999)
          example: '01310100'
        customer_email:
          type: string
          nullable: true
          format: email
          maxLength: 80
          description: E-mail do Pagador
          example: null
        customer_email_cc:
          type: string
          nullable: true
          format: email
          maxLength: 80
          description: E-mail alternativo do Pagador
          example: null
        customer_address:
          type: string
          maxLength: 255
          description: Endereço
          example: 'Rua F, alamenda G'
        customer_city_name:
          type: string
          maxLength: 60
          description: Cidade(Nome deve estar correto e completo)
          example: São Paulo
        customer_state:
          type: string
          maxLength: 2
          description: Estado
          example: SP
        customer_neighborhood:
          type: string
          maxLength: 80
          description: Bairro
          example: Centro
        customer_address_number:
          type: string
          maxLength: 10
          description: Número
          example: null
        customer_address_complement:
          type: string
          nullable: true
          maxLength: 120
          description: Complemento
          example: null
        customer_phone_number:
          type: string
          nullable: true
          maxLength: 11
          description: Telefone (com DDD)
          example: null
        customer_person_type:
          type: string
          readOnly: true
          nullable: true
          maxLength: 10
          description: |-
