              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            beneficiary:
              type: object
              nullable: false
              description: Dados do beneficiário da transferência
              required:
                - name
