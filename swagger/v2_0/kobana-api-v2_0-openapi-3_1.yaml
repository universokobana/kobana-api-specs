        external_id:
          type: string
          nullable: true
          description: Identificador externo para integração
        custom_data:
          type: object
          nullable: true
          description: Dados customizados em formato JSON
        tags:
          type: array
          items:
            type: string
          description: Tags para categorização
        created_via_api:
          type: boolean
          readOnly: true
          description: Se o registro foi criado via API
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização
        name:
          type: string
          nullable: true
          description: Nome do dispositivo Syncthing
        device_id:
          type: string
          nullable: true
          description: Identificador do dispositivo Syncthing
        inbox_folder_id:
          type: string
          nullable: true
          description: ID da pasta de entrada no Syncthing
        outbox_folder_id:
          type: string
          nullable: true
          description: ID da pasta de saída no Syncthing
        server_status:
          type: string
          readOnly: true
          enum:
            - connected
            - disconnected
            - updating
            - error
          description: |-
            Status do servidor Syncthing:
            `connected`: Conectado
            `disconnected`: Desconectado
            `updating`: Atualizando
