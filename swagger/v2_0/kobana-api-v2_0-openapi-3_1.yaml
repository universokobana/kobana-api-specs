    v2_statement_transaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da transação
        financial_account_uid:
          type: string
          readOnly: true
          format: uuid
          description: UID da Conta Financeira
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          format: float
          example: 120.99
          description: |
            Quantia
