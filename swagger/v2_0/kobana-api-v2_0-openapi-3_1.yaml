                      uid: 019e2e81-715b-70a8-b52f-e1f541f43832
                    - slug: transfer.account
                      uid: 019e2e81-7166-7c92-b527-06f013d12ed4
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_financial_account'
        '401':
