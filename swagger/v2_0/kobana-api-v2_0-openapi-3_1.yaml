          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
          description: |-
            Tipo de desconto aplicado aos campos `discount_*` (nulo/ausente = sem desconto):
                                * `1` Valor fixo (`fixed_amount`)
                                * `2` Percentual fixo (`fixed_percentage`)
                                * `3` Antecipação por valor — dias corridos (`advance_amount_calendar`)
                                * `4` Antecipação por valor — dias úteis (`advance_amount_business`)
                                * `5` Antecipação por percentual — dias corridos (`advance_percentage_calendar`)
                                * `6` Antecipação por percentual — dias úteis (`advance_percentage_business`)
                                As modalidades de antecipação (`3`–`6`) aceitam apenas uma faixa. No retorno o tipo vem em `discounts.type`.
          example: 1
        discount_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 1º desconto em reais. Obrigatório quando `discount_type` for por valor.
          example: 5
        discount_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 1º desconto. Obrigatório quando `discount_type` for por percentual.
          example: 5
        discount_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 1º desconto é válido.
          example: 7
        discount_second_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 2º desconto em reais.
          example: 10
        discount_second_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 2º desconto.
          example: 2.5
        discount_second_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 2º desconto é válido.
          example: 9
        discount_third_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 3º desconto em reais.
          example: 15
        discount_third_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 3º desconto.
          example: 1
        discount_third_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 3º desconto é válido.
          example: 10
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_pix_account:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID da Conta Pix (deprecated, use uid)'
          example: 123
        uid:
          type: string
          readOnly: true
          description: UUID público da Conta Pix
          example: 123e4567-e89b-12d3-a456-426614174000
        financial_account_uid:
          type: string
          nullable: true
          description: UID da conta financeira associada. Os dados de beneficiário são derivados automaticamente da conta financeira.
