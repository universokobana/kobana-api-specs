    v2_certificate_create:
      type: object
      required:
        - label
        - cnpj_cpf
        - type
        - files
      properties:
        label:
          type: string
          nullable: true
          maxLength: 255
          description: Nome dado ao certificado
          example: Meu Certificado
        cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ
          example: 16.974.923/0001-84
        subaccounts:
          type: boolean
          nullable: true
          description: Indica se o certificado está liberado para uso nas subcontas
        type:
          type: string
          description: |-
            Tipo do certificado:
            Se o tipo do certificado for `CRT` é obrigatório enviar o `crt_file` e o `crt_private_key_file`, se o tipo for `PFX` é obrigatório `pfx_file` e `pfx_password`.

            * `crt` CRT
            * `pfx` PFX
          enum:
            - crt
            - pfx
        files:
          type: object
          description: |-
            Arquivo do certificado e senha.
            Se o tipo do certificado for `CRT` é obrigatório enviar o `crt_file` e o `crt_private_key_file`, se o tipo for `PFX` é obrigatório `pfx_file` e `pfx_password`.
          properties:
            crt_file:
              type: string
              format: binary
              description: Arquivo .cer/.crt
            crt_private_key_file:
              type: string
              format: binary
              description: Arquivo .key para certificado `crt`
            pfx_file:
              type: string
              format: binary
              description: Arquivo .p12/.pfx
            pfx_password:
              type: string
              format: password
              description: Senha do certificado para certificado `pfx`
