        - amount
        - kind
        - paid_at
        - payable
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Recebimento.
        amount:
          type: number
          format: float
          description: Valor do Recebimento.
          example: 10.99
        kind:
          type: string
          enum:
            - direct
            - bank_billet
            - pix
          description: Tipo de Recebimento.
          example: bank_billet
        paid_at:
          type: string
          format: date
          description: Data do Recebimento.
        payable:
          type: object
          nullable: true
          description: Recurso associado ao pagamento (Boleto ou Pix).
