          description: Conta de DDA criada com sucesso
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f0e7a-e45e-7964-8056-f7bbe2c1b5d6
                  cnpj: 11.222.333/0001-81
                  name: null
