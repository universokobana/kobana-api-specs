              properties:
                txid:
                  type: string
                  nullable: true
                  description: TXID
                pix_type:
                  type: string
                  description: |
                    Tipo do Pix

                    `key`: Chave.
                    `bank_account`: Dados bancários
                key_type:
                  type: string
                  nullable: true
