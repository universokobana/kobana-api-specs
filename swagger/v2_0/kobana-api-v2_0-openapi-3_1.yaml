      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID
          deprecated: true
        uid:
          type: string
          readOnly: true
          format: uuid
          description: UID do Certificado
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        account_id:
          type: integer
          readOnly: true
          description: ID da Conta
        label:
          type: string
          nullable: true
          maxLength: 255
          description: Nome dado ao certificado
          example: Meu Certificado
        subaccounts:
          type: boolean
          nullable: true
          description: Indica se o certificado está liberado para uso nas subcontas
        common_name:
          type: string
          nullable: true
          maxLength: 255
          description: Nome comum
          example: null
        issuer:
          type: string
          nullable: true
          maxLength: 255
          description: Emissor
          example: null
        cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ
          example: 16.974.923/0001-84
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o registro foi criado por API
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
        expiration_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de expiração do certificado
        status:
          type: string
          readOnly: true
          description: |-
            Status do certificado:
            * `draft` Rascunho
            * `validated` Válido
            * `expired` Expirado
          enum:
            - draft
            - validated
            - expired
        created_by:
          type: string
          readOnly: true
          description: |-
            Criado por:
            * `user` Cliente
            * `system` Sistema
          enum:
            - user
            - system
