              example: CPF
            document_number:
              type: string
              description: Número do documento da pessoa
              example: '12345678901'
            kind:
              type: string
              enum:
                - natural
                - juridical
              description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
              example: natural
            name:
              type: string
              maxLength: 140
              description: Nome completo ou razão social
              example: Maria da Silva
        start_at:
          type: string
          format: date_time
          example: '2024-01-01T00:00:00Z'
        finish_at:
          type: string
          format: date_time
          nullable: true
          example: '2025-01-01T00:00:00Z'
        recurrence_term:
          type: string
          enum:
            - indefinite
            - fixed
          example: fixed
        cycle:
          type: string
          enum:
            - weekly
            - monthly
            - quarterly
            - semiannual
            - annual
          example: monthly
        amount_term:
          type: string
          enum:
            - variable
            - fixed
          example: fixed
        amount:
          type: number
          format: float
          nullable: true
          example: 10000
        minimum_amount:
          type: number
          format: float
          nullable: true
          example: 5000
