                complement:
                  type: string
                  description: Complemento
                  example: Apto 101
                neighborhood:
                  type: string
                  description: Bairro
                  example: Bairro do Beneficiário
                city_name:
                  type: string
                  description: Cidade
                  example: São Paulo
                state:
                  type: string
                  description: Estado
                  example: SP
