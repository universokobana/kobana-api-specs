              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
