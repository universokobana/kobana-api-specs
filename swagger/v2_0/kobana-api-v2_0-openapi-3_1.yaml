    v2_bank_billet_remittance_object:
      type: object
      required:
        - our_code
        - remittance_id
        - bank_billet_id
        - bank_billet_account_id
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Registro de Remessa
        uid:
          type: string
          readOnly: true
          description: UID do Registro de Remessa
        our_code:
          type: string
          maxLength: 6
          nullable: true
