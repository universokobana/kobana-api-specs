                      - ac05
                      - ac06
                      - ag12
                      - am02
                      - am09
                      - denc
                      - ds27
                      - dted
                      - dtnt
                      - fbrd
                      - irnt
                      - midi
                      - msuc
                      - niec
                      - nipa
                      - nitx
