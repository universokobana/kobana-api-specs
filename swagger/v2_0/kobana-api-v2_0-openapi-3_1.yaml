          format: uuid
          nullable: true
          readOnly: true
          description: Conexão bancária da conta.
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        agreement_code:
          type: string
          nullable: true
          description: Código do convênio
          example: '123456'
        provider_data:
          type: object
          nullable: true
          description: Dados específicos do provider.
          properties:
            service_point_number:
              type: string
              nullable: true
              description: Número do ponto de atendimento. Envie `null` para limpar o valor.
              example: '0001'
            cooperative_cnpj:
              type: string
              nullable: true
              description: CNPJ da cooperativa Sicoob do titular da conta. Envie `null` para limpar o valor.
              examples:
                - 13.009.717/0001-46
                - '13009717000146'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        balance_validation_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a validação de saldo foi habilitada
        remittance_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a remessa EDI foi habilitada
        remittance_enabled:
          type: boolean
          writeOnly: true
          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_new_payment_account:
      type: object
      description: Cria uma conta de pagamento sob uma conta financeira.
      required:
        - financial_account_uid
      properties:
        financial_account_uid:
          type: string
          description: UUID da Conta Financeira que receberá a nova conta de pagamento
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        agreement_code:
          type: string
          nullable: true
