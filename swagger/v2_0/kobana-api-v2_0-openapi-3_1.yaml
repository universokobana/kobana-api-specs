                      uid: 019f13d8-269a-78a1-972a-36dd5834d33f
                    - slug: transfer.account
                      uid: 019f13d8-26a2-7d82-8eb4-269be439c669
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_financial_account'
