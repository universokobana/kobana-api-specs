                type: string
                readOnly: true
                description: Endereço Curto
                example: 'Av. Rio Branco, 26, Sobreloja'
              full:
                type: string
                readOnly: true
                description: Endereço Completo
                example: 'Av. Rio Branco, 26, Sobreloja, Centro, Rio de Janeiro, RJ. CEP: 20090-001'
