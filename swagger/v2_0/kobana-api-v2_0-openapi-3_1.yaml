        cnpj:
          type: string
          description: CNPJ ou CPF da empresa/pessoa para a qual o DDA será habilitado. Deve ser um documento válido. Cada conta Kobana pode ter apenas uma conta DDA ativa.
          example: 11.222.333/0001-81
        signers:
          type: array
          description: Lista de 1 a 3 signatários da carta de adesão ao DDA. Cada signatário receberá um e-mail com link para assinatura digital.
          items:
