  /v2/financial/providers:
    get:
      summary: Listar Provedores
      tags:
        - Provedores
      description: |-

        Esse endpoint é utilizado para receber os provedores de serviço que a Kobana está integrada.

        Um provedor de serviço é qualquer instituição regulada pelo BACEN, seja um banco comercial, instituição financeira, instituição de pagamento, provedor de serviço de pagamento, etc.

        O `slug` do provedor de serviço é utilizado para a criação de uma conta financeira.
      security:
        - bearerAuth: []
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
      responses:
        '200':
          description: Provedores encontradas
          content:
            application/json:
              example:
                status: 200
                data:
                  - kind: bank
                    name: ABC Brasil
                    bcb_name: BANCO ABC BRASIL S.A.
                    number: '246'
                    number_with_digit: 246-1
                    slug: abc
                  - kind: bank
                    name: Ailos
