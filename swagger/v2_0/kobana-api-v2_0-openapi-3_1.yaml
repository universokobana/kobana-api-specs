    post:
      summary: Criar uma Conta
      tags:
        - Contas
      security:
        - bearerAuth: []
      description: Cria uma nova conta financeira para gerenciamento de transações bancárias. Suporta contas correntes e poupança.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019d03ce-cc2e-7e56-9374-fe72d4467c72
                  status: complete
                  bank:
                    name: Banco do Brasil
                    bcb_name: BANCO DO BRASIL S.A.
                    number: '001'
                  account_number: '123456'
                  account_digit: '0'
                  agency_number: '1234'
                  agency_digit: '1'
                  financial_provider_slug: sicoob
                  created_at: '2026-03-19T01:56:17+00:00'
                  updated_at: '2026-03-19T01:56:17+00:00'
                  kind: checking
                  custom_name: 'Sicoob CC: 123456-0'
                  payment_agreement_code: null
                  person_info: null
                  tags:
                    - tag 1
                    - tag 2
                  tag_list: 'tag 1,tag 2'
                  custom_data:
                    codigo: '123'
                    vip: true
                  external_id: external id
                  balance: null
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_financial_account'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Erro de validação
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: account_number
                    detail: Número da Conta não pode ficar em branco
                  - code: validation_error
                    param: account_number
                    detail: Número da Conta não é um número
                  - code: validation_error
                    param: account_digit
                    detail: Dígito da Conta não pode ficar em branco
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_financial_account'
        required: true
        description: Parametros para criação de uma cobrança Pix
