    v2_generic_payment:
      type: object
      description: 'Pagamento Genérico - Pode ser de qualquer tipo (Pix, Boleto, DARF, Tributo ou Conta de Consumo)'
      discriminator:
        propertyName: kind
        mapping:
          pix: '#/components/schemas/payment_pix'
          bank_billet: '#/components/schemas/payment_bank_billet'
          darf: '#/components/schemas/payment_darf'
          tax: '#/components/schemas/payment_tax'
          utility: '#/components/schemas/payment_utility'
      oneOf:
        - $ref: '#/components/schemas/v2_payment_pix'
        - $ref: '#/components/schemas/v2_payment_bank_billet'
        - $ref: '#/components/schemas/v2_payment_darf'
        - $ref: '#/components/schemas/v2_payment_tax'
        - $ref: '#/components/schemas/v2_payment_utility'
    v2_new_generic_payment:
      type: object
      description: |-
        Novo Pagamento Genérico.

        O tipo de pagamento é detectado automaticamente pela presença de uma das chaves específicas:
        - `pix`: Cria um Payment::Pix
        - `bank_billet`: Cria um Payment::BankBillet
        - `darf`: Cria um Payment::Darf
        - `tax`: Cria um Payment::Tax
        - `utility`: Cria um Payment::Utility

        Apenas uma dessas chaves deve estar presente no payload.
      oneOf:
        - type: object
          description: Payload para criar um Pagamento Pix
          required:
            - kind
            - financial_account_uid
            - pix
          properties:
            kind:
              type: string
              enum:
                - pix
                - bank_billet
                - darf
                - tax
                - utility
              description: Tipo do pagamento (obrigatório)
              example: pix
            beneficiary:
              type: object
              nullable: true
              description: Informações do beneficiário. Obrigatório quando `kind = bank_billet` e a conta financeira for BB.
              properties:
                name:
                  type: string
                  nullable: true
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  nullable: true
                  description: CPF/CNPJ do beneficiário. Obrigatório quando `kind = bank_billet` e a conta financeira for BB.
                  example: 123.456.789-00
            amount:
              type: number
              format: float
              nullable: true
              example: 120.99
              description: 'Quantia. Opcional, o valor será extraído automaticamente do qrcode.'
            scheduled_to:
              type: string
              format: date
              nullable: true
              description: Data de Agendamento
              example: '2023-12-12'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            pix:
              type: object
              required:
                - qrcode
              description: Dados do Pix
              properties:
                qrcode:
                  type: string
                  description: QR Code Copia e Cola
                identifier:
                  type: string
                  nullable: true
                  description: 'Identificação do pagamento no comprovante do provedor financeiro. (Uso exclusivo do banco). Bancos que aceitam esse campo (via API): Itaú'
        - type: object
          description: Payload para criar um Pagamento de Boleto
          required:
            - kind
            - amount
            - financial_account_uid
            - bank_billet
          properties:
            kind:
              type: string
              enum:
                - pix
                - bank_billet
                - darf
                - tax
                - utility
              description: Tipo do pagamento (obrigatório)
              example: pix
            beneficiary:
              type: object
              nullable: true
              description: Informações do beneficiário. Obrigatório quando `kind = bank_billet` e a conta financeira for BB.
              properties:
                name:
                  type: string
                  nullable: true
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  nullable: true
                  description: CPF/CNPJ do beneficiário. Obrigatório quando `kind = bank_billet` e a conta financeira for BB.
                  example: 123.456.789-00
            amount:
              type: number
              format: float
              example: 120.99
              description: |
                Quantia
            scheduled_to:
              type: string
              format: date
              nullable: true
              description: Data de Agendamento
              example: '2023-12-12'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
