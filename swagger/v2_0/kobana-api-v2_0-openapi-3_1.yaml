                  status: pending
                  external_id: ext-123
                  custom_data:
                    key: value
                  tags:
                    - tag1
                    - tag2
                  validated_at: null
                  enabled_at: null
                  created_at: '2026-06-14T03:54:12+08:00'
                  updated_at: '2026-06-14T03:54:12+08:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 201
                  data:
                    $ref: '#/components/schemas/v2_automatic_pix_account_object'
        '401':
          description: Falha de autenticação
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Dados inválidos
          content:
            application/json:
              example:
