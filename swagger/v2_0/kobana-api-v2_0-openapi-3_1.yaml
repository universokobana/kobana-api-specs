                name:
                  type: string
                  nullable: true
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  nullable: true
                  description: CPF/CNPJ do beneficiário. Obrigatório quando `kind = bank_billet` e a conta financeira for BB.
                  example: 123.456.789-00
