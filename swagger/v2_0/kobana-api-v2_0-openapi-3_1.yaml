        sent_error:
          type: string
          nullable: true
          maxLength: 255
          description: Erro ocorrido no envio
        email_notification_id:
          type: integer
          nullable: true
          description: ID da Notificação
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Enviado para o Servidor de E-mail
            * `failed` Falha no Envio para o Servidor de E-mail
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - read
            - clicked
        status_occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que o status ocorreu.
        last_clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado pela última vez.
        last_read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido pela última vez.
        clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado.
        click_count:
          type: integer
          description: Quantidade que foi clicado.
        read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido.
        read_count:
          type: integer
          description: Quantidade que foi lido.
        subject:
          type: string
          nullable: true
          description: Assunto do email
        email_account_id:
          type: integer
          nullable: true
          description: ID da conta de e-email
        email_template_id:
          type: integer
          nullable: true
          description: ID template de e-email
        bank_billet_in_pdf:
          type: boolean
          description: Indicativo se boleto em pdf
        bcc:
          type: string
          nullable: true
          description: Lista do destinatários das cópias ocultas
        cc:
          type: string
          nullable: true
          description: Lista do destinatários
        from_address:
          type: string
          nullable: true
          description: Endereço do remetente
        reply_to_address:
          type: string
          nullable: true
          description: Endereço de resposta
    v2_webhook:
      type: object
      required:
        - url
        - events
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook
        uid:
          type: string
          readOnly: true
          description: UID do webhook
        name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome de identificação do webhook
        url:
          type: string
          maxLength: 255
          description: Endereço onde as requisições serão realizadas
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
        events:
          type: array
          description: Eventos que devem gerar notificações para o webhook. Escolha um ou mais eventos.
          items:
            type: string
            enum:
              - ping
              - access_token.db.created
              - access_token.db.updated
              - access_token.db.deleted
              - access_token.reminder
              - access_token.expired
              - account.updated
              - account.blocked
              - account.bank_billet_creation_blocked
              - bank_billet.created
              - bank_billet.updated
              - bank_billet.generated
              - bank_billet.canceled
              - bank_billet.blocked
              - bank_billet.overdue
              - bank_billet.paid
              - bank_billet.due_date
              - bank_billet.rejected
              - bank_billet.cancel.requested
              - bank_billet.cancel.confirmed
              - bank_billet.cancel.failed
              - bank_billet.cancel.error
              - bank_billet.register.requested
              - bank_billet.register.confirmed
              - bank_billet.register.failed
              - bank_billet.register.error
              - bank_billet.update.requested
              - bank_billet.update.confirmed
              - bank_billet.update.failed
              - bank_billet.update.error
