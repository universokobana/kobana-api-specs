          example: bradesco
        enabled:
          type: boolean
          nullable: true
          description: Habilitar Conta Pix
        key:
          type: string
          description: Chave pix
          example: '+55999999999'
        default:
          type: boolean
          description: Conta default
          example: 'true'
        status:
          type: string
          readOnly: true
          description: 'Status calculado da conta Pix: active (ativa), inactive (validada mas não habilitada), pending (pendente de validação)'
