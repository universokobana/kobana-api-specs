  '/v2/payment/batches/{uid}/approve':
    put:
      summary: Aprovar um Lote de Pagamento
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: |2-

          > **Processamento Assíncrono:** Este endpoint é processado assincronamente e cria um comando de aprovação para o Lote de Pagamento.
          A aprovação de um Lote de Pagamento é feito assincronamente, ou seja, ao receber a requisição, a nossa API guarda a solicitação e cria um Comando. Esse comando é processado em segundo plano e depois de confirmado, o Lote tem seu status alterado para Aprovado. Você recebe na resposta desta requisição o ID do comando criado e pode consultá-lo a qualquer momento.

          ## Eventos de Webhook

          Quando a requisição é realizada, um evento `payment.payment_batch.approve.requested` é disparado.
          O nosso servidor então começa as tentativas de envio da liberação para a instituição financeira.
          Somente depois de confirmado na instituição financeira, aí então o lote é marcado como aprovado em nosso banco de dados.
          Neste momento o evento `payment.payment_batch.approve.confirmed` é disparado.

          > ⚠️ **Atenção ao status Aprovado:** O status de Aprovado não é terminal. Quando a instituição financeira confirmar os pagamentos, os mesmos terão seus status alterados para Confirmado
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          description: UUID do Lote de Pagamento
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
