          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Ativação da Conexão
        validated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Validação da Conexão
        associations:
          type: array
          readOnly: true
          items:
            type: object
            required:
              - resource
            properties:
              resource:
                type: object
                required:
                  - slug
                  - uid
                properties:
                  slug:
                    type: string
                    enum:
                      - charge.bank_billet_account
                      - charge.pix_account
                      - charge.automatic_pix_account
                      - payment.account
                      - transfer.account
                      - statement.account
                    description: Tipo da conta de serviço associada.
                    example: charge.bank_billet_account
                  uid:
                    type: string
                    description: UUID da conta de serviço associada.
                    example: 14a31e1b-6fa5-4825-8e54-61579842d520
          description: |2
