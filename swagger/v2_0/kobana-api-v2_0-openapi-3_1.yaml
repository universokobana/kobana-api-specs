              txid:
                type: string
                example: TX1234567890PIXCODIGO
              amount:
                type: number
                format: float
                example: 15000
              paid_at:
                type: string
                format: date_time
                example: '2025-07-03T14:00:00Z'
              message_payer:
                type: string
                example: Obrigado pelo serviço
              returns:
                type: array
                items:
                  type: object
                  properties:
                    uid:
                      type: string
