                  - landline
                description: Tipo (Celular/Fixo)
                example: mobile
              country_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 6
                description: Código do País
                example: '55'
              local_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 2
                description: Código Local
                example: '21'
              number:
                type: string
                nullable: false
                minLength: 8
                maxLength: 9
                description: Número do Telefone
                example: '30030386'
        emails:
