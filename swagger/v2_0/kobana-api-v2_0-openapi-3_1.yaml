      summary: Excluir Token de Acesso
      tags:
        - Tokens de Acesso
      security:
        - bearerAuth: []
      description: Remove permanentemente um token de acesso do sistema. Apenas tokens revogados ou expirados podem ser excluídos.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          required: true
          description: UID do Token de Acesso
          example: acc_1234567890
          schema:
            type: string
      responses:
        '204':
          description: Token excluído
        '403':
          description: Token não pode ser excluído
          content:
            application/json:
              example:
                status: 403
                errors:
                  - code: forbidden
                    title: Esse token não pode ser removido.
              schema:
                $ref: '#/components/schemas/v2_error'
        '404':
          description: Token não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v2_error'
