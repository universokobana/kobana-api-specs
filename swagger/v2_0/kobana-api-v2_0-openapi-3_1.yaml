  '/v2/payment/batches/{uid}/reprove':
    put:
      summary: Reprovar um Lote de Pagamento
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: |2-

          [block:callout]
          {
            "type": "info",
            "body": "Este endpoint é processado assincronamente e cria um comando de reprovação para o Lote de Pagamento.",
            "title": "Processamento Assíncrono"
          }
          [/block]
          A reprovação de um Lote de Pagamento é feita assincronamente, ou seja, ao receber a requisição, a nossa API guarda a solicitação e cria um Comando. Esse comando é processado em segundo plano e depois de confirmado, o Lote tem seu status alterado para Reprovado. Você recebe na resposta desta requisição o ID do comando criado e pode consultá-lo a qualquer momento.

          ## Eventos de Webhook

          Quando a requisição é realizada, um evento `payment.payment_batch.reprove.requested` é disparado.
          O nosso servidor então começa as tentativas de envio da liberação para a instituição financeira.
          Somente depois de confirmado na instituição financeira, aí então o lote é marcado como aprovado em nosso banco de dados.
          Neste momento o evento `payment.payment_batch.reprove.confirmed` é disparado.

          [block:callout]
          {
            "type": "warning",
            "body": "O status de Reprovado é terminal. Quando a instituição financeira cancelar os pagamentos, os mesmos terão seus status alterados para Reprovado",
            "title": "Atenção ao status Reprovado"
          }
          [/block]
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
