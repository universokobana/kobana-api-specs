    post:
      summary: Criar uma Conta
      tags:
        - Contas
      security:
        - bearerAuth: []
      description: Cria uma nova conta financeira para gerenciamento de transações bancárias. Suporta contas correntes e poupança.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Conta criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f13d8-2699-7851-a57f-b2be5415d8cd
                  status: complete
                  bank:
                    name: BANCOOB/SICOOB
                    bcb_name: BANCO COOPERATIVO DO BRASIL S.A. - BANCOOB
                    number: '756'
                  account_number: '123456'
                  account_digit: '0'
                  agency_number: '1234'
