  '/v2/admin/connections/{uid}/associations':
    post:
      summary: Conectar Conta de Serviço
      tags:
        - Conexões
      security:
        - bearerAuth: []
      description: |2-

              Este endpoint é utilizado para associar uma Conta de Serviço a uma Conexão.
              
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          required: true
          description: UUID da Conexão
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
          schema:
            type: string
      responses:
        '201':
          description: Associação criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f6c9d-1c44-79c7-9704-7cabb9da7b65
                  certificate_uid: 019f6c9d-1c3e-79fd-a2a3-8590f1cbf366
                  keypair_uid: null
                  label: Connection Name
                  apis:
                    - charge/pix
                  provider_slug: bradesco
                  environment: production
                  created_at: '2026-07-17T05:27:43+09:00'
                  updated_at: '2026-07-17T05:27:43+09:00'
                  enabled_at: null
                  validated_at: null
                  associations:
                    - resource:
                        slug: charge.pix_account
                        uid: 019f6c9d-1c8f-772a-8d1f-9ab243762ac6
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Dados da associação inválidos
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: base
                    detail: Chave PIX inválida ou não encontrada
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_association'
        required: true
        description: Informações da conta de serviço a ser associada.
    delete:
      summary: Desconectar Conta de Serviço
      tags:
        - Conexões
      security:
        - bearerAuth: []
      description: |2-

              Este endpoint é utilizado para remover associação de uma Conexão com Conta de Serviço.
              
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          description: UUID da Conexão
          required: true
          example: 383f7902-2af5-4a4e-9954-752950102773
          schema:
            type: string
      responses:
        '204':
          description: Conexão
        '404':
          description: Conexão não encontrada
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_association'
        required: true
        description: Informações da conta de serviço a ser removida.
