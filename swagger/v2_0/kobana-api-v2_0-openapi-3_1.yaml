          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Criação do Registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora da Última Atualização do Registro
