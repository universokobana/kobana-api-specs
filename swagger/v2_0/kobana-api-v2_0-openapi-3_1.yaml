      description: |-
        Incluir um certificado.
        [block:callout]
        {
          "type": "info",
          "body": "Conforme o tipo do certificado informado é necessario enviar o objeto files com conteúdos diferentes. Se o tipo do certificado for `CRT` é obrigatório enviar o `crt_file` e o `crt_private_key_file`, se o tipo for `PFX` é obrigatório `pfx_file` e `pfx_password`.",
          "title": "Tipo do Certificado"
        }
