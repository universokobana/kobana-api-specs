          type: string
          readOnly: true
          nullable: true
          maxLength: 10
          description: |-
            Tipo de Pagador.
            * `individual` Pessoa Física
            * `juridical` Pessoa Jurídica
          enum:
            - individual
            - juridical
        customer_mobile_local_code:
          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
        customer_notes:
          type: string
          nullable: true
          description: Observações do Pagador
          example: null
