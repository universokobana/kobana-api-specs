                    example: '12345'
                  agency_number:
                    type: string
                    description: Número da agência
                    example: '0001'
                  bank:
                    type: object
                    properties:
                      number:
                        type: string
                        description: Número do banco
                        example: '001'
                      ispb_number:
                        type: string
                        description: Código ISPB do banco
                        example: '00000000'
                      name:
                        type: string
                        description: Nome do banco
                        example: Banco do Brasil S.A.
                  person_info:
                    type: object
                    properties:
                      document_type:
                        type: string
                        enum:
                          - CPF
                          - CNPJ
                        description: Tipo do documento da pessoa
                        example: CPF
                      document_number:
                        type: string
                        description: Número do documento do titular
                        example: '12345678901'
                      kind:
                        type: string
                        enum:
                          - natural
                          - juridical
                        description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
                        example: natural
                      name:
                        type: string
                        description: Nome do titular
                        example: João Silva
        financial_provider_status:
          type: string
          nullable: true
          readOnly: true
          enum:
            - pending
            - created
            - approved
            - rejected
            - expired
            - canceled
          example: approved
        financial_provider_status_updates:
          type: array
          nullable: true
          readOnly: true
          items:
            type: object
            properties:
              status:
                type: string
                enum:
                  - pending
                  - created
                  - approved
                  - rejected
                  - expired
                  - canceled
                example: approved
              updated_at:
                type: string
                format: date_time
                example: '2024-02-01T10:00:00Z'
        cancellation:
          type: object
          nullable: true
          readOnly: true
          properties:
            origin:
              type: string
              enum:
