components:
  schemas:
    v2_error:
      type: object
      required:
        - status
        - errors
      properties:
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: 'Status HTTP do erro. Ex: `400`.'
          examples:
            - 400
            - 401
            - 422
            - 500
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              title:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
                examples:
                  - Token de API inválido
                  - Parâmetro obrigatório
              code:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Código do erro. Ex: `validation_error`.'
                examples:
                  - validation_error
                  - authentication_error
                  - not_found
              param:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Nome do parâmetro que falhou a validação. Ex: `amount`.'
                examples:
                  - amount
                  - customer_email
                  - expire_at
              detail:
                anyOf:
                  - type: string
                  - type: 'null'
                  - type: object
                description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
                examples:
                  - não pode ficar em branco
                  - deve ser um email válido
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      anyOf:
                        - type: string
                        - type: 'null'
                    code:
                      anyOf:
                        - type: string
                        - type: 'null'
                    param:
                      anyOf:
                        - type: string
                        - type: 'null'
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                        - type: object
                  additionalProperties: false
                description: Erros aninhados
            additionalProperties: false
      additionalProperties: false
    v2_pagination:
      type: object
      required:
        - page
      properties:
        prev_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da página anterior.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=1'
            - null
        next_url:
          anyOf:
            - type: string
              format: uri
            - type: 'null'
          description: URL da próxima página.
          examples:
            - 'https://api.kobana.com.br/v2/bank_billets?page=3'
            - null
        page:
          type: integer
          minimum: 1
          description: Número da página atual.
          examples:
            - 1
            - 2
            - 10
      additionalProperties: false
    v2_pix_command:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
            `destroy`: Exclusão do registro.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        pix:
          $ref: '#/components/schemas/v2_pix'
    v2_pix:
      type: object
      required:
        - amount
        - pix_account_uid
        - expire_at
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID do Pix (DEPRECATED: use uid)'
          example: 123
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pix
          examples:
            - 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
          description: Quantia em reais
          examples:
            - 120.99
            - 50
            - 1000.5
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          enum:
            - opened
            - paid
            - overdue
            - canceled
            - generation_failed
          description: |
            Status do Pix.

            * `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            * `paid`: Cobrança Pix paga.
            * `overdue`: Cobrança Pix em atraso.
            * `canceled`: Cobrança Pix cancelada.
            * `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
          examples:
            - opened
            - paid
            - canceled
        pix_account_id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID da Conta Pix (DEPRECATED: use pix_account_uid)'
          example: 456
        pix_account_uid:
          type: string
          format: uuid
          description: UID da Conta Pix
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        txid:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 35
            - type: 'null'
          description: TXID do Pix - Identificador único da transação
          examples:
            - E12345678202201011200123456789AB
            - null
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        canceled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de cancelamento do Pix
          example: '2023-12-02T10:03:56-03:00'
        registered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de registro no provedor
          example: '2023-12-02T10:03:56-03:00'
        paid_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora do pagamento
          example: '2023-12-02T10:03:56-03:00'
        paid_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor efetivamente pago
          example: 120.99
        registration_status:
          type: string
          readOnly: true
          nullable: true
          description: Status do registro no provedor
          enum:
            - pending
            - skipped
            - requested
            - confirmed
            - rejected
            - failed
          example: confirmed
        revoke_days:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 365
            - type: 'null'
          description: Número de dias ativo após o vencimento. OBRIGATÓRIO e deve ser maior que zero quando o Pix possui juros (interest) ou multa (fine) configurados.
          examples:
            - 1
            - 7
            - 30
            - null
        message:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          description: Mensagem de solicitação ao pagador
          examples:
            - Pagamento da fatura 123
            - Cobrança mensal
            - null
        message_payer:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          readOnly: true
          description: Mensagem para o pagador (campo readOnly)
          examples:
            - Pagamento da fatura 123
            - null
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do beneficiário do Pix
          properties:
            document_number:
              type: string
              description: CPF/CNPJ do beneficiário
              example: '12345678900'
            name:
              type: string
              description: Nome do beneficiário
              example: João Silva
        url:
          type: string
          readOnly: true
          nullable: true
          description: URL para visualização do Pix
          example: 'https://kobana.com.br/p/abc123'
        formats:
          type: object
          readOnly: true
          nullable: true
          description: URLs com formatos disponíveis para o Pix
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML padrão
                  example: 'https://kobana.com.br/p/abc123'
                png:
                  type: string
                  description: URL PNG padrão
                  example: 'https://kobana.com.br/p/abc123.png'
                pdf:
                  type: string
                  description: URL PDF padrão
                  example: 'https://kobana.com.br/p/abc123.pdf'
            qrcode:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode'
                png:
                  type: string
                  description: URL PNG QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.png'
                pdf:
                  type: string
                  description: URL PDF QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.pdf'
        additional_info:
          anyOf:
            - type: object
              additionalProperties:
                type: string
                maxLength: 200
              maxProperties: 10
            - type: 'null'
          description: Informações adicionais para o pagador (máximo 10 pares chave-valor)
          examples:
            - Pedido: '12345'
              Cliente: João Silva
            - Referência: FATURA-001
            - null
        qrcode:
          type: object
          description: QR Code do Pix
          readOnly: true
          properties:
            emv:
              anyOf:
                - type: string
                  pattern: '^[0-9A-Za-z\+\/\=\.\:\-\*]+$'
                - type: 'null'
              description: QR Code no formato EMV.
              readOnly: true
              examples:
                - 00020126...
                - null
            png:
              anyOf:
                - type: string
                  contentEncoding: base64
                  contentMediaType: image/png
                - type: 'null'
              description: QR Code no formato PNG em base64.
              readOnly: true
              examples:
                - iVBORw0KGgoAAAANSUhEUgAA...
                - null
        registration_kind:
          type: string
          enum:
            - instant
            - billing
          default: instant
          writeOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        kind:
          type: string
          enum:
            - instant
            - billing
          readOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        command_ids:
          type: array
          readOnly: true
          items:
            type: integer
            description: IDs dos registros de Comandos do Pix
        payments:
          type: array
          readOnly: true
          items:
            type: string
            format: uuid
            description: UID do Recebimento
          description: Lista de UIDs dos Recebimentos vinculados ao Pix
          examples:
            - - 018df180-7208-727b-a10a-ea545e4a75a8
            - []
            - - 018df180-7208-727b-a10a-ea545e4a75a8
              - 018df180-8319-8a9c-b21b-fa656f5b86b9
        end_to_end_id:
          anyOf:
            - type: string
              pattern: '^[A-Z]{1}[0-9]{8}[0-9]{4}[0-9]{2}[0-9]{2}[0-9]{4}[0-9a-zA-Z]{11}$'
            - type: 'null'
          readOnly: true
          description: End To End Id do Pix - Identificador único da transferência
          examples:
            - E12345678202301011200123456789AB
            - null
        custom_data:
          anyOf:
            - type: object
              additionalProperties:
                anyOf:
                  - type: string
                  - type: number
                  - type: boolean
                  - type: 'null'
            - type: 'null'
          examples:
            - codigo: '123'
              vip: true
            - referencia: PEDIDO-001
              prioridade: alta
            - null
          description: Hash com chave e valor no formato JSON.
        external_id:
          type: string
          nullable: true
          description: Identificador externo para o Pix
          example: pix_123
        virtual_pix_uid:
          type: string
          readOnly: true
          nullable: true
          description: UID do Pix gerado por membro BackOffice. (BackOffice precisa estar habilitado).
          example: null
        fine:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de multa (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo do Multa: none=Sem multa, amount=Por valor, percentage=Por porcentagem'
              enum:
                - none
                - amount
                - percentage
              example: amount
            amount:
              type: number
              format: float
              nullable: true
              description: Valor da Multa
              example: 50
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual da Multa
              example: 5
        reduction:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de abatimento (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de Abatimento: none=Não se aplica, amount=Por valor, percentage=Por porcentagem'
              enum:
                - none
                - amount
                - percentage
              example: amount
            amount:
              type: number
              format: float
              nullable: true
              description: Valor do Abatimento
              example: 25
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual do Abatimento
              example: 2.5
        interest:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de juros (retorna como objeto nested)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de Juros: daily_amount_calendar, daily_percentage_calendar, monthly_percentage_calendar, yearly_percentage_calendar, daily_amount_business, daily_percentage_business, monthly_percentage_business, yearly_percentage_business'
              enum:
                - daily_amount_calendar
                - daily_percentage_calendar
                - monthly_percentage_calendar
                - yearly_percentage_calendar
                - daily_amount_business
                - daily_percentage_business
                - monthly_percentage_business
                - yearly_percentage_business
              example: daily_percentage_calendar
            amount:
              type: number
              format: float
              nullable: true
              description: Valor do Juros
              example: 20
            percentage:
              type: number
              format: float
              nullable: true
              description: Percentual do Juros
              example: 2.5
        discounts:
          type: object
          nullable: true
          readOnly: true
          description: Configuração de descontos (retorna como objeto nested com até 3 descontos)
          properties:
            type:
              type: string
              nullable: true
              description: 'Tipo de desconto: fixed_amount, fixed_percentage, advance_amount_calendar, advance_amount_business, advance_percentage_calendar, advance_percentage_business'
              enum:
                - fixed_amount
                - fixed_percentage
                - advance_amount_calendar
                - advance_amount_business
                - advance_percentage_calendar
                - advance_percentage_business
              example: fixed_amount
            discount_first:
              type: object
              nullable: true
              description: Primeiro desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do primeiro desconto
                  example: 10
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do primeiro desconto
                  example: 5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o primeiro desconto
                  example: 5
            discount_second:
              type: object
              nullable: true
              description: Segundo desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do segundo desconto
                  example: 5
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do segundo desconto
                  example: 2.5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o segundo desconto
                  example: 10
            discount_third:
              type: object
              nullable: true
              description: Terceiro desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do terceiro desconto
                  example: 2.5
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do terceiro desconto
                  example: 1
                days:
                  type: integer
                  nullable: true
                  description: Dias para o terceiro desconto
                  example: 15
        ignore_whatsapp:
          type: boolean
          nullable: true
          default: false
          description: Nunca enviar este Pix por WhatsApp
          example: false
        password_protected_mode:
          type: integer
          nullable: true
          enum:
            - 0
            - 1
            - 2
          description: 'Modo de proteção por senha: 0=desabilitado, 1=últimos 4 dígitos, 2=primeiros 5 dígitos'
        tags:
          type: array
          nullable: true
          description: Tags associadas ao pix
          example: null
          items:
            type: string
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao pix
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_pix_update:
      type: object
      properties:
        amount:
          type: number
          format: float
          description: Quantia
          example: 120.99
        pix_account_uid:
          type: string
          format: uuid
          nullable: true
          description: |
            UID da Conta Pix para alterar a chave Pix do recebedor.

            Este campo é útil quando você deseja alterar a chave Pix no provedor financeiro.

            **Importante**: Somente são aceitas contas Pix que estejam ativas (status `active`).
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
