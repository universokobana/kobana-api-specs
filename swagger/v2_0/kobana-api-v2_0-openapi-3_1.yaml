            bank_account:
              type: object
              description: Dados bancários (Presente se o campo `transfer_kind` for `ted`)
              nullable: true
              properties:
                compe_number:
                  type: integer
                  description: |-
                    Código COMPE do banco.

                    Exemplos: `1` (Banco do Brasil), `237` (Bradesco), `341` (Itaú)
                  example: 1
                ispb_number:
                  type: integer
                  nullable: true
                  description: |-
