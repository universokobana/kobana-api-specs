            - 1
            - 2
          default: 0
        reduction_amount:
          type: string
          nullable: true
          example: '25.00'
          description: Valor do Abatimento
        reduction_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual do Abatimento
        interest_type:
          type: integer
          nullable: true
          description: |-
