              address:
                type: string
                nullable: false
                maxLength: 80
                description: Endereço de E-mail
                example: kobana@example.com
        tags:
          type: array
          nullable: true
          description: Tags associadas ao registro
          example: null
          items:
            type: string
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Lista de tags separadas por vírgula
        custom_data:
          type: object
          nullable: true
