                          example: 2
        - type: object
          description: Payload para criar um Pagamento de Conta de Consumo
          required:
            - kind
            - amount
            - financial_account_uid
            - utility
          properties:
            kind:
              type: string
              enum:
                - pix
                - bank_billet
                - darf
                - tax
                - utility
              description: Tipo do pagamento (obrigatório)
              example: pix
            beneficiary:
              type: object
              nullable: true
              description: Informações do beneficiário do pagamento
              properties:
                name:
                  type: string
                  nullable: true
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  nullable: true
                  description: CPF/CNPJ do beneficiário
                  example: 123.456.789-00
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              format: date
              nullable: true
              description: Data de Agendamento
              example: '2023-12-12'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            utility:
              type: object
              required:
                - code
              description: Dados da Conta de Consumo
              properties:
                code:
                  type: string
                  description: Código de Barras ou Linha Digitável
