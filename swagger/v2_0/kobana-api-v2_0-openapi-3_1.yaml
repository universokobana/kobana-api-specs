            Tipo de juros:
                                * `0` Não se aplica / isento (`none`)
                                * `1` Valor diário — dias corridos (`daily_amount_calendar`)
                                * `2` Percentual diário — dias corridos (`daily_percentage_calendar`)
                                * `3` Percentual mensal — dias corridos (`monthly_percentage_calendar`)
                                * `4` Percentual anual — dias corridos (`yearly_percentage_calendar`)
                                * `5` Valor diário — dias úteis (`daily_amount_business`)
                                * `6` Percentual diário — dias úteis (`daily_percentage_business`)
                                * `7` Percentual mensal — dias úteis (`monthly_percentage_business`)
                                * `8` Percentual anual — dias úteis (`yearly_percentage_business`)
