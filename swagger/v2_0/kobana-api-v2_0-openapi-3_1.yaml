          type: array
          items:
            type: string
          nullable: true
          description: Tags.
        addressee_financial_account:
          type: object
          description: Conta Financeira do Destinatário (usuário pagador)
          required:
            - kind
            - account_number
            - account_digit
            - agency_number
            - bank
            - person_info
          properties:
            kind:
              type: string
              enum:
                - checking
                - savings
                - payment
              description: Tipo de conta
            account_number:
              type: string
              description: Número da conta (sem o dígito verificador)
            account_digit:
              type: string
              description: Dígito verificador da conta
            agency_number:
              type: string
              description: Número da agência
            bank:
              type: object
              properties:
                ispb_number:
                  type: string
                  description: Código ISPB do banco
            person_info:
              type: object
              required:
                - document_type
                - document_number
                - kind
                - name
              properties:
                document_type:
                  type: string
                  enum:
                    - CPF
                    - CNPJ
                  description: Tipo do documento
                document_number:
                  type: string
                  description: Número do documento do titular
                kind:
                  type: string
                  enum:
                    - natural
                    - juridical
                  description: Tipo de pessoa
                name:
                  type: string
                  description: Nome do titular
