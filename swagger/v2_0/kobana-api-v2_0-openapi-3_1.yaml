                  editable: true
                  status: pending
                  letter_status: creating
                  external_letter_status: null
                  letter_signed_url: null
                  error_message: null
                  enabled_at: null
                  disabled_at: null
                  validated_at: null
                  rejected_at: null
                  rejection_reason: null
                  bank_billets_sync_last_updated_at: null
                  created_at: '2026-06-28T15:46:02+02:00'
                  updated_at: '2026-06-28T15:46:02+02:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `201`.'
                  data:
                    $ref: '#/components/schemas/v2_dda_account'
        '401':
          description: Falha de autenticacao. Token invalido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
