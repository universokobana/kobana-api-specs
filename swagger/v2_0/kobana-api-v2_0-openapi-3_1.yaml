          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: 'UUID da conta DDA (Dda::Account) que originou este boleto. Permite atribuir cada boleto à sua conta DDA quando a conta macro possui múltiplas contas DDA (CNPJs distintos). Nulo para registros legados ainda não backfillados.'
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto DDA foi recebido e registrado na plataforma Kobana.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: 'Data e hora (ISO 8601) da última atualização deste boleto (alteração de status, sincronização de dados, etc.).'
