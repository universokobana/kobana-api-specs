          type: string
          readOnly: true
          format: uuid
          description: UID da Conta Financeira de Origem
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payment_account_uid:
          type: string
          readOnly: true
          nullable: true
          format: uuid
          description: 'Conta de pagamento de origem. Quando não informada na criação, usou-se automaticamente a mais antiga da conta financeira.'
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        batch_uid:
          type: string
          readOnly: true
          nullable: true
          format: uuid
          description: UID do Lote ao qual este pagamento pertence
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        external_id:
          type: string
          nullable: true
          example: 123456-abc-789
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          items:
            type: string
            example: tag1
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem do Pagamento.

            `api`: API.
            `dda`: DDA.
            `view`: Manual
