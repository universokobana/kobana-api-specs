            Tipo da multa:
                                * `0` Sem multa (`none`)
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                No retorno os dados vêm no objeto `fine`.
          example: 1
        fine_amount:
          type: number
          format: float
          writeOnly: true
          description: Valor da multa em reais. Obrigatório quando `fine_type` = `amount`.
