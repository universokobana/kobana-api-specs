                custom_data:
                  type: object
                  nullable: true
                  additionalProperties:
                    type: string
                  description: Dados personalizados definidos pelo usuário no formato chave-valor.
                tags:
                  type: array
                  nullable: true
                  items:
                    type: string
                  description: Lista de etiquetas associadas à recorrência.
                debtor:
                  type: object
                  properties:
