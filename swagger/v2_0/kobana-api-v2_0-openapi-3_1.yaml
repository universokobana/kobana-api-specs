    v2_statement_transaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da transação
        financial_account_uid:
          type: string
          readOnly: true
          format: uuid
          description: UID da Conta Financeira
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          format: float
          example: 120.99
          description: |
            Quantia
            Obs: Transações de crédito terão o valor positivo e transações de débito terão o valor negativo.
        person:
          type: object
          nullable: true
          readOnly: true
          properties:
            document_number:
              type: string
              nullable: true
              description: Número do Documento.
              example: 05.813.794/0001-26
            name:
              type: string
              nullable: true
              description: Nome Completo ou Razão Social
              example: Kobana Tecnologia Ltda.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora da criação da transação na Kobana
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização da transação na Kobana
        occurrence_date:
          type: string
          format: date
          description: Data de ocorrência da transação.
          example: '2023-12-02'
        description:
          type: string
          nullable: true
          readOnly: true
          description: Descrição da transação.
        document_number:
          type: string
          nullable: true
          readOnly: true
          description: Número do documento da transação.
        kind:
          type: string
          readOnly: true
          description: |
            Tipo da transação

            `credit`: Crédito
            `debit`: Débito
        category:
          type: integer
          readOnly: true
          description: |
            Categoria do Lançamento.
        category_description:
          type: string
          readOnly: true
          description: |
            Descrição da Categoria do Lançamento.
        hashed_content:
          type: string
          readOnly: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
            occurrence_date

        hashed_id:
          type: string
          readOnly: true
          deprecated: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
            occurrence_date

    v2_financial_account_command:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        uid:
          type: string
          format: uuid
          readOnly: true
          description: 'Identificador público (UUID) do Comando. Utilizado como parâmetro na consulta individual (`GET /commands/{uid}`).'
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `statement_sync`: Sincronização de Extrato.
        resource_type:
          type: string
          readOnly: true
          nullable: true
          description: 'Tipo do recurso ao qual o Comando pertence (ex.: `BankBillet`, `Pix`, `Financial::Account`).'
        resource_uid:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Identificador público (UUID) do recurso ao qual o Comando pertence.
        financial_provider_slug:
          type: string
          readOnly: true
          nullable: true
          description: Slug do provedor financeiro (banco) responsável pela execução do Comando.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        confirmation_via:
          type: string
          enum:
            - api
            - edi
          readOnly: true
          nullable: true
          description: |
            Origem da confirmação do Comando.

            `api`: confirmado via resposta da API do banco (inclui webhooks, Recuperator e sync).
            `edi`: confirmado via retorno CNAB (arquivo de baixa).
            `null`: Sem origem registrada.
        financial_account:
          $ref: '#/components/schemas/v2_financial_account'
    v2_import:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: UID da Importação.
        status:
          type: string
          readOnly: true
          description: |
            Status da importação.

            `enqueued`: Aguardando processamento. [Estado inicial]
            `failed`: Processamento não realizado devido a erro.
            `processed`: Processamento concluído.
        started_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora de início do processamento da Importação
          nullable: true
        finished_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora de fim do processamento da Importação
          nullable: true
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora da criação da Importação
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora da atualização da Importação.
        created_rows:
          type: integer
          readOnly: true
        enqueued_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        processed_at:
          type: string
          format: date-time
          readOnly: true
          nullable: true
        failed_to_create_rows:
          type: integer
          readOnly: true
        failed_to_update_rows:
          type: integer
          readOnly: true
        import_errors:
          type: object
          readOnly: true
          nullable: true
        processed_rows:
          type: integer
          readOnly: true
        total_rows:
          type: integer
          readOnly: true
          nullable: true
        updated_rows:
          type: integer
          readOnly: true
        external_id:
          type: string
          nullable: true
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          example: null
          items:
            type: string
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o registro foi criado por API
    v2_import_send:
      type: object
      required:
