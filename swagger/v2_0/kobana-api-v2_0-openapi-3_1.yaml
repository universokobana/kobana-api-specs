          type: string
          description: |
            Status do Pagamento.

            `pending`: Pendente.
            `rejected`: Rejeitado.
            `approved`: Aprovado.
            `reproved`: Reprovado.
            `failed`: Falha.
            `confirmed`: Confirmado.
            `canceled`: Cancelado.
            `awaiting_approval`: Aguardando Aprovação.
            `scheduled`: Agendado.
            `awaiting_scheduled_date`: Aguardando Data Agendada.
            `overdue`: Vencido.
            `awaiting_funds`: Aguardando Saldo.
            `finishing`: Finalizando
        registration_status:
          readOnly: true
          type: string
          description: |
