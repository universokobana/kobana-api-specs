    post:
      summary: Criar um Pagamento
      tags:
        - Pagamentos
      security:
        - bearerAuth: []
      description: |
        Endpoint genérico para criação de pagamentos de qualquer tipo. O tipo deve ser especificado no campo `kind`.

        ## Tipos Suportados

        ### PIX
        Usar `kind: "pix"` e fornecer a chave `pix`:
        ```json
        {
          "kind": "pix",
          "financial_account_uid": "...",
          "amount": 100.0,
          "pix": {
            "qrcode": "00020126330014br.gov.bcb.pix..."
          }
        }
        ```

        ### Boleto Bancário
        Usar `kind: "bank_billet"` e fornecer a chave `bank_billet`:
        ```json
        {
          "kind": "bank_billet",
          "financial_account_uid": "...",
          "amount": 200.0,
          "bank_billet": {
            "code": "81770000001-8 00005659970-7 41131079703-9 0014334-8"
          }
        }
        ```

        ### DARF
        Usar `kind: "darf"` e fornecer a chave `darf`:
        ```json
        {
          "kind": "darf",
          "financial_account_uid": "...",
          "amount": 300.0,
          "darf": {
            "tax_code": "0107",
            "calculation_date": "2024-12-31",
            "expire_at": "2025-01-10"
          }
        }
        ```

        ### Tributos (Tax)
        Usar `kind: "tax"` e fornecer a chave `tax` com código de barras:
        ```json
        {
          "kind": "tax",
          "financial_account_uid": "...",
          "amount": 400.0,
          "tax": {
            "kind": "iptu",
            "code": "81770000001-8 00005659970-7..."
          }
        }
        ```

        ### Contas de Consumo (Utility)
        Usar `kind: "utility"` e fornecer a chave `utility`:
        ```json
        {
          "kind": "utility",
          "financial_account_uid": "...",
          "amount": 500.0,
          "utility": {
            "code": "81770000001-8 00005659970-7..."
          }
        }
        ```

        ## Eventos de Webhook

        O evento `payment.db.created` é disparado nesta operação.

        [block:callout]
        {
          "type": "info",
          "body": "Este endpoint unifica a criação de todos os tipos de pagamento. Para criar pagamentos de um tipo específico, você também pode usar os endpoints dedicados em `/api/v2/payment/{type}`.",
          "title": "Endpoint Unificado"
        }
        [/block]
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Pagamento Conta de Consumo criado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019d03cf-3751-7c8e-9283-97593bc563c9
                  kind: utility
                  amount: 500
