          type: array
          nullable: true
          description: Lista de Endereços
          items:
            type: object
            required:
              - street
              - neighborhood
              - city_name
              - zip_code
            properties:
              street:
                type: string
                nullable: false
                maxLength: 255
                description: Logradouro
                example: Av. Rio Branco
              number:
                type: string
                nullable: true
                maxLength: 10
                description: Número
                example: '26'
              complement:
                type: string
                nullable: true
                maxLength: 60
                description: Complemento
                example: Sobreloja
              neighborhood:
                type: string
                nullable: false
                maxLength: 80
                description: Bairro
                example: Centro
              city_name:
                type: string
                nullable: false
                maxLength: 60
                description: Cidade. Nome deve estar correto e completo
                example: Rio de Janeiro
              state:
                type: string
                nullable: true
                maxLength: 2
                description: Estado
                example: RJ
              zip_code:
                type: string
                nullable: false
                maxLength: 8
                description: CEP (formato 99999999)
                example: '20090001'
              short:
                type: string
                readOnly: true
                description: Endereço Curto
                example: 'Av. Rio Branco, 26, Sobreloja'
              full:
                type: string
                readOnly: true
                description: Endereço Completo
                example: 'Av. Rio Branco, 26, Sobreloja, Centro, Rio de Janeiro, RJ. CEP: 20090-001'
              google_maps:
                type: string
                readOnly: true
                description: Endereço para Google Maps
                example: 'Av. Rio Branco, 26, Centro, Rio de Janeiro, RJ'
        phones:
          type: array
          nullable: true
          description: Lista de Telefones
          items:
            type: object
            required:
              - number
            properties:
              kind:
                type: string
                nullable: true
                enum:
                  - mobile
                  - landline
                description: Tipo (Celular/Fixo)
                example: mobile
              country_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 6
                description: Código do País
                example: '55'
              local_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 2
                description: Código Local
                example: '21'
              number:
                type: string
                nullable: false
                minLength: 8
                maxLength: 9
                description: Número do Telefone
                example: '30030386'
        emails:
          type: array
          nullable: true
          description: Lista de Emails
          items:
            type: object
            required:
              - address
            properties:
              label:
                type: string
                nullable: true
                description: Etiqueta (label)
                example: work
              address:
                type: string
                nullable: false
                maxLength: 80
                description: Endereço de E-mail
                example: kobana@example.com
        tags:
          type: array
          nullable: true
          description: Tags associadas ao registro
          example: null
          items:
            type: string
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Lista de tags separadas por vírgula
        custom_data:
          type: object
          nullable: true
          description: Disponível para envio de um JSON com uma estrutura de dados livre
          example: '{"source": "ERP X", "migration": true}'
        notes:
          type: string
          nullable: true
          description: Observações. Campo de texto livre
          example: Essa é a empresa da plataforma de automação financeira.
        created_via_api:
          type: boolean
          readOnly: true
          description: Indica se o registro foi criado pela API
          example: null
        created_at:
          type: string
          format: date-time
          nullable: false
          readOnly: true
          description: Data e hora de criação do registro no banco de dados
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro no banco de dados
