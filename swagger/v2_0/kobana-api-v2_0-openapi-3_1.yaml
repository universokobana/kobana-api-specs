        - bearerAuth: []
      description: |-

        > **Processamento Assíncrono:** cria um comando de reagendamento (mudança da data de pagamento) para a Transferência.

        > ⚠️ **Suporte por banco:** nenhum provedor financeiro suporta reagendamento de transferência interna via API no momento — a chamada responde `422` ("não possui suporte a esta operação via API para este provedor financeiro"). O endpoint existe para simetria e habilita o suporte automaticamente quando algum provedor o implementar.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: uid
          in: path
          description: UUID da Transferência
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Provedor sem suporte ao reagendamento via API
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: unprocessable_content
                    title: Não foi possível gerar Comando de Reagendamento de Transferência.
                    detail: Transferência nova data não pode ser no passado
