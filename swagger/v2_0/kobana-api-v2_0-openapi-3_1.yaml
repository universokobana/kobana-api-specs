      summary: Listar Comandos
      tags:
        - Comando
      security:
        - bearerAuth: []
      description: 'Lista todos os Comandos da conta, com suporte a filtros por status, operação e origem de confirmação.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: status
          in: query
          required: false
          description: Filtrar por status do Comando.
          example: confirmed
          schema:
            type: string
        - name: operation
          in: query
          required: false
          description: Filtrar por tipo de operação.
          example: register
          schema:
            type: string
        - name: confirmation_via
          in: query
          required: false
          description: 'Filtrar por origem da confirmação. Valores: `api`, `edi`.'
          example: api
          schema:
            type: string
        - name: created_from
          in: query
          required: false
          description: 'Filtrar por data de criação (início). Formato: YYYY-MM-DD.'
          example: '2026-01-01'
          schema:
            type: string
        - name: created_to
          in: query
          required: false
          description: 'Filtrar por data de criação (fim). Formato: YYYY-MM-DD.'
          example: '2026-12-31'
          schema:
            type: string
        - name: resource_type
          in: query
          required: false
          description: 'Filtrar por tipo de recurso (ex.: `BankBillet`, `Pix`, `Financial::Transfer`).'
          example: BankBillet
          schema:
            type: string
        - name: resource_uid
          in: query
          required: false
          description: 'Filtrar Comandos de um recurso específico (boleto, Pix ou conta financeira) pelo seu uid.'
          example: 018f1a2b-3c4d-7e5f-8a9b-0c1d2e3f4a5b
          schema:
            type: string
        - name: financial_provider_slug
          in: query
          required: false
          description: Filtrar pelo slug do provedor financeiro.
          example: itau
          schema:
            type: string
        - name: bank_billet_account_uid
          in: query
          required: false
          description: 'Filtrar Comandos de Boletos de uma carteira (BankBilletAccount) específica, pelo seu uid.'
          example: 018f1a2b-3c4d-7e5f-8a9b-0c1d2e3f4a5b
          schema:
            type: string
        - name: pix_account_uid
          in: query
          required: false
          description: 'Filtrar Comandos de Pix de uma Conta Pix (PixAccount) específica, pelo seu uid.'
          example: 018f1a2b-3c4d-7e5f-8a9b-0c1d2e3f4a5b
          schema:
            type: string
      responses:
        '200':
          description: Lista paginada de Comandos
          content:
            application/json:
              example:
                status: 200
                data:
                  - id: 4
                    uid: 019f6c9d-08be-7517-97d2-a8527cdd7e9d
                    status: confirmed
                    operation: register
                    resource_type: BankBillet
                    resource_uid: 019f6c9d-08b0-7112-9a87-2eec61486c6d
                    financial_provider_slug: sicoob
                    params: {}
                    payload: null
                    created_at: '2026-07-17T05:27:38+09:00'
                    updated_at: '2026-07-17T05:27:38+09:00'
                    message: null
                    error_message: null
                    warning_message: null
                    confirmation_via: api
                pagination:
                  prev_url: null
                  next_url: null
                  page: 1
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: Status HTTP.
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/v2_command'
                  pagination:
                    $ref: '#/components/schemas/v2_pagination'
        '401':
          description: Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Escopo integration.commands ausente
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "all integration.commands".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
