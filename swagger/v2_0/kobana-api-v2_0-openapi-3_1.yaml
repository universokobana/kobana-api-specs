            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
