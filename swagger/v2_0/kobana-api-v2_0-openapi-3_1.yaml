  '/v2/financial/accounts/{uid}':
    delete:
      summary: Excluir uma Conta
      tags:
        - Contas
      security:
        - bearerAuth: []
      description: |
        Exclui uma Conta Financeira. A exclusão é processada de forma assíncrona.

        ⚠️ Atenção: esta operação remove em cascata todos os registros
        associados à Conta Financeira, incluindo carteiras de boleto,
        transferências, pagamentos, extratos e demais recursos vinculados.
        Essa ação não pode ser desfeita.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: uid
          in: path
          description: UID da Conta Financeira
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '202':
          description: Conta enviada para exclusão
          content:
            application/json:
              example:
                status: 202
                message: Conta Financeira enviada para ser excluída! Logo ela será removida definitivamente.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    example: 202
                  message:
                    type: string
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o `scope` obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
