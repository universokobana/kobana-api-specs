          description: Falha de permissão. Token sem o escopo `write`.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '404':
          description: Conta de Pagamento não encontrada
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Erro de validação. `remittance_enabled` deve ser verdadeiro ou falso.
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: remittance_enabled
                    detail: Remessa habilitada deve ser verdadeiro ou falso
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `422`.'
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: 'Tipo do erro. Ex: `validation_error`.'
                        param:
                          type: string
                          description: 'Parâmetro com erro. Ex: `remittance_enabled`.'
                        detail:
                          type: string
                          description: Mensagem descritiva do erro.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remittance_enabled:
                  type: boolean
                  description: Habilita ou desabilita a geração de remessas EDI para esta conta.
