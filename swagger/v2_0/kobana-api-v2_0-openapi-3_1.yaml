                    tag_list: null
                    formats:
                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-05-05T06:31:48+05:30'
                    updated_at: '2026-05-05T06:31:48+05:30'
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
