          type: string
          nullable: true
          description: ID da pasta de entrada no Syncthing
        outbox_folder_id:
          type: string
          nullable: true
          description: ID da pasta de saída no Syncthing
        server_status:
          type: string
          readOnly: true
          enum:
            - connected
            - disconnected
            - updating
            - error
          description: |-
            Status do servidor Syncthing:
            `connected`: Conectado
            `disconnected`: Desconectado
            `updating`: Atualizando
            `error`: Erro
        error_message:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem de erro quando o status é error
    v2_account:
      type: object
      properties:
        id:
          type: integer
          deprecated: true
          description: 'ID da conta (deprecated, use uid)'
          example: 123
        uid:
          type: string
          description: UID público da conta
          example: acc_1234567890
        email:
          type:
            - string
            - 'null'
          format: email
          description: E-mail da conta
          example: conta@example.com
        account_type:
          type:
            - string
            - 'null'
          description: Tipo da conta
          example: business
        gender:
          type:
            - string
            - 'null'
          description: Gênero
          example: male
        cpf:
          type:
            - string
            - 'null'
          description: CPF
          example: 123.456.789-00
        business_name:
          type:
            - string
            - 'null'
          description: Nome fantasia
          example: Empresa LTDA
        business_legal_name:
          type:
            - string
            - 'null'
          description: Razão social
          example: Empresa LTDA ME
        business_cnpj:
          type:
            - string
            - 'null'
          description: CNPJ
          example: 12.345.678/0001-90
        full_name:
          type:
            - string
            - 'null'
          description: Nome completo
          example: João Silva Santos
        nickname:
          type:
            - string
            - 'null'
          description: Apelido da conta
          example: Conta Principal
        parent_id:
          type:
            - integer
            - 'null'
          deprecated: true
          description: 'ID da conta principal (deprecated, use parent_uid)'
          example: 123
        parent_uid:
          type:
            - string
            - 'null'
          format: uuid
          description: UID da conta principal
          example: acc_1234567890
        feature_flags:
          type: array
          description: Feature flags habilitadas para a conta
          items:
            type: string
          example:
            - feature_1
            - feature_2
  securitySchemes:
    v2_bearerAuth:
      type: http
      scheme: bearer
  parameters: {}
  responses: {}
