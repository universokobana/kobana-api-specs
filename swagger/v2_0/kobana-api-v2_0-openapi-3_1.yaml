          type: string
          enum:
            - fixed
            - variable
          description: Tipo do valor da recorrência.
        amount:
          type: number
          format: float
          nullable: true
          description: Valor (quando amount_term é fixed).
        minimum_amount:
          type: number
          format: float
          nullable: true
          description: Valor mínimo (quando amount_term é variable).
        agreement_code:
          type: string
          maxLength: 60
          nullable: true
          description: Número do Convênio de Pagamento.
        retry_policy:
          type: string
          enum:
            - disallow
            - allow_3r7d
          description: Política de retentativa.
        external_id:
          type: string
          nullable: true
          description: ID externo da recorrência.
        custom_data:
          type: object
          nullable: true
          description: Dados personalizados.
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags.
        debtor:
          type: object
          description: Informações da pessoa devedora
          required:
            - document_type
            - document_number
            - kind
            - name
          properties:
            document_type:
              type: string
