                        example: '001'
                      ispb_number:
                        type: string
                        description: Código ISPB do banco
                        example: '00000000'
                      name:
                        type: string
                        description: Nome do banco
                        example: Banco do Brasil S.A.
                  person_info:
                    type: object
                    properties:
                      document_type:
                        type: string
                        enum:
                          - CPF
                          - CNPJ
                        description: Tipo do documento da pessoa
                        example: CPF
                      document_number:
                        type: string
