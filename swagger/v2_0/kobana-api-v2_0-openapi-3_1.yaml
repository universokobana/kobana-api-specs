                      enum:
                        - CPF
                        - CNPJ
                      description: Tipo do documento.
                    document_number:
                      type: string
                      description: Número do documento.
                    kind:
                      type: string
                      enum:
                        - natural
                        - juridical
                      description: Tipo de pessoa.
                    name:
                      type: string
                      maxLength: 140
                      description: Nome do devedor.
              required:
                - pix_account_uid
                - financial_account_uid
                - start_at
                - document
                - debtor
                - retry_policy
                - cycle
                - recurrence_term
                - amount_term
