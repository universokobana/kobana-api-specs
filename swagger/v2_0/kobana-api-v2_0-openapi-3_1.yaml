      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: UUID da conta de transferência
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        financial_account_uid:
          type: string
          readOnly: true
          description: UUID da conta financeira associada
          example: f123456a-01b2-3456-78c9-def012345678
        agreement_code:
          type: string
          nullable: true
          description: Código do convênio
          example: '123456'
        service_point_number:
          type: string
          nullable: true
          description: Número do ponto de atendimento
          example: '0001'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de transferência
          example: external-transfer-123
        balance_validation_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a validação de saldo foi habilitada
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_transfer:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID da Transferência
        status:
          readOnly: true
          type: string
          description: |
            Status.
            `pending`: Pendente. [Estado Inicial]
            `awaiting_approval`: Aguardando aprovação.
            `confirmed`: Confirmado.
            `reproved`: Reprovado.
            `approved`: Aprovado.
            `rejected`: Rejeitado.
        registration_status:
          readOnly: true
          type: string
          description: |
            Status de Registro.
            `pending`: Pendente. [Estado Inicial]
            `requested`: Aguardando aprovação.
            `confirmed`: Confirmado.
            `rejected`: Rejeitado.
            `failed`: Falha.
        transfer_purpose:
          readOnly: true
          type: object
          nullable: true
          properties:
            code:
              type: string
              description: Código do objetivo da transferência
              example: '98'
            description:
              type: string
              description: Descrição do objetivo da transferência
              example: Pagamentos Diversos
          description: |
            Objetivo da Transferência.
            `01`: Cobrança
            `03`: Boleto de Pagamento Eletrônico
            `04`: Conciliação Bancária
            `05`: Débitos
            `06`: Custódia de Cheques
            `07`: Gestão de Caixa
            `08`: Consulta/Informação Margem
            `09`: Averbação da Consignação/Retenção
            `10`: Pagamento Dividendos
            `11`: Manutenção da Consignação
            `12`: Consignação de Parcelas
            `13`: Glosa da Consignação (INSS)
            `14`: Consulta de Tributos a pagar
            `20`: Pagamento Fornecedor
            `22`: Pagamento de Contas, Tributos e Impostos
            `23`: Interoperabilidade entre Contas de Instituições de Pagamentos
            `25`: Compror
            `26`: Compror Rotativo
            `29`: Alegação do Pagador
            `30`: Pagamento Salários
            `32`: Pagamento de honorários
            `33`: Pagamento de bolsa auxílio
            `34`: Pagamento de prebenda (remuneração a padres e sacerdotes)
            `40`: Vendor
            `41`: Vendor a Termo
            `50`: Pagamento Sinistros Segurados
            `60`: Pagamento Despesas Viajante em Trânsito
            `70`: Pagamento Autorizado
            `75`: Pagamento Credenciados
            `77`: Pagamento de Remuneração
            `80`: Pagamento Representantes / Vendedores Autorizados
            `90`: Pagamento Benefícios
            `98`: Pagamentos Diversos
        financial_account_uid:
          type: string
          format: uuid
          description: UID da Conta Financeira de Origem
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          format: float
          description: Quantia
        scheduled_to:
          type: string
          nullable: true
          format: date
          example: '2023-12-12'
          description: Data de Agendamento
        confirmed_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Confirmação
        rejected_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Rejeição
        rejected_error:
          type: string
          readOnly: true
          nullable: true
          description: Motivo da rejeição retornado pelo banco
        transaction_code:
          readOnly: true
          nullable: true
          type: string
          description: Código de Autenticação
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        transaction_date:
          readOnly: true
          nullable: true
          type: string
          format: date-time
          description: Data de Autenticação
          example: '2023-12-12'
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem da Transferência.

            `api`: API.
            `view`: Manual
        target:
          type: object
          properties:
            transfer_kind:
              type: string
              nullable: false
              description: |
                Tipo da transferência

                `pix`: Pix.
                `ted`: TED.
                `internal`: Entre Contas
            pix:
              type: object
              nullable: true
              description: Dados do Pix (Presente se o campo `transfer_kind` for `pix`)
              properties:
                txid:
                  type: string
                  nullable: true
                  description: TXID
                pix_type:
                  type: string
                  description: |
                    Tipo do Pix

                    `key`: Chave.
                    `bank_account`: Dados bancários
                key_type:
                  type: string
                  nullable: true
                  description: |
                    Tipo da Chave (Presente se o campo `pix_type` for `key`)

                    `cpf`: CPF.
                    `cnpj`: CNPJ.
                    `random`: Aleatória.
                    `email`: E-mail.
                    `phone`: Celular
                key:
                  type: string
                  nullable: true
                  description: Chave Pix (Presente se o campo `pix_type` for `key`)
            bank_account:
              type: object
              description: Dados bancários (Presente se o campo `transfer_kind` for `ted`)
              nullable: true
              properties:
                compe_number:
                  type: integer
                  description: |-
                    Código COMPE do banco.

                    Exemplos: `1` (Banco do Brasil), `237` (Bradesco), `341` (Itaú)
                  example: 1
                ispb_number:
                  type: integer
                  nullable: true
                  description: |-
                    Código ISPB do banco.

                    Se não fornecido no input, será inferido automaticamente a partir do COMPE quando possível.

                    Exemplos: `0` (Banco do Brasil), `60746948` (Bradesco), `60701190` (Itaú)
                  example: 60701190
                agency_number:
                  type: string
                  description: Número da Agência
                agency_digit:
                  type: string
                  description: Dígito da Agência
                account_number:
                  type: string
                  description: Número da Conta
                account_digit:
                  type: string
                  description: Dígito da Conta
            beneficiary:
              type: object
              description: Dados do Recebedor
              properties:
                document_number:
                  type: string
                  nullable: false
                  description: Número do Documento (CPF ou CNPJ)
                name:
                  type: string
                  nullable: false
                  description: Nome Completo ou Razão Social
        formats:
          readOnly: true
          nullable: true
          type: object
          description: URLs do comprovante de transferência (disponível após confirmação)
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  nullable: true
                  description: URL HTML do comprovante
                png:
                  type: string
                  nullable: true
                  description: URL PNG do comprovante
                pdf:
                  type: string
                  nullable: true
                  description: URL PDF do comprovante
        identifier:
          type: string
          nullable: true
          description: |
            Identificação do pagamento no comprovante do provedor financeiro. (Uso exclusivo do banco)

            Bancos que aceitam esse campo (via API): Itaú
        external_id:
          type: string
          nullable: true
          example: 123456-abc-789
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          items:
            type: string
            example: tag1
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação. Formato iso8601
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização. Formato iso8601
    v2_generic_transfer:
      type: object
      description: 'Transferência Genérica - Pode ser de qualquer tipo (PIX, TED ou Interna)'
      anyOf:
        - $ref: '#/components/schemas/v2_transfer_pix'
        - $ref: '#/components/schemas/v2_transfer_ted'
        - $ref: '#/components/schemas/v2_transfer_internal'
    v2_new_generic_transfer:
      type: object
      description: |-
        Nova Transferência Genérica.

        O tipo de transferência é especificado pelo campo 'kind':
        - `kind: "pix"`: Cria uma transferência PIX (dados em `pix: {}`)
        - `kind: "ted"`: Cria uma transferência TED (dados em `ted: {}`)
        - `kind: "internal"`: Cria uma transferência entre contas (dados em `internal: {}`)

        O campo 'kind' é obrigatório e deve estar no nível raiz do payload.
      oneOf:
        - type: object
          description: Payload para criar uma Transferência PIX
          required:
            - financial_account_uid
            - amount
            - kind
            - pix
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            beneficiary:
              type: object
              nullable: false
              description: Dados do beneficiário da transferência
              properties:
                name:
                  type: string
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  description: CPF/CNPJ do beneficiário
                  example: 123.456.789-00
            identifier:
              type: string
              nullable: true
              description: |
                Identificação da transferência no comprovante do provedor financeiro. (Uso exclusivo do banco)

                Bancos que aceitam esse campo (via API): Itaú
            kind:
              type: string
              enum:
                - pix
              description: Tipo da transferência (deve ser "pix")
            pix:
              type: object
              required:
                - data
              description: Dados específicos do PIX (dados dentro de data)
              properties:
                data:
                  type: object
                  required:
                    - type
                  description: Payload com os dados reais do PIX
                  oneOf:
                    - type: object
                      required:
                        - type
                        - key_type
                        - key
                      description: PIX por Chave
                      properties:
                        type:
                          type: string
                          enum:
                            - key
                          description: Tipo do Pix - por chave
                        key_type:
                          type: string
                          enum:
                            - random
                            - phone
                            - email
                            - cnpj
                            - cpf
                          description: Tipo da Chave Pix
                        key:
                          type: string
                          description: Chave Pix
                    - type: object
                      required:
                        - type
                        - bank_account
                      description: PIX por Conta Bancária
                      properties:
                        type:
                          type: string
                          enum:
                            - bank_account
                          description: Tipo do Pix - por conta bancária
                        bank_account:
                          type: object
                          required:
                            - compe_number
                            - agency_number
                            - account_number
                          description: Dados bancários
                          properties:
                            compe_number:
                              type: string
                              description: Código do banco (COMPE)
                              example: '237'
                            ispb_number:
                              type: string
                              nullable: true
                              description: ISPB do banco
                            agency_number:
                              type: string
                              description: Número da agência
                              example: '1234'
                            agency_digit:
                              type: string
                              nullable: true
                              description: Dígito da agência
                            account_number:
                              type: string
                              description: Número da conta
                              example: 56789-0
                            account_digit:
                              type: string
                              nullable: true
                              description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência TED
          required:
            - financial_account_uid
            - amount
            - kind
            - ted
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            beneficiary:
              type: object
              nullable: false
              description: Dados do beneficiário da transferência
              properties:
                name:
                  type: string
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  description: CPF/CNPJ do beneficiário
                  example: 123.456.789-00
            identifier:
              type: string
              nullable: true
              description: |
