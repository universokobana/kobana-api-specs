          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Ativação da Conexão
        validated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Validação da Conexão
        associations:
          type: array
          readOnly: true
          items:
            type: object
            required:
              - resource
            properties:
              resource:
                type: object
                required:
                  - slug
                  - uid
                properties:
                  slug:
                    type: string
                    enum:
                      - charge.bank_billet_account
                      - charge.pix_account
                      - payment.account
