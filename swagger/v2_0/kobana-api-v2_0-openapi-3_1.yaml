        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização da transação na Kobana
        occurrence_date:
          type: string
          format: date
          description: Data de ocorrência da transação.
          example: '2023-12-02'
        description:
          type: string
          nullable: true
          readOnly: true
          description: Descrição da transação.
        document_number:
          type: string
          nullable: true
          readOnly: true
          description: Número do documento da transação.
        kind:
          type: string
          readOnly: true
