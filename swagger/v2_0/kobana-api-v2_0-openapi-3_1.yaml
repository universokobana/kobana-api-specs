                  - pending
                  - created
                  - approved
                  - rejected
                  - expired
                  - canceled
                example: approved
              updated_at:
                type: string
                format: date_time
                example: '2024-02-01T10:00:00Z'
        cancellation:
          type: object
          nullable: true
          readOnly: true
          properties:
            origin:
              type: string
              enum:
