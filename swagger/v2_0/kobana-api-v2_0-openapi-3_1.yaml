            - account_number
            - account_digit
          properties:
            kind:
              type: string
              enum:
                - checking
                - savings
                - payment
              description: Tipo de conta
              example: checking
            account_number:
              type: string
              description: Número da conta (sem o dígito verificador)
              example: '12345'
            account_digit:
              type: string
              description: Dígito verificador da conta
              example: '6'
            agency_number:
              type: string
              description: Número da agência
              example: '0001'
        external_id:
          type: string
          nullable: true
          example: pix_123
          description: ID externo da cobrança Pix
        custom_data:
          type: object
          nullable: true
          description: Dados personalizados da cobrança Pix
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Lista de etiquetas da cobrança Pix
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao registro
        created_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T09:00:00Z'
        updated_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T12:00:00Z'
