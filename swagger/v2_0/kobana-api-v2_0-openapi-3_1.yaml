                type: string
                nullable: true
                description: 'Cargo/função do signatário na empresa. Campo opcional. Valores: `partner` (sócio), `witness` (testemunha), `legal` (jurídico), `attorney` (procurador), `financial` (financeiro), `director` (diretor), `representative` (representante).'
                enum:
                  - partner
                  - witness
                  - legal
                  - attorney
                  - financial
                  - director
                  - representative
                example: partner
            required:
              - name
              - document_number
              - email
    v2_dda_bank_billet:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: 'Identificador único do boleto DDA (UUID). Utilize este valor para consultar, liberar ou rejeitar o boleto via API.'
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        status:
          type: string
          readOnly: true
          enum:
            - pending
            - released
            - rejected
            - paid
          description: 'Status interno do boleto DDA na plataforma Kobana. Representa o fluxo de aprovação pelo cliente: `pending` (disponível para ação: liberar ou rejeitar), `released` (liberado pelo cliente para pagamento — campo `released_at` preenchido), `rejected` (rejeitado pelo cliente — transição irreversível — campo `rejected_at` preenchido), `paid` (pago via Kobana — campo `payment_uid` preenchido).'
          example: pending
        external_status:
          type: string
          nullable: true
          readOnly: true
          enum:
            - open
            - overdue
            - paid
            - canceled
            - downloaded
            - blocked
          description: 'Status externo do boleto informado pelo provedor. Completamente independente do campo `status` e pode mudar a qualquer momento via sincronização. `open` (em aberto, disponível para pagamento), `overdue` (vencido — podem incidir juros e multa), `paid` (pago confirmado pelo banco — pode ocorrer antes ou independente de `status: paid`), `canceled` (cancelado pelo beneficiário ou banco), `downloaded` (baixado — equivale a pago para fins de processamento interno), `blocked` (bloqueado — o boleto foi criado, mas ainda não está disponível para pagamento).'
          example: open
        barcode:
          type: string
          nullable: true
          readOnly: true
          description: Código de barras do boleto (44 dígitos). Pode ser nulo quando o boleto ainda está em fase de sincronização inicial.
          example: '34193497900000150001740000000148050088825000'
        line:
          type: string
          nullable: true
          readOnly: true
          description: Linha digitável do boleto — representação formatada do código de barras para digitação manual. Pode ser nula durante sincronização inicial.
          example: 34191.74001 00000.148050 08882.500009 3 49790000015000
        our_number:
          type: string
          nullable: true
          readOnly: true
          description: Nosso número atribuído pelo banco emissor. Identificador único do boleto no sistema bancário do beneficiário.
          example: '123556238'
        description:
          type: string
          nullable: true
          readOnly: true
          description: Descrição ou instruções do boleto informadas pelo beneficiário (cedente).
          example: Pagamento de serviço
        nominal_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor original (face) do boleto em reais (BRL), sem acréscimos ou descontos. Pode diferir do `amount` após o vencimento quando juros/multa são aplicados.'
          example: 150
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor atualizado do boleto em reais (BRL), já considerando juros, multa, descontos e abatimentos aplicáveis. Pode diferir do `nominal_amount` após o vencimento.'
          example: 76
        min_payment_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor mínimo aceito para pagamento do boleto em reais (BRL). Relevante quando `allow_parcial_payment` é `true`.
          example: 10
        max_payment_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor máximo aceito para pagamento do boleto em reais (BRL).
          example: 200
        expire_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data de vencimento do boleto (formato ISO 8601: AAAA-MM-DD). Após essa data, podem incidir juros e multa conforme configurado pelo beneficiário.'
          example: '2026-04-01'
        issue_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data de emissão do boleto pelo beneficiário (formato ISO 8601: AAAA-MM-DD).'
          example: '2026-03-04'
        reference_month:
          type: string
          nullable: true
          readOnly: true
          enum:
            - january
            - february
            - march
            - april
            - may
            - june
            - july
            - august
            - september
            - october
            - november
            - december
          description: 'Mês de referência/competência do boleto (ex: mês do serviço cobrado). Valores em inglês.'
          example: march
        beneficiary_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome ou razão social do beneficiário (cedente) — empresa ou pessoa que emitiu o boleto e receberá o pagamento.
          example: Kobana Tecnologia Ltda.
        beneficiary_cnpj_cpf:
          type: string
          nullable: true
          readOnly: true
          description: CPF ou CNPJ do beneficiário (cedente).
          example: 05.813.794/0001-26
        beneficiary_bank_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome do banco onde o beneficiário possui conta para recebimento.
          example: Banco do Brasil
        beneficiary_bank_number:
          type: string
          nullable: true
          readOnly: true
          description: 'Código COMPE (3 dígitos) do banco do beneficiário. Ex: `001` (Banco do Brasil), `341` (Itaú), `237` (Bradesco).'
          example: '001'
        owner_cnpj_cpf:
          type: string
          nullable: true
          readOnly: true
          description: CPF ou CNPJ do pagador (sacado). Corresponde ao CNPJ/CPF cadastrado na conta DDA.
          example: 83.191.445/0001-23
        owner_person_name:
          type: string
          nullable: true
          readOnly: true
          description: Nome ou razão social do pagador (sacado) — empresa ou pessoa em cujo nome o boleto foi emitido.
          example: Empresa Pagadora S.A.
        fine_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo da multa por atraso em reais (BRL). Aplicável após a `fine_date`.
          example: 2.4
        fine_percentage:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Percentual da multa por atraso sobre o valor do boleto. Aplicável após a `fine_date`.
          example: 2.4
        fine_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data a partir da qual a multa por atraso passa a ser cobrada (formato ISO 8601).
          example: '2026-04-02'
        interest_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo de juros por dia de atraso em reais (BRL). Aplicável após a `interest_date`.
          example: 2.4
        interest_percentage:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Percentual de juros por dia/mês de atraso. Aplicável após a `interest_date`.
          example: 2.4
        interest_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data a partir da qual os juros por atraso passam a incidir (formato ISO 8601).
          example: '2026-04-03'
        discount_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor fixo de desconto para pagamento antecipado em reais (BRL). Válido até a `discount_date`.
          example: 5
        discount_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: 'Data limite para obter o desconto por pagamento antecipado (formato ISO 8601). Após essa data, o desconto não se aplica.'
          example: '2026-03-31'
        reduction_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: 'Valor do abatimento concedido pelo beneficiário em reais (BRL). Diferente do desconto, o abatimento reduz o valor total independente da data de pagamento.'
          example: 0
        allow_parcial_payment:
          type: boolean
          nullable: true
          readOnly: true
          description: 'Indica se o boleto aceita pagamento parcial (valor inferior ao total). Quando `true`, o pagamento pode ser feito com valor entre `min_payment_amount` e `max_payment_amount`.'
          example: false
        released_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto foi liberado para pagamento pelo cliente. Preenchido apenas quando `status` é `released` ou `paid`.
        rejected_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto foi rejeitado pelo cliente. Preenchido apenas quando `status` é `rejected`.
        payment_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: UUID do pagamento Kobana vinculado a este boleto DDA. Permite rastrear o pagamento originado a partir deste boleto. Preenchido quando o boleto é associado a um pagamento via API.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto DDA foi recebido e registrado na plataforma Kobana.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: 'Data e hora (ISO 8601) da última atualização deste boleto (alteração de status, sincronização de dados, etc.).'
