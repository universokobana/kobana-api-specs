              nullable: true
              maxLength: 3
              description: Banco de Recebimento.
            agency:
              type: string
              nullable: true
              maxLength: 5
              description: Agência de Recebimento (com dígito quando disponível).
            agency_number:
              type: string
              nullable: true
              maxLength: 4
              description: Número da Agência de Recebimento (sem dígito).
            agency_digit:
              type: string
              nullable: true
              maxLength: 1
              description: Dígito da Agência de Recebimento.
        credit_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de crédito.
        created_via_api:
          type: boolean
          readOnly: true
          description: Enviado pela API.
        transaction_identifier:
          type: string
          nullable: true
          description: Identificador da Transação.
        status:
          type: string
          description: Situação.
          readOnly: true
          example: confirmed
        duplicated:
          type: object
          nullable: true
          readOnly: true
          description: Presente quando o recebimento é uma duplicata. Contém o UID do recebimento original.
          properties:
            uid:
              type: string
              format: uuid
              nullable: true
              description: UID do Recebimento original. Null quando o original é desconhecido.
        created_at:
          type: string
          format: date
          readOnly: true
          description: Data e hora de criação.
        updated_at:
          type: string
          format: date
          readOnly: true
          description: Data e hora da alteração.
