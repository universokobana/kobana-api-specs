            occurred_at:
              type: string
              format: date_time
              example: '2024-07-03T13:00:00Z'
            code:
              type: string
              enum:
                - accl
                - cpcl
                - dcsd
                - ersl
                - frud
                - pcfd
                - slcr
                - sldb
              example: frud
            description:
