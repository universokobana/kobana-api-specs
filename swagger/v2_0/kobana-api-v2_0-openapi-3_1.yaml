    v2_generic_transfer:
      type: object
      description: 'Transferência Genérica - Pode ser de qualquer tipo (Pix, TED ou Interna)'
      anyOf:
        - $ref: '#/components/schemas/v2_transfer_pix'
        - $ref: '#/components/schemas/v2_transfer_ted'
        - $ref: '#/components/schemas/v2_transfer_internal'
    v2_new_generic_transfer:
      type: object
      description: |-
        Nova Transferência Genérica.

        O tipo de transferência é especificado pelo campo 'kind':
        - `kind: "pix"`: Cria uma transferência Pix (dados em `pix: {}`)
        - `kind: "ted"`: Cria uma transferência TED (dados em `ted: {}`)
        - `kind: "internal"`: Cria uma transferência entre contas (dados em `internal: {}`)

        O campo 'kind' é obrigatório e deve estar no nível raiz do payload.
      oneOf:
        - type: object
          description: Payload para criar uma Transferência Pix
          required:
            - financial_account_uid
            - amount
            - kind
            - pix
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            beneficiary:
              type: object
              nullable: false
              description: Dados do beneficiário da transferência
              required:
                - name
                - document_number
              properties:
                name:
                  type: string
                  description: Nome do beneficiário
                  example: João da Silva
                document_number:
                  type: string
                  description: CPF/CNPJ do beneficiário
                  example: 123.456.789-00
            identifier:
              type: string
              nullable: true
              description: |
                Identificação da transferência no comprovante do provedor financeiro. (Uso exclusivo do banco)

                Bancos que aceitam esse campo (via API): Itaú
            kind:
              type: string
              enum:
                - pix
              description: Tipo da transferência (deve ser "pix")
            pix:
              type: object
              required:
                - data
              description: Dados específicos do Pix (dados dentro de data)
              properties:
                data:
                  type: object
                  required:
                    - type
                  description: Payload com os dados reais do Pix
                  oneOf:
                    - type: object
                      required:
                        - type
                        - key_type
                        - key
                      description: Pix por Chave
                      properties:
                        type:
                          type: string
                          enum:
                            - key
                          description: Tipo do Pix - por chave
                        key_type:
                          type: string
                          enum:
                            - random
                            - phone
                            - email
                            - cnpj
                            - cpf
                          description: Tipo da Chave Pix
                        key:
                          type: string
                          description: Chave Pix
                    - type: object
                      required:
                        - type
                        - bank_account
                      description: Pix por Conta Bancária
                      properties:
                        type:
                          type: string
                          enum:
                            - bank_account
                          description: Tipo do Pix - por conta bancária
                        bank_account:
                          type: object
                          required:
                            - compe_number
                            - agency_number
                            - account_number
                          description: Dados bancários
                          properties:
                            compe_number:
                              type: string
                              description: Código do banco (COMPE)
                              example: '237'
                            ispb_number:
                              type: string
                              nullable: true
                              description: ISPB do banco
                            agency_number:
                              type: string
                              description: Número da agência
                              example: '1234'
                            agency_digit:
                              type: string
                              nullable: true
                              description: Dígito da agência
                            account_number:
                              type: string
                              description: Número da conta
                              example: 56789-0
                            account_digit:
                              type: string
                              nullable: true
                              description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência TED
          required:
            - financial_account_uid
            - amount
            - kind
            - ted
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
