            type: object
            required:
              - street
              - neighborhood
              - city_name
              - zip_code
            properties:
              street:
                type: string
                nullable: false
                maxLength: 255
                description: Logradouro
                example: Av. Rio Branco
              number:
                type: string
                nullable: true
                maxLength: 10
                description: Número
                example: '26'
              complement:
                type: string
                nullable: true
                maxLength: 60
                description: Complemento
                example: Sobreloja
              neighborhood:
                type: string
                nullable: false
                maxLength: 80
                description: Bairro
                example: Centro
              city_name:
                type: string
                nullable: false
                maxLength: 60
                description: Cidade. Nome deve estar correto e completo
                example: Rio de Janeiro
              state:
                type: string
                nullable: true
                maxLength: 2
                description: Estado
                example: RJ
              zip_code:
                type: string
                nullable: false
                maxLength: 8
                description: CEP (formato 99999999)
                example: '20090001'
              short:
                type: string
                readOnly: true
                description: Endereço Curto
                example: 'Av. Rio Branco, 26, Sobreloja'
              full:
                type: string
                readOnly: true
                description: Endereço Completo
                example: 'Av. Rio Branco, 26, Sobreloja, Centro, Rio de Janeiro, RJ. CEP: 20090-001'
