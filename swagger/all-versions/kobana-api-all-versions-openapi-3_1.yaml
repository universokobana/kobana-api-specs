  '/v1/bank_billet_accounts/{id}':
    get:
      summary: Informações da Carteira
      tags:
        - Carteiras de Cobrança
      security:
        - bearerAuth: []
      description: Consulta informações específicas de uma Carteira
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID da Carteira
          example: 999
          schema:
            type: string
      responses:
        '200':
          description: Carteira encontrada
