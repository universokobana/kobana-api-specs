        - $ref: '#/components/schemas/v2_payment_tax'
        - $ref: '#/components/schemas/v2_payment_utility'
    v2_new_generic_payment:
      type: object
      description: |-
        Novo Pagamento Genérico.

        O tipo de pagamento é detectado automaticamente pela presença de uma das chaves específicas:
        - `pix`: Cria um Payment::Pix
        - `bank_billet`: Cria um Payment::BankBillet
        - `darf`: Cria um Payment::Darf
        - `tax`: Cria um Payment::Tax
        - `utility`: Cria um Payment::Utility

        Apenas uma dessas chaves deve estar presente no payload.
