            | 2017 | Remessa a Cartório (Aponte em Cartório)  |
            | 2018 | Retirada de Cartório e Manutenção em Carteira   |
            | 2019 | Protestado e Baixado (Baixa por ter sido Protestado) |
            | 2020 | Instrução Rejeitada  |
