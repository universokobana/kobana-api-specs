                    id: 1
                    uid: 019f1ba9-9633-700c-bca3-2eac850b4856
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-07-01T05:12:06+02:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
