          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
        customer_nickname:
          type: string
          nullable: true
          maxLength: 255
          description: Apelido ou Nome Fantasia do Pagador
          example: null
