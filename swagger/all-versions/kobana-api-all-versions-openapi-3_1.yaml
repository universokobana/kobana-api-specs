                              * `2` Por porcentagem Diária
                              * `3` Por porcentagem Mensal
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        interest_amount:
          type: string
          nullable: true
          example: '20.00'
          description: Valor da Multa
        interest_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual da Multa
