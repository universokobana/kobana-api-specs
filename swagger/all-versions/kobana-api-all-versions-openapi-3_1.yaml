    post:
      summary: Importar Extrato
      tags:
        - Extrato
      security:
        - bearerAuth: []
      description: |
        Importa um extrato bancário através de arquivo CNAB. O processamento é realizado de forma assíncrona e as transações são associadas à conta financeira.
        > **Processamento Assíncrono:** Este endpoint é processado assincronamente e cria um comando de atualização para a Conta Financeira.

        A Importação de Extrato de uma Conta Financeira é feita assincronamente, ou seja, ao receber a requisição,
        a nossa API guarda os parâmetros da requisição e processa a importação em segundo plano.
        Após a importação ser processada, as transações serão associadas à Conta Financeira.
        Você recebe na resposta desta requisição o UID da Importação criada e pode consultá-lo a qualquer momento.

        ## Eventos de Webhook

        Quando a requisição é realizada, um evento `import.created` é disparado.
        O nosso servidor então começa o processamento da importação.
        Após o fim do processamento, o evento `import.processed` é disparado.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: financial_account_uid
          in: path
          description: UID da Conta Financeira
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '201':
          description: Importação criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f52c7-9c43-7492-877c-1b12f8019745
                  created_rows: 0
                  enqueued_at: null
                  started_at: null
                  finished_at: null
                  processed_at: null
                  failed_to_create_rows: 0
                  failed_to_update_rows: 0
                  import_errors: null
                  processed_rows: 0
                  total_rows: null
                  updated_rows: 0
                  source_file_name: statement-itau-case-02.ret
                  source_file_size: 2662
                  status: pending
                  created_via_api: true
                  external_id: 123_external_id_abcdef
                  custom_data:
                    chave_1: Valor um
                    chave_2: Valor dois
                  tags:
                    - etiq 1
                    - etiq 2
                  tag_list: 'etiq 1,etiq 2'
                  created_at: '2026-07-11T15:04:01-05:00'
                  updated_at: '2026-07-11T15:04:01-05:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_import'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
