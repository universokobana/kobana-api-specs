          type: string
          maxLength: 2
          description: Estado
          example: SP
        customer_city_name:
          type: string
          maxLength: 60
          description: Cidade(Nome deve estar correto e completo)
          example: São Paulo
        customer_zipcode:
          type: string
          maxLength: 8
          description: CEP (formato 99999999)
          example: '01310100'
        customer_address:
          type: string
          maxLength: 255
          description: Endereço
          example: 'Rua F, alamenda G'
        customer_address_complement:
          type: string
          maxLength: 120
          description: Complemento
          example: null
        customer_address_number:
          type: string
          maxLength: 10
          description: Número
          example: null
        customer_email:
          type: string
          format: email
          maxLength: 80
          description: E-mail do Pagador
          example: null
        customer_email_cc:
          type: string
          format: email
          maxLength: 80
          description: E-mail alternativo do Pagador
          example: null
        customer_neighborhood:
          type: string
          maxLength: 80
          description: Bairro
          example: Centro
        customer_phone_number:
          type: string
          maxLength: 15
          description: 'Telefone (com DDD, DDI é opcional)'
          example: null
        customer_ignore_email:
          type: boolean
          nullable: true
          description: Nunca enviar e-mail para este cliente
          example: null
        customer_ignore_sms:
          type: boolean
          nullable: true
          description: Nunca enviar SMS para este cliente
          example: null
        customer_mobile_local_code:
          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
        customer_nickname:
          type: string
          nullable: true
          maxLength: 255
          description: Apelido ou Nome Fantasia do Pagador
          example: null
        customer_notes:
          type: string
          nullable: true
          description: Observações do Pagador
          example: null
        customer_contact_person:
          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
            * `7` Para porcentagem mensal - Bancos suportados: Bradesco, BB, BTG, Caixa, Inter, Itaú, Safra, Santander, Sicoob e Sicredi
          enum:
            - 0
            - 1
            - 2
            - 7
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Porcentagem de juros. De 0.0 a 100.0 (Ex 1.5% = 1.5) Obrigatório se interest_type é igual a 1 ou 7. Até 2 casas decimais.
          example: null
        interest_value:
          type: number
