              example: Empresa Exemplo LTDA
        debtor:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Devedor
          properties:
            document_type:
              type: string
              nullable: true
              description: Tipo do documento (cpf ou cnpj)
              example: cpf
              enum:
                - cpf
                - cnpj
            document_number:
              type: string
              nullable: true
              description: Número do Documento (CPF ou CNPJ)
              example: '12345678901'
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        description:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem ao pagador
          example: Pagamento de serviços
        can_be_paid:
          type: boolean
          nullable: true
          readOnly: true
