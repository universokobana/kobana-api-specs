          type: integer
          nullable: true
          description: ID da Carteira.
          example: null
        discharge_id:
          type: integer
          nullable: true
          description: ID do Retorno.
          example: null
        amount:
          type: number
          format: float
          description: Valor do Boleto
          example: 10.99
        paid_amount:
          type: number
          format: float
          description: Valor Pago
          example: 10.99
        paid_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data do Recebimento.
        paid_bank:
          type: string
          maxLength: 3
          nullable: true
          description: Banco de Recebimento.
        paid_agency:
          type: string
          maxLength: 5
          nullable: true
          description: Agência de Recebimento.
        bank_rate:
          type: number
          format: float
          nullable: true
          description: Taxa bancária
          example: 10.99
        credit_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de crédito.
        direct:
          type: boolean
          deprecated: true
          nullable: true
          description: Recebimento direto ao beneficíario
          example: null
        expire_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de vencimento.
        kind:
          type: integer
          description: |-
            Tipo de Recebimento:
            * `0` Direto ao beneficíario/Em mãos
            * `1` Boleto (Confirmado pelo banco via arquivo de retorno ou API)
            * `2` Pix (Confirmado pelo banco via Pix)
          enum:
            - 0
            - 1
            - 2
        document_number:
          type: string
          nullable: true
          readOnly: true
          description: Número do Documento.
        our_number:
          type: string
          nullable: true
          description: Nosso Número.
          example: null
        created_via_api:
          type: boolean
          nullable: true
          description: Enviado pela API
          example: null
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação.
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização.
        customer_person_name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do cliente
        paid_by_pix:
          type: boolean
          deprecated: true
          nullable: true
          description: "\tRecebimento via Pix"
          example: null
        financial_provider_external_id:
          type: string
          nullable: true
          description: ID do recebimento na instituição financeira
          example: null
        line_parsed:
          type: string
          format: json
          nullable: true
          description: |-
            Linha parseada com informações vindas do banco:

            Conteúdo do retorno bancário. Pode mudar de acordo com o banco e o formato 240 ou 400. Se algum dos campos estiver em branco é porque o seu banco não disponibiliza essa informação.

            | Valor | Descrição |
            |---|---|
            | paid_at | Data de recebimento |
            | paid_amount | Valor pago |
            | bank_rate | Taxa do boleto paga ao banco |
            | credit_at | Data de crédito |
            | credit_amount | Valor do Crédito |
            | our_number | Nosso número |
            | processed_our_number_raw | Nosso número formatado |
            | discount | Desconto |
            | billet_fine | Acréscimos(Multa/Juros cobrados) |
            | other_fines | Outras cobranças adicionais |
            | other_credit | Outros valores pagos |
            | value_rebate | Outras taxas |
            | error_code | Código de erro |
            | event_type | Ocorrência bancária |
            | agency_number | Agência |
            | account_number | Conta |
            | banco_recebedor | Banco recebedor |
            | agencia_recebedora | Agência recebedora |
            | control_number | Número de Controle |
            | document_number | Número do Documento |
