  '/v1/email_deliveries/{id}':
    get:
      summary: Informações do E-mail Enviado
      tags:
        - Histórico de E-mails
      security:
        - bearerAuth: []
      description: Consulta informações específicas de um e-mail enviado
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID do E-mail
          example: 999
          schema:
            type: string
      responses:
        '200':
          description: E-mail encontrado com sucesso
          content:
            application/json:
