          properties:
            document_number:
              type: string
              description: CPF/CNPJ do beneficiário
              example: '12345678900'
            name:
              type: string
              description: Nome do beneficiário
              example: João Silva
        url:
          type: string
          readOnly: true
          nullable: true
          description: URL para visualização do Pix
          example: 'https://kobana.com.br/p/abc123'
        formats:
          type: object
          readOnly: true
          nullable: true
          description: URLs com formatos disponíveis para o Pix
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML padrão
                  example: 'https://kobana.com.br/p/abc123'
                png:
                  type: string
                  description: URL PNG padrão
                  example: 'https://kobana.com.br/p/abc123.png'
                pdf:
                  type: string
                  description: URL PDF padrão
                  example: 'https://kobana.com.br/p/abc123.pdf'
            qrcode:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode'
                png:
                  type: string
                  description: URL PNG QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.png'
                pdf:
                  type: string
                  description: URL PDF QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.pdf'
        additional_info:
          anyOf:
            - type: object
              additionalProperties:
                type: string
                maxLength: 200
              maxProperties: 10
            - type: 'null'
          description: Informações adicionais para o pagador (máximo 10 pares chave-valor)
          examples:
            - Pedido: '12345'
              Cliente: João Silva
            - Referência: FATURA-001
            - null
        qrcode:
          type: object
          description: QR Code do Pix
          readOnly: true
          properties:
            emv:
              anyOf:
                - type: string
                  pattern: '^[0-9A-Za-z\+\/\=\.\:\-\*]+$'
                - type: 'null'
              description: QR Code no formato EMV.
              readOnly: true
              examples:
                - 00020126...
                - null
            png:
              anyOf:
                - type: string
                  contentEncoding: base64
                  contentMediaType: image/png
                - type: 'null'
              description: QR Code no formato PNG em base64.
              readOnly: true
              examples:
                - iVBORw0KGgoAAAANSUhEUgAA...
                - null
        registration_kind:
          type: string
          enum:
            - instant
            - billing
          default: instant
          writeOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        kind:
          type: string
          enum:
            - instant
            - billing
          readOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        command_ids:
          type: array
          readOnly: true
          items:
            type: integer
            description: IDs dos registros de Comandos do Pix
        payments:
          type: array
          readOnly: true
          items:
            type: string
            format: uuid
