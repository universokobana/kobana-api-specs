                $ref: '#/components/schemas/v1_bank_billet_account_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
        '422':
          description: Carteira inválida - Beneficiário CPF
          content:
            application/json:
              example:
                errors:
                  bank_contract_slug:
                    - não pode ficar em branco
                  beneficiary_name:
                    - não pode ficar em branco
                  beneficiary_cnpj_cpf:
                    - não é um CNPJ válido
                  kind:
                    - não pode ficar em branco
                  beneficiary_address_street:
                    - não pode ficar em branco
                  beneficiary_address_city:
                    - não pode ficar em branco
                  beneficiary_address_neighborhood:
                    - não pode ficar em branco
                  beneficiary_address_state:
                    - não pode ficar em branco
                  beneficiary_address_zipcode:
                    - não pode ficar em branco
              schema:
                $ref: '#/components/schemas/v1_errors_object'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1_new_bank_billet_account_object'
        required: true
        description: Informações a serem salvas na carteira de cobrança
