        ## Pré-requisito

        Para emitir um pagamento é necessário ter cadastrado uma Conta Financeira.

        ## Eventos de Webhook

        O evento `payment.db.created` é disparado nesta operação.

        > **Próximos passos:** Após criar um pagamento, você desejará em algum momento enviar um Lote para a instituição financeira. Para isso, utilize o endpoint `POST /api/v2/payment/utility_batches`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
