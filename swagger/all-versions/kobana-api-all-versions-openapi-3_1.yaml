        fine_percentage:
          type: string
          nullable: true
          example: '5'
          description: Percentual da Multa
        reduction_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Abatimento:
                                * `0` Não se aplica
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        reduction_amount:
          type: string
          nullable: true
          example: '25.00'
          description: Valor do Abatimento
        reduction_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual do Abatimento
        interest_type:
          type: integer
          nullable: true
          description: |-
