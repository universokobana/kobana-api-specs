        bank_billet_account_id:
          type: integer
          readOnly: true
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto associado ao evento
          example: null
        occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de quando o evento ocorreu.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do evento
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de atualização do evento
    v2_email_delivery:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do e-mail enviado
        uid:
          type: string
          maxLength: 36
          description: UID usado no cabeçalho da requisição
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        failed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega falhou
        event_code:
          type: string
          maxLength: 255
          example: bank_billet.created
          description: |-
            Código do evento.
            * `ping` Ping
            * `access_token.db.created` Token de Acesso criado.
            * `access_token.db.updated` Token de Acesso atualizado.
            * `access_token.db.deleted` Token de Acesso excluído.
            * `access_token.reminder` Lembrete de expiração do Token de Acesso.
            * `access_token.expired` Token de Acesso expirou.
            * `account.updated` Conta atualizada.
            * `account.blocked` Conta bloqueada.
            * `account.bank_billet_creation_blocked` Emissão de boletos bloqueada.
            * `bank_billet.created` Boleto criado.
            * `bank_billet.updated` Boleto atualizado.
            * `bank_billet.generated` PDF do Boleto Gerado ou Atualizado.
            * `bank_billet.canceled` Boleto cancelado.
            * `bank_billet.blocked` Boleto foi bloqueado.
            * `bank_billet.overdue` Boleto ficou vencido.
            * `bank_billet.paid` Boleto foi pago.
