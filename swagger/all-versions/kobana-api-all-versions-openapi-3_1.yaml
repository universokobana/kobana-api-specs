        status:
          type: integer
          nullable: true
          description: |-
            Situação:
            * `0` Pendente
            * `1` Entregue
            * `2` Falhou
          enum:
            - '0'
            - '1'
            - '2'
        created_from:
          type: string
          format: date
          nullable: true
          description: A partir da Data de criação (DD/MM/YYYY) ou (YYYY-MM-DD)
          example: '2020-01-01'
        created_to:
          type: string
          format: date
          nullable: true
          description: Até a Data de criação (DD/MM/YYYY) ou (YYYY-MM-DD)
          example: '2020-01-01'
