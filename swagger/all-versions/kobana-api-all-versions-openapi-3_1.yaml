  '/v2/financial/accounts/{financial_account_uid}/statement_transactions/sync':
    post:
      summary: Sincronizar Extrato
      tags:
        - Extrato
      security:
        - bearerAuth: []
      description: |
        Sincroniza o extrato bancário de uma conta financeira. Busca transações diretamente da instituição financeira através de API. Requer conexão ativa.
        [block:callout]
        {
          "type": "info",
          "body": "Este endpoint é processado assincronamente e cria um comando de sincronização de extrato para a Conta Financeira.",
          "title": "Processamento Assíncrono"
        }
        [/block]

        A Sincronização de Extrato de uma Conta Financeira é feita assincronamente, ou seja, ao receber a requisição, a nossa
        API guarda os parametros da requisição e cria um Comando. Esse comando é processado em sgundo plano e depois é confirmado
        e as transações serão importadas na Conta Financeira. Você recebe na resposta desta requisição o ID do comando criado
        e pode consultá-lo a qualquer momento.

        Veja mais em [Listar Comandos de uma Conta Finaneira](ref:get_v2-financial-accounts-account-id-commands) e
        [Visualizar um Comando](ref:get_v2-financial-accounts-account-id-commands-id).

        Para que seja possível executar a Sincronização de Extrato, deve haver uma Conexão ativa (ou seja, validada e habilitada)
        associada à Conta Financeira.

        ## Eventos de Webhook

        Quando a requisição é realizada, um evento `financial.account.statement_sync.requested` é disparado.
        O nosso servidor então começa a comunicação com a API da instituição financeira para buscar transações.
        Somente depois de confirmado na instituição financeira, aí então o extrato é atualizado.
        Neste momento o evento `financial.account.statement_sync.confirmed` é disparado.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: financial_account_uid
          in: path
          description: UUID da Conta Financeira
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '201':
          description: Comando criado
          content:
            application/json:
              example:
                status: 201
                data:
                  id: 98
                  status: pending
                  operation: statement_sync
                  params:
                    start_at: '2026-04-01'
                    end_at: '2026-04-18'
                  payload: null
                  created_at: '2026-04-18T03:06:34+02:00'
                  updated_at: '2026-04-18T03:06:34+02:00'
                  message: null
                  error_message: null
                  warning_message: null
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_financial_account_command'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Conexão para Extrato não ativa
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: validation_error
                    param: financial_account
                    detail: Financial account não possui conexão ativa associada
              schema:
                $ref: '#/components/schemas/v2_error'
  '/v2/admin/certificates/{uid}':
    delete:
      summary: Excluir um Certificado
      tags:
        - Certificado
      security:
        - bearerAuth: []
      description: Remove permanentemente um certificado. Só é possível excluir certificados que não estejam vinculados a nenhuma conexão ativa e que não tenham sido criados pelo sistema.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          required: true
          description: UID do Certificado (UUID).
          example: 018df180-7208-727b-a10a-ea545e4a75a8
          schema:
            type: string
      responses:
        '204':
          description: Certificado excluído
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '404':
          description: Certificado não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Certificado criado pelo sistema não pode ser excluído
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: certificate_system_managed
                    detail: Este certificado foi criado pelo sistema e não pode ser excluído.
              schema:
                $ref: '#/components/schemas/v2_error'
