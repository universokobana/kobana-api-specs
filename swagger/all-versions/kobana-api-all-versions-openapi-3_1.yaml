      tags:
        - Pagamentos
      security:
        - bearerAuth: []
      description: 'Lista todos os pagamentos de qualquer tipo (PIX, Boleto, DARF, Tributos, Contas). Suporta filtros e paginação. Este é um endpoint unificado que retorna payments de todos os tipos através de uma única consulta.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
        - name: kind
          in: query
          description: Filtrar por tipo de pagamento
          required: false
          schema:
            type: string
            enum:
              - bank_billet
              - darf
              - utility
              - gru
              - pix
              - tax
        - name: status
          in: query
          description: Filtrar por status
          required: false
          schema:
            type: string
            enum:
              - pending
              - scheduled
              - confirmed
              - rejected
              - canceled
        - name: created_from
          in: query
          description: 'Filtrar por data de criação inicial (formato: YYYY-MM-DD)'
          required: false
          schema:
            type: string
            format: date
        - name: created_to
          in: query
          description: 'Filtrar por data de criação final (formato: YYYY-MM-DD)'
          required: false
          schema:
            type: string
            format: date
        - name: scheduled_from
          in: query
          description: 'Filtrar por data de agendamento inicial (formato: YYYY-MM-DD)'
          required: false
          schema:
            type: string
            format: date
        - name: scheduled_to
          in: query
