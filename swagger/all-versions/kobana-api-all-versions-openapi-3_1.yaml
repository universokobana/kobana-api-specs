              properties:
                html:
                  type: string
                  nullable: true
                  description: URL HTML do comprovante
                png:
                  type: string
                  nullable: true
                  description: URL PNG do comprovante
                pdf:
                  type: string
                  nullable: true
                  description: URL PDF do comprovante
        identifier:
          type: string
          nullable: true
          description: |
