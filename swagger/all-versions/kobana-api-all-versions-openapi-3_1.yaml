                data:
                  type: object
                  required:
                    - type
                  description: Payload com os dados reais do Pix
                  oneOf:
                    - type: object
                      required:
                        - type
                        - key_type
                        - key
                      description: Pix por Chave
                      properties:
                        type:
                          type: string
