                examples:
                  - amount
                  - customer_email
                  - expire_at
              detail:
                anyOf:
                  - type: string
                  - type: 'null'
                  - type: object
                description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
