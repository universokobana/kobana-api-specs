    post:
      summary: Criar um saldo
      tags:
        - Contas
      security:
        - bearerAuth: []
      description: Cria um novo saldo manual para uma conta financeira. Permite registrar saldos iniciais ou ajustes manuais de conciliação.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: financial_account_uid
          in: path
          description: UUID da Conta Financeira
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '201':
          description: Saldo criado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f0447-4cdd-7ee3-9f05-0845caae4c2c
                  capture_date: null
                  amount: 500.99
