                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-06-15T10:36:08+13:00'
                    updated_at: '2026-06-15T10:36:08+13:00'
                    pix:
                      qrcode: 00020126330014br.gov.bcb.pix01111335366962052040000530398654040
