  /v1/webhook_deliveries/resend:
    put:
      summary: Reenviar Webhooks Enviados
      tags:
        - Log de Webhooks
      security:
        - bearerAuth: []
      description: |-
        Reenviar webhooks enviados.

        Está limitado aos primeiros 1000 encontrados na busca conforme os parâmetros.

        O `ID do Objeto` vai retornar todos e qualquer tipo de objeto que tenha o ID enviado, ou seja, se você enviar 1, poderá retornar boletos, clientes e etc. Caso queira um filtro mais refinado, combine o `ID do Objeto` com o `Código do evento`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
      responses:
        '200':
          description: Webhooks reeenviados com sucesso
          content:
            application/json:
              example:
                message: Solicitação de reenvio de webhook deliveries enviada para processamento
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
