  /v1/bank_billet_discharges:
    get:
      summary: Listar Registros de Retorno
      tags:
        - Registro de Retorno
      security:
        - bearerAuth: []
      description: Lista registros de retorno.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: processed_from
          in: query
          description: A partir da Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: processed_to
          in: query
          description: Até a Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: bank_billet_id
          in: query
          schema:
            type: string
          description: ID do Boleto.
          example: '999'
          required: false
        - name: discharge_id
          in: query
          schema:
            type: string
          description: ID do Retorno.
          example: '999'
          required: false
        - name: page
