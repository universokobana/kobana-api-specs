              type: object
              description: Dados bancários (Presente se o campo `transfer_kind` for `ted`)
              nullable: true
              properties:
                compe_number:
                  type: integer
                  description: |-
                    Código COMPE do banco.

                    Exemplos: `1` (Banco do Brasil), `237` (Bradesco), `341` (Itaú)
                  example: 1
                ispb_number:
                  type: integer
                  nullable: true
                  description: |-
                    Código ISPB do banco.

                    Se não fornecido no input, será inferido automaticamente a partir do COMPE quando possível.

                    Exemplos: `0` (Banco do Brasil), `60746948` (Bradesco), `60701190` (Itaú)
                  example: 60701190
                agency_number:
                  type: string
                  description: Número da Agência
                agency_digit:
                  type: string
                  description: Dígito da Agência
                account_number:
                  type: string
                  description: Número da Conta
                account_digit:
                  type: string
                  description: Dígito da Conta
            beneficiary:
              type: object
              description: Dados do Recebedor
              properties:
                document_number:
                  type: string
                  nullable: false
                  description: Número do Documento (CPF ou CNPJ)
                name:
                  type: string
                  nullable: false
                  description: Nome Completo ou Razão Social
        formats:
          readOnly: true
          nullable: true
          type: object
          description: URLs do comprovante de transferência (disponível após confirmação)
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  nullable: true
                  description: URL HTML do comprovante
                png:
                  type: string
                  nullable: true
                  description: URL PNG do comprovante
