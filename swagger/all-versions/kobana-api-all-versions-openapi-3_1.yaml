            | 2002 | Entrada Rejeitada |
            | 2003 | Liquidação |
            | 2004 | Baixa de Título Confirmada |
            | 2005 | Baixa de Título Rejeitada |
            | 2006 | Alteração do Vencimento Confirmada |
            | 2007 | Alteração do Vencimento Rejeitada |
