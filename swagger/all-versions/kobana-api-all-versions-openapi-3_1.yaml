        finality:
          type: string
          nullable: true
          readOnly: true
          description: 'Finalidade do pagamento (pagamento, saque, troco)'
          example: payment
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor principal
          example: 100
        amount_change:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor do troco
          example: 5
        interest:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor dos juros
          example: 2
        fine:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor da multa
          example: 3
        discount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor do desconto
          example: 1
        total_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor total a pagar
          example: 104
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário/Recebedor
          properties:
            document_type:
              type: string
              nullable: false
