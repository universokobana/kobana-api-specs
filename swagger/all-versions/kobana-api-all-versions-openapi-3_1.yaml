          type: number
          format: float
          nullable: true
          description: Taxa bancária
          example: 10.99
        credit_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de crédito.
        direct:
          type: boolean
          deprecated: true
          nullable: true
          description: Recebimento direto ao beneficíario
          example: null
        expire_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de vencimento.
        kind:
          type: integer
          description: |-
            Tipo de Recebimento:
            * `0` Direto ao beneficíario/Em mãos
            * `1` Boleto (Confirmado pelo banco via arquivo de retorno ou API)
            * `2` Pix (Confirmado pelo banco via Pix)
          enum:
            - 0
            - 1
            - 2
        our_number:
          type: string
          nullable: true
