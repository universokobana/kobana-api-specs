          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Validação da Conexão
        associations:
          type: array
          readOnly: true
          items:
            type: object
            required:
              - resource
            properties:
              resource:
                type: object
                required:
                  - slug
