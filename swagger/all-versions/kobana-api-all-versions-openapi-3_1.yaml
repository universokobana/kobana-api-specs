          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
      responses:
        '200':
          description: Lista vazia quando não há contas DDA
          content:
            application/json:
              example:
                status: 200
                data: []
                pagination:
                  prev_url: null
                  next_url: null
                  page: 1
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/v2_dda_account'
                  pagination:
                    $ref: '#/components/schemas/v2_pagination'
