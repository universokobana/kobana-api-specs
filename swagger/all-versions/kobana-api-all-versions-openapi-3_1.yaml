        occurrence:
          type: string
          maxLength: 2
          nullable: true
          description: Código da operação no banco.
        occurrence_detail:
          type: string
          nullable: true
          description: Descrição do evento no Retorno.
        occurrence_error:
          type: string
          nullable: true
          description: Erro no retorno.
        occurrence_error_detail:
          type: string
          nullable: true
