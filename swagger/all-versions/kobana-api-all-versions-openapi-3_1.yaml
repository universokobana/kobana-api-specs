        name:
          type: string
          maxLength: 40
          description: Nome do Beneficiário
        amount:
          type: string
          format: float
          description: Quantia (R$)
        floating:
          type: integer
          description: Quantidade de Dias para Crédito. Padrão 5 dias. Máximo 30 dias.
