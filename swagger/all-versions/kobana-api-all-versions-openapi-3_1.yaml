          example: '123456'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        remittance_enabled:
          type: boolean
          nullable: true
          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        provider_data:
          type: object
          nullable: true
          description: Atributos específicos do provider bancário.
          properties:
            service_point_number:
              type: string
              nullable: true
              description: 'Número do ponto de atendimento (ex.: `numeroPa` no Sicoob).'
              example: '0001'
            cooperative_cnpj:
              type: string
              nullable: true
              description: CNPJ da cooperativa Sicoob do titular da conta.
              example: 13.009.717/0001-46
    v2_payment_bank_billet:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pagamento
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        kind:
          type: string
          readOnly: true
          enum:
            - bank_billet
            - darf
            - utility
            - gru
            - pix
            - tax
          description: Tipo do Pagamento
          example: pix
        amount:
          type: number
          readOnly: true
          format: float
          example: 120.99
          description: |
            Quantia
        scheduled_to:
          type: string
          readOnly: true
          nullable: true
          format: date
          example: '2023-12-12'
          description: Data de Agendamento
        status:
          readOnly: true
          type: string
          description: |
            Status do Pagamento.

            `pending`: Pendente.
            `rejected`: Rejeitado.
            `approved`: Aprovado.
            `reproved`: Reprovado.
            `failed`: Falha.
            `confirmed`: Confirmado.
            `canceled`: Cancelado.
            `awaiting_approval`: Aguardando Aprovação.
            `scheduled`: Agendado.
            `awaiting_scheduled_date`: Aguardando Data Agendada.
            `overdue`: Vencido.
            `awaiting_funds`: Aguardando Saldo.
            `finishing`: Finalizando
        registration_status:
          readOnly: true
          type: string
          description: |
            Status de Registro.

            `pending`: Pendente.
            `requested`: Requisitado.
            `confirmed`: Confirmado.
            `rejected`: Rejeitado.
            `failed`: Falha
        confirmed_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data em que a Kobana processou a confirmação da operação. Não representa necessariamente a data em que o valor saiu da conta — para isso use transaction_date.
        rejected_at:
          type: string
          nullable: true
