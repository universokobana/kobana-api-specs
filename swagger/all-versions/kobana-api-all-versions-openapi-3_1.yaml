          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
            * `7` Para porcentagem mensal - Bancos suportados: Bradesco, BB, BTG, Caixa, Inter, Itaú, Safra, Santander, Sicoob e Sicredi
          enum:
            - 0
            - 1
            - 2
            - 7
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
