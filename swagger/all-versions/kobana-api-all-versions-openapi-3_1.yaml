    v2_webhook:
      type: object
      required:
        - url
        - events
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook
        uid:
          type: string
          readOnly: true
          description: UID do webhook
        name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome de identificação do webhook
        url:
          type: string
          maxLength: 255
          description: Endereço onde as requisições serão realizadas
        content_type:
          type: string
          maxLength: 255
          nullable: true
