          description: Status do SMS enviado
          required: false
          schema:
            type: integer
            description: |-
              Situação:
              * `0` Pendente
              * `1` Submetido para o Gateway
              * `2` Falha ao Enviar para o Gateway
              * `3` Rejeitado pelo Gateway
              * `4` Enviado pelo Gateway
              * `5` Recebido pelo Destinatário
              * `6` Não Recebido pelo Destinatário
              * `7` Lido pelo Destinatário
              * `8` Sendo Auditado para Liberação
              * `9` Link Acessado pelo Destinatário
