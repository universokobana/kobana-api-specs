          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Enviado para o Servidor de E-mail
            * `failed` Falha no Envio para o Servidor de E-mail
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - read
            - clicked
        status_occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que o status ocorreu.
        last_clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado pela última vez.
        last_read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido pela última vez.
        clicked_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi clicado.
        click_count:
          type: integer
          description: Quantidade que foi clicado.
        read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido.
        read_count:
          type: integer
          description: Quantidade que foi lido.
