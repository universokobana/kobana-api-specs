          type: string
          maxLength: 20
          description: Agência
        agency_digit:
          type: string
          maxLength: 2
          nullable: true
          description: 'Dígito da Agência. Opcional: será calculado automaticamente usando Módulo 11 quando o banco exigir e não for fornecido.'
        account_number:
          type: string
          maxLength: 20
          description: Conta
        account_digit:
          type: string
          maxLength: 2
          description: Dígito da Conta
        extra1:
          type: string
          nullable: true
          maxLength: 15
          description: Campo extra 1. Dependendo da carteira escolhida poderá ser obrigátorio.
        extra1_digit:
          type: string
          nullable: true
          maxLength: 3
          description: Digito do Campo extra 1. Dependendo da carteira escolhida poderá ser obrigátorio.
        extra2:
          type: string
          nullable: true
          maxLength: 15
          description: Campo extra 2. Dependendo da carteira escolhida poderá ser obrigátorio.
        extra2_digit:
          type: string
          nullable: true
          maxLength: 3
          description: Dígito do Campo extra 2. Dependendo da carteira escolhida poderá ser obrigátorio.
        contract:
          type: string
          maxLength: 15
          description: Contrato
        contract_type:
          type: string
          maxLength: 2
          description: Tipo do Contrato
        extra3:
          type: string
          maxLength: 30
          description: Código de Remessa
        beneficiary_name:
          type: string
          maxLength: 100
          description: Nome do Beneficiário
        beneficiary_cnpj_cpf:
          type: string
          maxLength: 20
          description: |-
            CNPJ/CPF do Beneficiário.
                              Quando um CNPJ válido for enviado, os dados associados ao beneficiário desse CNPJ serão obtidos automaticamente. Portanto, não é necessário incluir os seguintes campos na requisição:"
                                * `beneficiary_address_street` Rua do Beneficiário.
                                * `beneficiary_address_street_number` Numero da rua do Beneficiário.
                                * `beneficiary_address_complement` Complemento do endereço do Beneficiário.
                                * `beneficiary_address_neighborhood` Bairro do Beneficiário.
                                * `beneficiary_address_city` Cidade do Beneficiário.
                                * `beneficiary_address_state` Estado do Beneficiário.
                                * `beneficiary_address_zipcode` CEP do Beneficiário.
                                * `beneficiary_address` Endereço completo do Beneficiário.
        beneficiary_address_street:
          type: string
          maxLength: 255
          nullable: true
          description: Rua do Beneficiário
        beneficiary_address_street_number:
          type: string
          maxLength: 30
          nullable: true
          description: Numero da rua do Beneficiário
        beneficiary_address_complement:
          type: string
          maxLength: 255
          nullable: true
          description: Complemento do endereço do Beneficiário
        beneficiary_address_neighborhood:
          type: string
          maxLength: 255
          nullable: true
          description: Bairro do Beneficiário
        beneficiary_address_city:
          type: string
          maxLength: 50
          nullable: true
          description: Cidade do Beneficiário
        beneficiary_address_state:
          type: string
          maxLength: 2
          nullable: true
          description: Estado do Beneficiário
        beneficiary_address_zipcode:
          type: string
          maxLength: 8
          nullable: true
          description: CEP do Beneficiário (formato 99999999)
          example: '01310100'
        beneficiary_address:
          type: string
          deprecated: true
          nullable: true
          readOnly: true
          description: Endereço completo do Beneficiário.
        name:
          type: string
          maxLength: 255
          description: 'Nome da Conta. Não é recebido na criação e nem na atualização, só é retornado na consulta e listagem'
        status:
          type: string
          readOnly: true
          description: |-
            Situação da carteira:
            Quando a carteira acaba de ser cadastrada, ela ganha o status `pending`.

            Nesse momento o usuário deve aceitar os termos e iniciar a homologação.

            Ao clicar em “Prosseguir com a Homologação”, o status passa para `homologating`.

            Será gerado um boleto e uma remessa de Homologação para ser enviada ao banco. Após o término, o status passa para `validating`.

            A partir desse momento o usuário precisa informar o valor do boleto que foi gerado ou enviar o retorno processado pelo banco.

            Quando o valor é informado corretamente, ou no retorno processado, o banco diz estar tudo certo, o status passa para `active`.

            * `pending` Homologação não iniciada
            * `homologating` Em homologação, aguardando pagamento do boleto
            * `validating` Boleto pago, aguardando validação
            * `active` Ativa e pronta para uso
          enum:
            - pending
            - homologating
            - validating
            - active
        homologated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de homologação da carteira
        default:
          type: boolean
          nullable: true
          readOnly: true
          description: |-
            Padrão.
            O campo `default` determina a carteira de cobrança que será usada na criação do boleto quando nenhuma carteira for informada.

