                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `422`.'
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        code:
                          type: string
                          description: 'Tipo do erro. Ex: `validation_error`.'
                        param:
                          type: string
                          description: 'Parâmetro com erro. Ex: `remittance_enabled`.'
                        detail:
                          type: string
                          description: Mensagem descritiva do erro.
      requestBody:
        content:
          application/json:
            schema:
              type: object
              properties:
                remittance_enabled:
                  type: boolean
                  description: Habilita ou desabilita a geração de remessas EDI para esta conta.
                provider_data:
                  type: object
                  description: Atributos específicos do provider bancário.
                  properties:
                    service_point_number:
                      type: string
                      nullable: true
                      description: 'Número do ponto de atendimento (ex.: `numeroPa` no Sicoob). Envie `null` para limpar o valor.'
                      example: '0001'
        required: true
        description: Atributos a atualizar.
  /v2/payment/pix_batches:
    post:
      summary: Criar um Lote de Pagamento Pix
      tags:
        - Pix - Pagamento
      security:
        - bearerAuth: []
      description: |-

        Esse endpoint é utilizado para a geração de um lote de pagamento.

        ## Pré-requisito

        Para emitir um pagamento é necessário ter cadastrado um Conta Financeira.

        ## Eventos de Webhook

        O evento `payment.batch.db.created` é disparado nesta operação.

        Ao cadastrar um Lote de Pagamento, o sistema cria um comando para registrá-lo na instituição financeira. Após o registro do lote ser confirmado na instituição, o evento `payment.pix_batch.confirmed` é disparado.

        O evento `payment.db.created` também é disparado nesta operação caso o lote contenha um novo pagamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Lote de Pagamento criado
          content:
            application/json:
              example:
