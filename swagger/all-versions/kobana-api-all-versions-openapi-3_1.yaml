              nullable: true
              example: 0
              description: |-
                Quem irá gerenciar o pix
                                      * 1 - Kobana
                                      * 2 - Banco
                                      3 - Desabilitado
            pix_account:
              type: object
              description: |-
                Conta pix que será usada na configuração do boleto híbrido.
                                      Se o responsável pelo gerenciamento do pix for o banco, a conta pix deve informada deve ser obrigatóriamente uma conta pix mesmo banco
                                      Escolha um dos formatos para associar uma conta pix a esta carteira:
              oneOf:
                - type: object
                  properties:
                    id:
                      type: integer
                      readOnly: true
                      description: ID da Conta Pix
                    uid:
                      type: string
                      readOnly: true
                      description: UID da Conta Cix
                    custom_name:
                      type: string
                      description: Nome personalizado para a conta pix
                      example: Conta Pix Kobana
                    key:
                      type: string
                      description: Chave pix da conta
                      example: '+55999999999'
                    financial_provider_slug:
                      type: string
                      description: Instituição financeira da conta pix
                      example: bradesco
                    enabled:
                      type: boolean
                      description: Indica se a conta pix está habilitada
                      example: true
                    default:
                      type: boolean
                      description: Indica se a conta pix é a padrão
                      example: false
                    beneficiary:
                      type: object
                      description: Beneficiário da conta pix
                      properties:
                        name:
