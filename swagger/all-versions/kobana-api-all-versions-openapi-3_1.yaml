        mapping:
          pix: '#/components/schemas/payment_pix'
          bank_billet: '#/components/schemas/payment_bank_billet'
          darf: '#/components/schemas/payment_darf'
          gru: '#/components/schemas/payment_gru'
          tax: '#/components/schemas/payment_tax'
          utility: '#/components/schemas/payment_utility'
      oneOf:
