          type: string
          nullable: true
          description: Cabeçalhos da resposta
        response_body:
          type: string
          nullable: true
          deprecated: true
          description: Conteúdo do corpo da resposta
        response_code:
          type: integer
          nullable: true
          description: 'Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
        response_message:
          type: string
          maxLength: 255
          nullable: true
          description: 'Mensagem relativa ao Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        first_try:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da primeira tentativa
        failed_at:
