                  description: Complemento.
                neighborhood:
                  type: string
                  description: Bairro.
                state:
                  type: string
                  description: Estado (UF).
                city_name:
                  type: string
                  description: Nome da cidade.
                zip_code:
                  type: string
                  description: CEP.
