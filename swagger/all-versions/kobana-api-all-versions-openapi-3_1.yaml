        description: Informações a serem atualizadas na Carteira
    delete:
      summary: Excluir a Carteira de Cobrança
      tags:
        - Carteiras de Cobrança
      security:
        - bearerAuth: []
      description: 'Exclui uma Carteira de Cobrança. Opcionalmente, exclui também a Conta Financeira associada.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID da Carteira
          example: 999
          schema:
            type: string
        - name: delete_financial_account
          in: query
          required: false
          description: 'Quando `true`, exclui também a Conta Financeira associada à Carteira.'
          schema:
            type: boolean
            default: false
      responses:
        '202':
          description: Carteira e Conta Financeira excluídas (delete_financial_account=true)
          content:
            application/json:
              example:
                status: 202
                message: Carteira enviada para ser excluída! Logo ela será removida definitivamente.
        '204':
          description: Carteira enfileirada para exclusão (delete_financial_account=false)
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
