                  example: 10
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do primeiro desconto
                  example: 5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o primeiro desconto
                  example: 5
            discount_second:
              type: object
              nullable: true
              description: Segundo desconto
