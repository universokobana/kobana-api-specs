                      number: '123'
                      complement: Apto 1
                      neighborhood: Centro
                      city_name: São Paulo
                      state: SP
                  configuration: null
                  created_at: '2026-03-18T04:51:40+01:00'
                  updated_at: '2026-03-18T04:51:40+01:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_pix_account'
