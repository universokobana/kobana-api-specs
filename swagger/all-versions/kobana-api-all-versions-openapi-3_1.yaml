            * `1` Informa pagamentos divergentes por valores
            * `2` Informa pagamentos divergentes por percentuais
          enum:
            - null
            - 1
            - 2
        divergent_payment_maximum_value:
          type: number
          format: float
          example: null
          nullable: true
          description: 'Valor máximo para a faixa de pagamentos divergentes. '
        divergent_payment_minimum_value:
          type: number
          format: float
          example: null
          nullable: true
          description: 'Valor mínimo para a faixa de pagamentos divergentes. '
