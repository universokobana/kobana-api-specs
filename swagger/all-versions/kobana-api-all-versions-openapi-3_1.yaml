                        key_type:
                          type: string
                          enum:
                            - random
                            - phone
                            - email
                            - cnpj
                            - cpf
                          description: Tipo da Chave Pix
                        key:
                          type: string
                          description: Chave Pix
                    - type: object
                      required:
                        - type
                        - bank_account
                      description: Pix por Conta Bancária
                      properties:
                        type:
                          type: string
                          enum:
                            - bank_account
                          description: Tipo do Pix - por conta bancária
                        bank_account:
                          type: object
                          required:
