                        - data
                      description: Formato do payload - campos estruturados
                    data:
                      type: object
                      required:
                        - tax_code
                        - taxpayer_type
                        - taxpayer_number
                        - taxpayer_name
                        - calculation_date
                        - expire_at
                      description: Campos estruturados do DARF
