    v2_pix_update:
      type: object
      properties:
        amount:
          type: number
          format: float
          description: Quantia
          example: 120.99
        pix_account_uid:
          type: string
          format: uuid
          nullable: true
          description: |
            UID da Conta Pix para alterar a chave Pix do recebedor.

            Este campo é útil quando você deseja alterar a chave Pix no provedor financeiro.

            **Importante**: Somente são aceitas contas Pix que estejam ativas (status `active`).
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          description: |
            Status do Pix.

            `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            `paid`: Cobrança Pix paga.
            `overdue`: Cobrança Pix em atraso.
            `canceled`: Cobrança Pix cancelada.
            `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        revoke_days:
          type: integer
          nullable: true
          description: Número de dias ativo após o vencimento
          example: 1
        message:
          type: string
          nullable: true
          description: Mensagem de solicitação ao pagador
        additional_info:
          type: object
          nullable: true
          description: Informações adicionais para o pagador
          example:
            Chave: Valor
        fine_type:
          type: integer
          nullable: true
          enum:
            - 0
            - 1
            - 2
          description: |-
            Tipo da multa:
                                * `0` Sem multa (`none`)
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                No retorno os dados vêm no objeto `fine`.
          example: 1
        fine_amount:
          type: number
          format: float
          nullable: true
          description: Valor da multa em reais. Obrigatório quando `fine_type` = `amount`.
          example: 50
        fine_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual da multa (0.0 a 100.0). Obrigatório quando `fine_type` = `percentage`.
          example: 5
        interest_type:
          type: integer
          nullable: true
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
          description: |-
            Tipo de juros:
                                * `0` Não se aplica / isento (`none`)
                                * `1` Valor diário — dias corridos (`daily_amount_calendar`)
                                * `2` Percentual diário — dias corridos (`daily_percentage_calendar`)
                                * `3` Percentual mensal — dias corridos (`monthly_percentage_calendar`)
                                * `4` Percentual anual — dias corridos (`yearly_percentage_calendar`)
                                * `5` Valor diário — dias úteis (`daily_amount_business`)
                                * `6` Percentual diário — dias úteis (`daily_percentage_business`)
                                * `7` Percentual mensal — dias úteis (`monthly_percentage_business`)
                                * `8` Percentual anual — dias úteis (`yearly_percentage_business`)
                                No retorno os dados vêm no objeto `interest`.
          example: 2
        interest_amount:
          type: number
          format: float
          nullable: true
          description: Valor diário de juros em reais. Obrigatório quando `interest_type` for por valor (`daily_amount_*`).
          example: 2
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual de juros. Obrigatório quando `interest_type` for por percentual.
          example: 2.5
        reduction_type:
          type: integer
          nullable: true
          enum:
            - 1
            - 2
            - 3
          description: |-
            Tipo de abatimento:
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                * `3` Não se aplica — remove o abatimento (`none`)
                                No retorno os dados vêm no objeto `reduction`.
          example: 1
        reduction_amount:
          type: number
          format: float
          nullable: true
          description: Valor do abatimento em reais. Obrigatório quando `reduction_type` = `amount`.
          example: 25
        reduction_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do abatimento. Obrigatório quando `reduction_type` = `percentage`.
          example: 2.5
        discount_type:
          type: integer
          nullable: true
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
          description: |-
            Tipo de desconto aplicado aos campos `discount_*` (nulo/ausente = sem desconto):
                                * `1` Valor fixo (`fixed_amount`)
                                * `2` Percentual fixo (`fixed_percentage`)
                                * `3` Antecipação por valor — dias corridos (`advance_amount_calendar`)
                                * `4` Antecipação por valor — dias úteis (`advance_amount_business`)
                                * `5` Antecipação por percentual — dias corridos (`advance_percentage_calendar`)
                                * `6` Antecipação por percentual — dias úteis (`advance_percentage_business`)
                                As modalidades de antecipação (`3`–`6`) aceitam apenas uma faixa. No retorno o tipo vem em `discounts.type`.
          example: 1
        discount_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 1º desconto em reais. Obrigatório quando `discount_type` for por valor.
          example: 5
        discount_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 1º desconto. Obrigatório quando `discount_type` for por percentual.
          example: 5
        discount_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 1º desconto é válido.
          example: 7
        discount_second_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 2º desconto em reais.
          example: 10
        discount_second_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 2º desconto.
          example: 2.5
        discount_second_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 2º desconto é válido.
          example: 9
        discount_third_amount:
          type: number
          format: float
          nullable: true
          description: Valor do 3º desconto em reais.
          example: 15
        discount_third_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do 3º desconto.
          example: 1
        discount_third_days:
          type: integer
          nullable: true
          description: Dias antes do vencimento em que o 3º desconto é válido.
          example: 10
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
