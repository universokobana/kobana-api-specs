                type: string
                nullable: true
                maxLength: 2
                description: Estado
                example: RJ
              zip_code:
                type: string
                nullable: false
                maxLength: 8
                description: CEP (formato 99999999)
                example: '20090001'
              short:
                type: string
                readOnly: true
                description: Endereço Curto
                example: 'Av. Rio Branco, 26, Sobreloja'
              full:
                type: string
                readOnly: true
                description: Endereço Completo
                example: 'Av. Rio Branco, 26, Sobreloja, Centro, Rio de Janeiro, RJ. CEP: 20090-001'
