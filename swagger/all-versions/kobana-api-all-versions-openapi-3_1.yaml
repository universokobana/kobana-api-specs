                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `400`.'
                  data:
                    $ref: '#/components/schemas/v2_financial_account'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
