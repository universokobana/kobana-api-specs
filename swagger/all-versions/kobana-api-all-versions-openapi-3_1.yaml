        message:
          type: string
          description: Mensagem de sms
          example: null
        phone_to:
          type: string
          maxLength: 14
          description: Telefone (com DDI e DDD) do pagador
          example: null
        sent_error:
          type: string
          nullable: true
          maxLength: 255
          description: Erro ocorrido no envio
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        failed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega falhou
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Submetido para o Gateway
            * `failed` Falha ao Enviar para o Gateway
            * `rejected` Rejeitado pelo Gateway
            * `auditing` Sendo Auditado para Liberação
            * `sent` Enviado pelo Gateway
            * `delivered` Recebido pelo Destinatário
            * `n_delivered` Não Recebido pelo Destinatário
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - rejected
            - sent
            - delivered
            - n_delivered
            - read
            - auditing
            - clicked
