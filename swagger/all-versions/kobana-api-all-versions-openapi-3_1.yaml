        next_our_number:
          type: integer
          maxLength: 40
          nullable: true
          description: 'Próximo Nosso Número. Default: 1'
          example: 1
        next_remittance_number:
          type: integer
          maxLength: 40
          nullable: true
          example: 1
          description: 'Último sequencial da remessa Default: 1'
