        click_count:
          type: integer
          description: Quantidade que foi clicado.
        read_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que foi lido.
        read_count:
          type: integer
          description: Quantidade que foi lido.
