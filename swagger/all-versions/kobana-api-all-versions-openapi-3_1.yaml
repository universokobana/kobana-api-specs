                    id: 1
                    uid: 019dffe4-eb1f-7934-8128-ff30ddecfa40
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-05-06T18:44:45-06:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
