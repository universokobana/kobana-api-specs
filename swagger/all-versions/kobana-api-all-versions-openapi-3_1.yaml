            `charge.pix_account`: Conta Pix.
            `payment.account`: Conta de Pagamento.
            `transfer.account`: Conta de Transferência.
            `statement.account`: Conta de Extrato

            *Observação sobre `charge.pix_account`*: por padrão a validação da chave Pix no PSP é síncrona — falhas retornam `422`. Em algumas contas a validação ocorre em background; nesse caso a resposta `201` é retornada antes de a validação concluir — acompanhe o resultado via `validated_at` e `enabled_at` na PixAccount.
    v2_new_connection_santander_2:
      type: object
      required:
        - credentials
        - provider_slug
      properties:
        label:
          type: string
          description: Nome da Conexão
          default: Santander
          nullable: true
        provider_slug:
          type: string
          default: santander
          example: santander
          description: |
            Slug do provedor financeiro

            *Pode ser consultado no endpoint v2/financial/providers.
        environment:
          type: string
          enum:
            - production
            - homologation
          default: production
          description: |
            Ambiente de conexão com o provedor financeiro.

            `production`: Produção.
            `homologation`: Homologação

            * Por motivos de segurança, esse campo será ignorado no nosso ambiente de Sandbox.
        enabled:
          type: boolean
          nullable: true
          description: Habilita conexão
          default: false
          example: null
        apis:
          type: array
          items:
            type: string
          description: |
            APIs permitidas para o provedor financeiro.

            `charge/bank_billet`: Boleto.
            `charge/pix`: Pix.
            `payment`: Pagamento.
            `transfer`: Transferência
        credentials:
          type: object
          description: Credenciais usadas na autenticação e autorização junto ao provedor.
          properties:
            client_id:
              type: string
              description: Client ID
            client_secret:
              type: string
              description: Client Secret
        associations:
          type: array
          items:
            type: object
            required:
              - resource
            properties:
              resource:
                type: object
                required:
                  - slug
                  - uid
                properties:
                  slug:
                    type: string
                    enum:
                      - charge.bank_billet_account
                      - charge.pix_account
                      - charge.automatic_pix_account
                      - payment.account
                      - transfer.account
                      - statement.account
                    description: Tipo da conta de serviço associada.
                    example: charge.bank_billet_account
                  uid:
                    type: string
                    description: UUID da conta de serviço associada.
                    example: 14a31e1b-6fa5-4825-8e54-61579842d520
          description: |2
               Contas de serviço associadas.

            `charge.bank_billet_account`: Carteira de Boleto.
            `charge.pix_account`: Conta Pix.
            `payment.account`: Conta de Pagamento.
            `transfer.account`: Conta de Transferência.
            `statement.account`: Conta de Extrato

            *Observação sobre `charge.pix_account`*: por padrão a validação da chave Pix no PSP é síncrona — falhas retornam `422`. Em algumas contas a validação ocorre em background; nesse caso a resposta `201` é retornada antes de a validação concluir — acompanhe o resultado via `validated_at` e `enabled_at` na PixAccount.
    v2_transfer_account:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: UUID da conta de transferência
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        financial_account_uid:
          type: string
          readOnly: true
          description: UUID da conta financeira associada
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        connection_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
          description: Conexão bancária da conta.
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        agreement_code:
          type: string
          nullable: true
          description: Código do convênio
          example: '123456'
        provider_data:
          type: object
          nullable: true
          description: 'Dados específicos do provider. Para Sicoob, expõe `service_point_number` e `cooperative_cnpj`.'
          properties:
            service_point_number:
              type: string
              nullable: true
              description: Número do ponto de atendimento. Envie `null` para limpar o valor.
              example: '0001'
