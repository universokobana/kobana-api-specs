    post:
      summary: Criar uma Transferência
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: |
        Endpoint genérico para criação de transferências de qualquer tipo. O tipo é especificado pelo campo obrigatório 'kind' no nível raiz do payload:

        ## Tipos Suportados

        ### PIX por Chave
        Especificar `kind: "pix"` e fornecer os dados PIX dentro de `pix.data` (padrão Payment):
        ```json
        {
          "financial_account_uid": "...",
          "amount": 100.0,
          "kind": "pix",
          "pix": {
            "kind": "pix",
            "data": {
              "type": "key",
              "key_type": "email",
              "key": "destinatario@example.com"
            }
          },
          "beneficiary": {
            "name": "João Silva",
            "document": "123.456.789-10"
          }
        }
        ```

        ### PIX por Conta Bancária
        Especificar `kind: "pix"` e fornecer os dados PIX dentro de `pix.data` com `type: "bank_account"`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 200.0,
          "kind": "pix",
          "pix": {
            "kind": "pix",
            "data": {
              "type": "bank_account",
              "bank_account": {
                "bank_code": "237",
                "agency_number": "1234",
                "account_number": "56789-0"
              }
            }
          },
          "beneficiary": {
            "name": "Maria Santos",
            "document": "987.654.321-00"
          }
        }
        ```

        ### TED
        Especificar `kind: "ted"` e fornecer os dados bancários dentro de `ted.data`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 300.0,
          "kind": "ted",
          "ted": {
            "kind": "ted",
            "data": {
              "bank_account": {
                "bank_code": "341",
                "agency_number": "4321",
                "agency_digit": "5",
                "account_number": "98765-4",
                "account_type": "checking"
              }
            }
          },
          "beneficiary": {
            "name": "Pedro Oliveira",
            "document": "11.222.333/0001-44"
          }
        }
        ```

        ### Transferência Interna
        Especificar `kind: "internal"` e fornecer os dados da conta destino dentro de `internal.data`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 400.0,
          "kind": "internal",
          "internal": {
            "kind": "internal",
            "data": {
              "agency_number": "0001",
              "account_number": "12345-6"
            }
          },
          "beneficiary": {
            "name": "Ana Costa",
            "document": "555.666.777-88"
          }
        }
        ```

        ## Eventos de Webhook

        O evento `transfer.db.created` é disparado nesta operação.

        > **Endpoint Unificado:** Este endpoint unifica a criação de todos os tipos de transferência. Para criar transferências de um tipo específico, você também pode usar os endpoints dedicados em `/api/v2/transfer/{type}`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Transferência Interna criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019e4dad-128f-7541-8bb6-0d48164a5a30
                  status: pending
                  scheduled_to: null
                  registration_status: pending
                  financial_account_uid: 019e4dad-126d-7425-b030-f51c2dfff976
                  amount: 400.25
                  target:
                    beneficiary:
                      document_number: 111.444.777-35
                      name: Ana Costa
                    bank_account: null
                    internal:
                      agency_number: '0001'
                      agency_digit: '0'
                      account_number: '12345'
                      account_digit: '6'
                    pix: null
                    transfer_kind: internal
                  kind: internal
                  pix: null
                  ted: null
                  internal:
                    agency_number: '0001'
                    agency_digit: '0'
                    account_number: '12345'
                    account_digit: '6'
                  beneficiary:
                    document_number: 111.444.777-35
                    name: Ana Costa
                  source: null
                  confirmed_at: null
                  rejected_error: null
                  rejected_at: null
                  transaction_code: null
                  transaction_date: null
                  transfer_purpose: null
                  identifier: null
                  external_id: null
                  financial_provider_external_id: null
                  custom_data: null
