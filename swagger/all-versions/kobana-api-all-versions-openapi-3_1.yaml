                type: string
                nullable: true
                enum:
                  - mobile
                  - landline
                description: Tipo (Celular/Fixo)
                example: mobile
              country_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 6
                description: Código do País
                example: '55'
              local_code:
                type: string
                nullable: true
                minLength: 2
                maxLength: 2
                description: Código Local
                example: '21'
              number:
                type: string
                nullable: false
                minLength: 8
                maxLength: 9
                description: Número do Telefone
                example: '30030386'
        emails:
          type: array
          nullable: true
          description: Lista de Emails
          items:
            type: object
            required:
              - address
            properties:
              label:
                type: string
                nullable: true
                description: Etiqueta (label)
                example: work
              address:
                type: string
                nullable: false
                maxLength: 80
                description: Endereço de E-mail
                example: kobana@example.com
        tags:
          type: array
          nullable: true
          description: Tags associadas ao registro
          example: null
          items:
            type: string
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Lista de tags separadas por vírgula
        custom_data:
          type: object
          nullable: true
          description: Disponível para envio de um JSON com uma estrutura de dados livre
          example: '{"source": "ERP X", "migration": true}'
        notes:
          type: string
          nullable: true
          description: Observações. Campo de texto livre
