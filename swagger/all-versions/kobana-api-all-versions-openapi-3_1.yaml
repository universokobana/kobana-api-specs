      summary: Informações do Usuário (descontinuado)
      tags:
        - Usuário Autenticado (descontinuado)
      security:
        - bearerAuth: []
      description: Consulta informações da conta acessada.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
      responses:
        '200':
          description: Usuário encontrado
          content:
            application/json:
              example:
                id: 138
                email: 1bdd73393fad1b555f579ea28a600a66@muller-batz.example
                account_type: individual
                first_name: Margret
                middle_name: Simões
                last_name: Gonçalo
                full_name: Margret Simões Gonçalo
                cpf: 774.469.486-47
                date_of_birth: '1970-03-01'
                mother_name: Lenadra Simões Gonçalo
                father_name: José Simões Gonçalo
                created_at: '2026-06-26T07:12:20-07:00'
                updated_at: '2026-06-26T07:12:20-07:00'
                address_street_name: Av. Burkhard Hehn Simões
                address_number: '120'
                address_complement: '709'
                address_neighborhood: São Francisco
                address_postal_code: '24360440'
                address_city_name: Rio de Janeiro
                address_state: RJ
                phone_number: '2199999999'
                business_name: null
                business_cnpj: null
                business_legal_name: null
                simple_opting: false
                balance_cents: 10000
              schema:
                $ref: '#/components/schemas/v1_user_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '404':
          description: Usuário não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
  /v1/webhook_deliveries:
    get:
      summary: Listar Webhooks Enviados
      tags:
        - Log de Webhooks
      security:
        - bearerAuth: []
      description: |-
        Listar webhooks enviados

        O `ID do Objeto` vai retornar todos e qualquer tipo de objeto que tenha o ID enviado, ou seja, se você enviar 1, poderá retornar boletos, clientes e etc. Caso queira um filtro mais refinado, combine o `ID do Objeto` com o `Código do evento`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
        - name: resource_owner_id
          in: query
          description: ID do objeto.
          required: false
          schema:
            type: integer
        - name: webhook_id
          in: query
          description: ID do Webhook
          required: false
          schema:
            type: integer
        - name: uid
          in: query
          description: UID usado no cabeçalho da requisição
          required: false
          schema:
            type: string
        - name: response_code
          in: query
          description: 'Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
          required: false
          schema:
            type: integer
        - name: event_code
          in: query
          description: Código do evento.
          required: false
          schema:
            type: string
            enum:
              - ping
              - access_token.db.created
