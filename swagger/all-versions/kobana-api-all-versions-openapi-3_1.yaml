                      description: Dados bancários
                      properties:
                        compe_number:
                          type: string
                          description: Código do banco (COMPE)
                          example: '341'
                        ispb_number:
                          type: string
                          nullable: true
                          description: ISPB do banco
                        agency_number:
                          type: string
                          description: Número da agência
                          example: '4321'
                        agency_digit:
                          type: string
                          nullable: true
                          description: Dígito da agência
                          example: '5'
                        account_number:
                          type: string
                          description: Número da conta
                          example: 98765-4
                        account_digit:
                          type: string
                          nullable: true
                          description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência Interna
          required:
