          description: Configuração de Boleto Híbrido
          properties:
            pix_mode:
              type: integer
              nullable: true
              example: 0
              description: |-
                Quem irá gerenciar o pix
                                      * 1 - Kobana
                                      * 2 - Banco
                                      3 - Desabilitado
            pix_account:
              type: object
              description: |-
                Conta pix que será usada na configuração do boleto híbrido.
                                      Se o responsável pelo gerenciamento do pix for o banco, a conta pix deve informada deve ser obrigatóriamente uma conta pix mesmo banco
                                      Escolha um dos formatos para associar uma conta pix a esta carteira:
              oneOf:
                - type: object
                  properties:
                    id:
                      type: integer
                      readOnly: true
                      description: ID da Conta Pix
                    uid:
                      type: string
                      readOnly: true
                      description: UID da Conta Cix
                    custom_name:
                      type: string
                      description: Nome personalizado para a conta pix
                      example: Conta Pix Kobana
                    key:
                      type: string
                      description: Chave pix da conta
                      example: '+55999999999'
                    financial_provider_slug:
                      type: string
                      description: Instituição financeira da conta pix
                      example: bradesco
                    enabled:
                      type: boolean
                      description: Indica se a conta pix está habilitada
                      example: true
                    default:
                      type: boolean
                      description: Indica se a conta pix é a padrão
                      example: false
                    beneficiary:
                      type: object
                      description: Beneficiário da conta pix
                      properties:
                        name:
                          type: string
                          description: Nome do beneficiário
                        document:
                          type: string
                          description: Documento do beneficiário (CNPJ ou CPF)
                          example: '12345678901'
                        address:
                          type: object
                          description: Endereço do beneficiário
                          properties:
                            street:
                              type: string
                              description: Rua do beneficiário
                              example: Rua do Beneficiário
                            number:
                              type: string
                              description: Número da rua do beneficiário
                              example: '123'
                            complement:
                              type: string
                              description: Complemento do endereço do beneficiário
                              example: Apto 101
                            neighborhood:
                              type: string
                              description: Bairro do beneficiário
                              example: Bairro do Beneficiário
                            city_name:
                              type: string
                              description: Cidade do beneficiário
                              example: Cidade do Beneficiário
                            state:
                              type: string
                              description: Estado do beneficiário
                              example: SP
                            zip_code:
                              type: string
                              description: CEP do beneficiário (formato 99999999)
                              example: '01310100'
                - type: object
                  properties:
                    uid:
                      type: string
                      format: uuid
                      description: UID da Conta Pix
                      example: 018df180-7208-727b-a10a-ea545e4a75a8
                - type: object
                  properties:
                    id:
                      type: string
                      description: ID da Conta Pix
                      example: 018df180-7208-727b-a10a-ea545e4a75a8
            pix_billing_options:
              type: object
              nullable: true
              description: Opções de cobrança do pix no boleto. Deve ser enviado quando o pix for gerenciado pela Kobana.
              properties:
                kind:
                  type: string
                  nullable: false
                  example: instant
                  description: |-
                    Tipo de cobrança
                                              * instant - Cobrança imediata
                                              * billing - Cobrança com vencimento
                interest:
                  type: boolean
                  nullable: true
                  description: Habilitar juros
                  example: true
                fine:
                  type: boolean
                  nullable: true
                  description: Habilitar multa
                  example: true
                discount:
                  type: boolean
                  nullable: true
                  description: Habilitar desconto
                  example: true
                revoke_days:
                  type: boolean
                  nullable: true
                  description: Habilitar dias para revogação
                  example: true
        name:
          type: string
          maxLength: 255
          description: 'Nome da Conta. Não é recebido na criação e nem na atualização, só é retornado na consulta e listagem'
        status:
          type: string
          readOnly: true
          description: |-
            Situação da carteira:
            Quando a carteira acaba de ser cadastrada, ela ganha o status `pending`.

            Nesse momento o usuário deve aceitar os termos e iniciar a homologação.

            Ao clicar em “Prosseguir com a Homologação”, o status passa para `homologating`.

            Será gerado um boleto e uma remessa de Homologação para ser enviada ao banco. Após o término, o status passa para `validating`.

            A partir desse momento o usuário precisa informar o valor do boleto que foi gerado ou enviar o retorno processado pelo banco.

            Quando o valor é informado corretamente, ou no retorno processado, o banco diz estar tudo certo, o status passa para `active`.

            * `pending` Homologação não iniciada
            * `homologating` Em homologação, aguardando pagamento do boleto
            * `validating` Boleto pago, aguardando validação
            * `active` Ativa e pronta para uso
          enum:
            - pending
            - homologating
            - validating
            - active
        default:
          type: boolean
          nullable: true
          readOnly: true
          description: |-
            Padrão.
            O campo `default` determina a carteira de cobrança que será usada na criação do boleto quando nenhuma carteira for informada.

            No momento que a primeira carteira é homologada (passa para o `status` = `active`), ela recebe o valor `default` = `true`
        configuration:
          type: object
          nullable: true
          description: Configuração de dados padrões para boleto
        bank_contract:
          type: object
          readOnly: true
          description: 'Dados da Carteira. Não é recebido na criação e nem na atualização, só é retornado na consulta e listagem.'
        custom_name:
          type: string
          maxLength: 255
          description: Nome da Carteira para identificação dentro da Kobana.
        kind:
          type: string
          description: |-
            Tipo de CNAB:
            * `cnab400` CNAB 400
            * `cnab240` CNAB 240
          enum:
            - cnab400
            - cnab240
        remittance_disabled:
          type: boolean
          nullable: true
          description: Desabilita geração de remessas.
        remittance_disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a geração de remessa foi desabilitada.
        allow_expiration_on_weekends:
          type: boolean
          nullable: true
          description: Permitir vencimento em fim de semana e feriados
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação da carteira
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização da carteira
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se a carteira foi criada por API
