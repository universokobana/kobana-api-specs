          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_transfer:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID da Transferência
        status:
          readOnly: true
          type: string
          description: |
            Status.
            `pending`: Pendente. [Estado Inicial]
            `awaiting_approval`: Aguardando aprovação.
            `confirmed`: Confirmado.
            `reproved`: Reprovado.
            `approved`: Aprovado.
            `rejected`: Rejeitado.
        registration_status:
          readOnly: true
          type: string
          description: |
            Status de Registro.
            `pending`: Pendente. [Estado Inicial]
            `requested`: Aguardando aprovação.
            `confirmed`: Confirmado.
            `rejected`: Rejeitado.
            `failed`: Falha.
        transfer_purpose:
          readOnly: true
          type: object
          nullable: true
          properties:
            code:
              type: string
              description: Código do objetivo da transferência
              example: '98'
            description:
              type: string
              description: Descrição do objetivo da transferência
              example: Pagamentos Diversos
          description: |
            Objetivo da Transferência.
            `01`: Cobrança
            `03`: Boleto de Pagamento Eletrônico
            `04`: Conciliação Bancária
            `05`: Débitos
            `06`: Custódia de Cheques
            `07`: Gestão de Caixa
            `08`: Consulta/Informação Margem
            `09`: Averbação da Consignação/Retenção
            `10`: Pagamento Dividendos
            `11`: Manutenção da Consignação
            `12`: Consignação de Parcelas
            `13`: Glosa da Consignação (INSS)
            `14`: Consulta de Tributos a pagar
            `20`: Pagamento Fornecedor
            `22`: Pagamento de Contas, Tributos e Impostos
            `23`: Interoperabilidade entre Contas de Instituições de Pagamentos
            `25`: Compror
            `26`: Compror Rotativo
            `29`: Alegação do Pagador
            `30`: Pagamento Salários
            `32`: Pagamento de honorários
            `33`: Pagamento de bolsa auxílio
            `34`: Pagamento de prebenda (remuneração a padres e sacerdotes)
            `40`: Vendor
            `41`: Vendor a Termo
            `50`: Pagamento Sinistros Segurados
            `60`: Pagamento Despesas Viajante em Trânsito
            `70`: Pagamento Autorizado
            `75`: Pagamento Credenciados
            `77`: Pagamento de Remuneração
            `80`: Pagamento Representantes / Vendedores Autorizados
            `90`: Pagamento Benefícios
            `98`: Pagamentos Diversos
        financial_account_uid:
          type: string
          format: uuid
          description: UID da Conta Financeira de Origem
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          format: float
          description: Quantia
        scheduled_to:
          type: string
          nullable: true
          format: date
          example: '2023-12-12'
          description: Data de Agendamento
        confirmed_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Confirmação
        rejected_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Rejeição
        rejected_error:
          type: string
          readOnly: true
          nullable: true
          description: Motivo da rejeição retornado pelo banco
        transaction_code:
          readOnly: true
          nullable: true
          type: string
          description: Código de Autenticação
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        transaction_date:
          readOnly: true
          nullable: true
          type: string
          format: date-time
          description: Data de Autenticação
          example: '2023-12-12'
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem da Transferência.

            `api`: API.
            `view`: Manual
        target:
          type: object
          properties:
            transfer_kind:
              type: string
              nullable: false
              description: |
                Tipo da transferência

                `pix`: Pix.
                `ted`: TED.
                `internal`: Entre Contas
            pix:
              type: object
              nullable: true
