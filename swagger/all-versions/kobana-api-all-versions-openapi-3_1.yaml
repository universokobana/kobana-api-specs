          type: string
          nullable: true
          maxLength: 20
          description: |-
            Ciclo do carnê. Default: monthly
            * `biweekly` Quinzenal
            * `bimonthly` Bimestral
            * `monthly` Mensal
            * `quarterly` Trimestral
            * `semiannual` Semestral
            * `annual` Anual
          enum:
            - biweekly
            - bimonthly
            - monthly
            - quarterly
            - semiannual
            - annual
