        amount:
          type: string
          format: float
          description: Quantia (R$)
        floating:
          type: integer
          description: Quantidade de Dias para Crédito. Padrão 5 dias. Máximo 30 dias.
        financial_provider_external_id:
          type: string
          maxLength: 2
          description: 'Código de partilha do Santander (2 dígitos, pré-cadastrado no convênio). Quando informado, os dados bancários do recebedor são dispensados.'
    v1_bank_billet_object:
      type: object
      required:
        - expire_at
        - amount
        - customer_person_name
        - customer_cnpj_cpf
        - customer_zipcode
        - customer_address
        - customer_neighborhood
        - customer_city_name
        - customer_state
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do boleto
        bank_billet_account_id:
          type: integer
          description: 'ID da Carteira de Cobrança. Se não informado, usará a carteira padrão.'
