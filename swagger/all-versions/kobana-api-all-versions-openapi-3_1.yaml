    v2_connection:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          description: UID da Conexão
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        label:
          type: string
          description: Nome da Conexão
          nullable: true
        provider_slug:
          type: string
          description: |
            Slug do provedor financeiro

            *Pode ser consultado no endpoint v2/financial/providers.
        environment:
          type: string
          enum:
            - production
            - homologation
          description: |
            Ambiente de conexão com o provedor financeiro.

            `production`: Produção.
            `homologation`: Homologação
        apis:
          type: array
          items:
            type: string
          description: |
            APIs permitidas para o provedor financeiro.

            `charge/bank_billet`: Boleto.
            `charge/pix`: Pix.
            `payment`: Pagamento.
            `transfer`: Transferência
        credentials:
          type: object
          description: |
            Credenciais.
        certificate_uid:
          type: string
          format: uuid
          example: 018df180-7208-727b-a10a-ea545e4a75a8
          nullable: true
          description: UID do Certificado.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Criação do Registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora da Última Atualização do Registro
        enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Ativação da Conexão
        validated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e Hora de Validação da Conexão
        associations:
          type: array
          readOnly: true
          items:
            type: object
            required:
              - resource
            properties:
              resource:
                type: object
                required:
                  - slug
                  - uid
                properties:
                  slug:
                    type: string
                    enum:
                      - charge.bank_billet_account
                      - charge.pix_account
                      - payment.account
                      - transfer.account
                      - statement.account
                    description: Tipo da conta de serviço associada.
                    example: charge.bank_billet_account
                  uid:
                    type: string
                    description: UUID da conta de serviço associada.
                    example: 14a31e1b-6fa5-4825-8e54-61579842d520
          description: |2
               Contas de serviço associadas.

