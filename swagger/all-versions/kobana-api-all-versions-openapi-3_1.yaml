          type: boolean
          nullable: true
          description: Desabilita geração de remessas.
        remittance_disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a geração de remessa foi desabilitada.
        allow_expiration_on_weekends:
          type: boolean
          nullable: true
          description: Permitir vencimento em fim de semana e feriados
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação da carteira
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização da carteira
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se a carteira foi criada por API
