      summary: Exportar Lote no Formato .pdf
      tags:
        - Lotes
      security:
        - bearerAuth: []
      description: |-
        Exportar lote no formato .pdf.

        Após a requisição a exportação entra numa fila para gerar o arquivo do lote. A URL do arquivo do lote será retornada pelo endpoint de [Exportação do Lote](/reference/get_v1-bank-billet-batch-exports-id).
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
