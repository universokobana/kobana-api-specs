  '/v2/payment/taxes/{uid}/cancel':
    put:
      summary: Cancelar um Pagamento de Tributo
      tags:
        - Tributo (beta)
      security:
        - bearerAuth: []
      description: |-

        > **Processamento Assíncrono:** Este endpoint é processado assincronamente e cria um comando de cancelamento para o Pagamento.
        O cancelamento de um Pagamento é feito assincronamente, ou seja, ao receber a requisição, a nossa API guarda a solicitação e cria um Comando. Esse comando é processado em segundo plano e depois de confirmado, o Pagamento tem seu status alterado para Cancelado. Você recebe na resposta desta requisição o ID do comando criado e pode consultá-lo a qualquer momento.

        ## Eventos de Webhook

        Quando a requisição é realizada, um evento `payment.tax.cancel.requested` é disparado.
        O nosso servidor então começa as tentativas de envio do cancelamento para a instituição financeira.
        Somente depois de confirmado na instituição financeira, aí então o pagamento é marcado como cancelado em nosso banco de dados.
        Neste momento o evento `payment.tax.cancel.confirmed` é disparado.

        > ⚠️ **Atenção ao status Cancelado:** O status de Cancelado é terminal. O pagamento não poderá mais ser processado após o cancelamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          description: UUID do Pagamento
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '200':
          description: Pagamento cancelado sem interação com provedor
          content:
            application/json:
              example:
                status: 200
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  message:
                    type: string
                    description: Mensagem de sucesso
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Pagamento já foi confirmado ou rejeitado
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: unprocessable_content
                    title: Não foi possível gerar Comando de Cancelamento de Pagamento.
                    detail: Pagamento já foi confirmado ou rejeitado.
              schema:
                $ref: '#/components/schemas/v2_error'
