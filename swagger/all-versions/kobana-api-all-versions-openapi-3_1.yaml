                  description: Número do beneficiário
                  example: '123'
                complement:
                  type: string
                  description: Complemento do beneficiário
                  example: Apto 101
                neighborhood:
                  type: string
                  description: Bairro do beneficiário
                  example: Bairro do Beneficiário
                city_name:
                  type: string
                  description: Cidade do beneficiário
                  example: Cidade do Beneficiário
                state:
                  type: string
                  description: Estado do beneficiário
                  example: SP
