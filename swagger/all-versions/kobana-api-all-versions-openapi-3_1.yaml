components:
  schemas:
    v1_errors_object:
      type: object
      properties:
        errors:
          $ref: '#/components/schemas/v1_errors_map'
    v1_errors_map:
      type: object
      items:
        type: array
        items:
          type: string
          description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
    v1_error:
      type: object
      properties:
        status:
          type: integer
          description: 'Status HTTP do erro. Ex: `400`.'
        errors:
          type: array
          items:
            type: object
            properties:
              title:
                type: string
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
              code:
                type: string
                description: 'Código do erro. Ex: `unprocessable_content`.'
              detail:
                type: string
                description: 'Descrição do erro em detalhe. Ex: `"O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso"`.'
    v1_split_accounts_object:
      type: object
      properties:
        bank_number:
          type: string
          maxLength: 3
          description: Número do banco
        agency_number:
          type: string
          maxLength: 5
          description: Agência (Sem dígito)
        agency_digit:
          type: string
          maxLength: 1
          description: Dígito da Agência
        account_number:
          type: string
          maxLength: 12
          description: Conta (Sem dígito)
        account_digit:
          type: string
          maxLength: 1
          description: Dígito da Conta
        cnpj_cpf:
          type: string
          maxLength: 20
          description: CNPJ/CPF do Beneficiário
        name:
          type: string
          maxLength: 40
          description: Nome do Beneficiário
        amount:
          type: string
          format: float
          description: Quantia (R$)
        floating:
          type: integer
          description: Quantidade de Dias para Crédito. Padrão 5 dias. Máximo 30 dias.
    v1_bank_billet_object:
      type: object
      required:
        - expire_at
        - amount
        - customer_person_name
        - customer_cnpj_cpf
        - customer_zipcode
        - customer_address
        - customer_neighborhood
        - customer_city_name
        - customer_state
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do boleto
        bank_billet_account_id:
          type: integer
          description: 'ID da Carteira de Cobrança. Se não informado, usará a carteira padrão.'
          example: null
        bank_billet_layout_id:
          type: integer
          nullable: true
          description: ID do Modelo de Boleto
          example: null
        amount:
          type: number
          format: float
          description: Quantia
          example: 10.99
        expire_at:
          type: string
          format: date
          description: Data de vencimento
          example: '2023-12-12'
        customer_id:
          type: integer
          nullable: true
          description: 'ID do Cliente. Quando esse ID é passado, os campos `customer_person_name`, `customer_cnpj_cpf`, `customer_zipcode`, `customer_address`, `customer_city_name`, `customer_state` e `customer_neighborhood` não são obrigatórios.'
          example: null
        customer_person_name:
          type: string
          maxLength: 120
          description: Nome do cliente
          example: João Silva
        customer_cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ do cliente
          example: 16.974.923/0001-84
        customer_state:
          type: string
          maxLength: 2
          description: Estado
          example: SP
        customer_city_name:
          type: string
          maxLength: 60
          description: Cidade(Nome deve estar correto e completo)
          example: São Paulo
        customer_zipcode:
          type: string
          maxLength: 8
          description: CEP (formato 99999999)
          example: '01310100'
        customer_address:
          type: string
          maxLength: 255
          description: Endereço
          example: 'Rua F, alamenda G'
        customer_address_complement:
          type: string
          maxLength: 120
          description: Complemento
          example: null
        customer_address_number:
          type: string
          maxLength: 10
          description: Número
          example: null
        customer_email:
          type: string
          format: email
          maxLength: 80
          description: E-mail do Pagador
          example: null
        customer_email_cc:
          type: string
          format: email
          maxLength: 80
          description: E-mail alternativo do Pagador
          example: null
        customer_neighborhood:
          type: string
          maxLength: 80
          description: Bairro
          example: Centro
        customer_phone_number:
          type: string
          maxLength: 15
          description: 'Telefone (com DDD, DDI é opcional)'
          example: null
        customer_ignore_email:
          type: boolean
          nullable: true
          description: Nunca enviar e-mail para este cliente
          example: null
        customer_ignore_sms:
          type: boolean
          nullable: true
          description: Nunca enviar SMS para este cliente
          example: null
        customer_mobile_local_code:
          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
        customer_nickname:
          type: string
          nullable: true
          maxLength: 255
          description: Apelido ou Nome Fantasia do Pagador
          example: null
        customer_notes:
          type: string
          nullable: true
          description: Observações do Pagador
          example: null
        customer_contact_person:
          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
            * `7` Para porcentagem mensal - Bancos suportados: Bradesco, BB, BTG, Caixa, Inter, Itaú, Safra, Santander, Sicoob e Sicredi
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Porcentagem de juros. De 0.0 a 100.0 (Ex 1.5% = 1.5) Obrigatório se interest_type é igual a 1 ou 7. Até 2 casas decimais.
