          example: '2023-12-12'
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem da Transferência.

            `api`: API.
            `view`: Manual
        target:
          type: object
          properties:
            transfer_kind:
              type: string
              nullable: false
              description: |
                Tipo da transferência

                `pix`: Pix.
                `ted`: TED.
                `internal`: Entre Contas
            pix:
              type: object
              nullable: true
              description: Dados do Pix (Presente se o campo `transfer_kind` for `pix`)
              properties:
                txid:
                  type: string
                  nullable: true
