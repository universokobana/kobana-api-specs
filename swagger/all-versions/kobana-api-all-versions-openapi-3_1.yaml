              type: number
              format: float
              nullable: true
              example: 120.99
              description: 'Quantia. Opcional, o valor será extraído automaticamente do qrcode.'
            scheduled_to:
              type: string
              format: date
              nullable: true
              description: Data de Agendamento
              example: '2023-12-12'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem.
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            payment_account_uid:
              type: string
              format: uuid
              nullable: true
              description: 'Conta de pagamento de origem (opcional). Se omitida, usa-se a mais antiga da conta financeira. Se informada, deve pertencer à `financial_account_uid`.'
