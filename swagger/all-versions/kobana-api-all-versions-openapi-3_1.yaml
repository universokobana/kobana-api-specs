      summary: Liberar Boleto DDA para Pagamento
      tags:
        - Boletos DDA
      security:
        - bearerAuth: []
      description: |

        Libera um boleto DDA com status `pending` para pagamento. Somente boletos com `external_status: open` podem ser liberados.

        ## Eventos de Webhook

        O evento `payment.dda.bank_billet.db.updated` é disparado nesta operação com as alterações de status (`pending` → `released`) e o campo `released_at`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: uid
          in: path
          required: true
          description: UUID do boleto DDA
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
          schema:
            type: string
      responses:
        '200':
          description: Boleto DDA liberado para pagamento com sucesso
          content:
            application/json:
              example:
                status: 200
                data:
                  uid: 019ec810-31c6-7653-a617-147236ede5ae
                  status: released
                  external_status: open
                  barcode: '34193497900000150001740000000148050088825000'
                  line: 34191.74001 00000.148050 08882.500009 3 49790000015000
                  our_number: '123556238'
                  description: BOLETO DDA TESTE
                  nominal_amount: 10
                  amount: 7.6
                  min_payment_amount: 1
                  max_payment_amount: 10
                  expire_at: '2026-06-18'
                  issue_date: '2026-06-15'
                  reference_month: null
                  beneficiary_name: Kobana Tecnologia Ltda.
                  beneficiary_cnpj_cpf: 05.813.794/0001-26
                  beneficiary_bank_name: BANCO EXEMPLO
                  beneficiary_bank_number: '101'
                  owner_cnpj_cpf: 83.191.445/0001-23
                  owner_person_name: EMPRESA PAGADORA
                  fine_amount: 240
                  fine_percentage: 2
                  fine_date: '2026-06-16'
                  interest_amount: 240
                  interest_percentage: 2
                  interest_date: '2026-06-17'
                  discount_amount: 240
                  discount_date: '2026-06-15'
                  reduction_amount: null
                  allow_parcial_payment: false
                  released_at: '2026-06-15T10:36:05+13:00'
                  rejected_at: null
                  payment_uid: null
                  created_at: '2026-06-15T10:36:05+13:00'
                  updated_at: '2026-06-15T10:36:05+13:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                  data:
                    $ref: '#/components/schemas/v2_dda_bank_billet'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Scope de escrita obrigatório.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
