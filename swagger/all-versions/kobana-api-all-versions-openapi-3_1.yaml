        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação. Formato iso8601
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização. Formato iso8601
        kind:
          type: string
          enum:
