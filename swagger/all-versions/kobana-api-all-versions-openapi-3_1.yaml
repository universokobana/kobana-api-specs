        active:
          type: boolean
          nullable: true
          description: 'Define se o webhook estará ativo, recebendo notificações. O valor padrão é `true`.'
          example: null
        ssl_verification_enabled:
          type: boolean
          nullable: true
          description: Define se a verificação SSL está habilitada no webhook.
          example: null
        subaccounts:
          type: boolean
          nullable: false
          description: Define se o webhook estará ativo para os eventos das subcontas.
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts). Se informado, o webhook apenas receberá notificações de eventos relacionados à carteira indicada.'
          example: null
          deprecated: true
        auth_kind:
          type: string
          nullable: true
          enum:
            - none
            - basic_auth
            - bearer
            - api_key
          readOnly: true
          description: 'Tipo de autenticação configurado. Retornado nas respostas. Para configurar, envie o objeto `auth` no body.'
        auth:
          type: object
          nullable: true
          writeOnly: true
          description: Configuração de autenticação do endpoint receptor. Apenas para criação/atualização — não retornado nas respostas.
          properties:
            kind:
              type: string
              enum:
                - none
                - basic_auth
                - bearer
                - api_key
              description: 'Tipo de autenticação: `none`, `basic_auth`, `bearer` ou `api_key`.'
            username:
              type: string
              nullable: true
              description: Usuário (somente `basic_auth`).
            password:
              type: string
              nullable: true
              description: Senha (somente `basic_auth`). Deixe em branco para manter a senha atual.
            token:
              type: string
              nullable: true
              description: Token (somente `bearer`). Deixe em branco para manter o token atual.
            header_name:
              type: string
              nullable: true
              description: 'Nome do header (somente `api_key`). Ex: `X-API-Key`.'
            header_value:
              type: string
              nullable: true
              description: Valor do header (somente `api_key`). Deixe em branco para manter o valor atual.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v1_user_object:
      type: object
      required:
        - email
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do usuário
        uid:
          type: string
          readOnly: true
          description: UID do Evento
        email:
          type: string
          format: email
          description: E-mail
          example: cliente@example.com
        first_name:
          type: string
          nullable: true
          description: Primeiro Nome
          example: null
        middle_name:
          type: string
          nullable: true
          description: Nome do Meio
          example: null
        last_name:
          type: string
          nullable: true
          description: Último Nome
          example: null
        full_name:
          type: string
          nullable: true
          description: Nome completo
          example: null
        created_via_api:
          type: boolean
          nullable: true
          description: Enviado pela API
          example: null
        permissions:
          type: array
          nullable: true
          items:
            type: string
          example: bank_billet.*
          description: Permissões
        enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação de ativação do usuário
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do evento
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de atualização do evento
    v1_message_object:
      type: object
      properties:
        message:
          type: string
          description: Mensagem de retorno.
    v1_error_controller:
      type: object
      properties:
        errors:
          type: string
          description: Mensagem de erro.
    v1_discharge_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do CNAB
        filename:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do arquivo
        status:
          type: string
          readOnly: true
          description: |-
            Situação do arquivo:
            * `unprocessed` Pendente
            * `processed` Processado
          enum:
            - unprocessed
            - processed
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
        created_via_api:
          type: boolean
          nullable: true
          description: Enviado pela API
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts).'
          example: null
        created_via_integration:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de recebimento automático do banco.
        bank_billet_discharges:
          type: array
          nullable: true
          example: null
          description: Retornos bancários.
          items:
            $ref: '#/components/schemas/v1_bank_billet_discharge_object'
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
        external_id:
