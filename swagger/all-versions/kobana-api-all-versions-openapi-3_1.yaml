  /v2/payment/bank_billet_batches:
    post:
      summary: Criar um Lote de Pagamento de Boletos
      tags:
        - Boletos
      security:
        - bearerAuth: []
      description: |-

        Esse endpoint é utilizado para a geração de um lote de pagamento.

        ## Pré-requisito

        Para emitir um pagamento é necessário ter cadastrado um Conta Financeira.

        ## Eventos de Webhook

        O evento `payment.batch.db.created` é disparado nesta operação.

        Ao cadastrar um Lote de Pagamento, o sistema cria um comando para registrá-lo na instituição financeira. Após o registro do lote ser confirmado na instituição, o evento `payment.bank_billet_batch.confirmed` é disparado.

        O evento `payment.db.created` também é disparado nesta operação caso o lote contenha um novo pagamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Lote de Pagamento criado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019d895f-f66a-7fde-88d9-62089fbac539
                  status: pending
                  registration_status: pending
                  financial_account_uid: 019d895f-f62a-767c-a9d7-e83670d9e0e2
                  created_at: '2026-04-14T10:24:20+10:00'
                  updated_at: '2026-04-14T10:24:20+10:00'
                  payments:
