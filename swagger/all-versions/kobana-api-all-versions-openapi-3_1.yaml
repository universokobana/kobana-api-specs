    v2_user:
      type: object
      description: 'Dados do usuário autenticado. Os campos de perfil (email, phone, first_name/middle_name/last_name/full_name, profile_photo_url, legal_data, birthday, gender, languages, timezone) só são retornados quando o token carrega o escopo correspondente (email, phone, profile, profile.legal, profile.birthday, profile.gender, profile.preferences) ou o escopo all.'
      properties:
        id:
          type: integer
          deprecated: true
          description: 'ID do usuário (deprecated, use uid)'
          example: 456
        uid:
          type: string
          description: UID público do usuário
          example: usr_9876543210
        email:
          type: string
          format: email
          description: E-mail do usuário
          example: usuario@example.com
        phone:
          type:
            - string
            - 'null'
          description: Telefone cadastrado (escopo phone)
          example: +55 11 99999-0000
        first_name:
          type:
            - string
            - 'null'
          description: Primeiro nome
          example: João
        middle_name:
          type:
            - string
            - 'null'
          description: Nome do meio
          example: Silva
        last_name:
          type:
            - string
            - 'null'
          description: Último nome
          example: Santos
        full_name:
          type:
            - string
            - 'null'
          description: Nome completo
          example: João Silva Santos
        created_via_api:
          type: boolean
          description: Indica se foi criado via API
          example: false
        permissions:
          type: array
          items:
            type: string
          description: Permissões do usuário
          example:
            - charge.bank_billets.*
            - crm.customers.*
        created_at:
          type: string
          format: date-time
          description: Data de criação
          example: '2024-01-01T10:00:00Z'
        updated_at:
          type: string
          format: date-time
          description: Data de atualização
          example: '2024-01-15T15:30:00Z'
        enabled_at:
          type:
            - string
            - 'null'
          format: date-time
          description: Data de habilitação
          example: '2024-01-01T10:00:00Z'
        legal_data:
          type: object
          description: Dados legais (nome civil e CPF)
          properties:
            name:
              type:
                - string
                - 'null'
              description: Nome civil
              example: João Silva Santos
            document_number:
              type:
                - string
                - 'null'
              description: CPF formatado
              example: 529.982.247-25
        profile_photo_url:
          type: string
          format: uri
          description: URL da foto de perfil (ActiveStorage) ou Gravatar como fallback
          example: 'https://app.kobana.com.br/rails/active_storage/blobs/redirect/.../foto.jpg'
        gender:
          type:
            - string
            - 'null'
          description: 'Gênero (female, male, undisclosed ou valor livre)'
