  '/v2/payment/batches/{uid}':
    get:
      summary: Visualizar um Lote de Pagamento
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: Consulta informações específicas de um Pagamento de Boleto.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: uid
          in: path
          description: UUID do Lote de Pagamento
