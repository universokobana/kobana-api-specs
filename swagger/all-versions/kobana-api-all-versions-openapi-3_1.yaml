  /v2/payment/dda_accounts:
    get:
      summary: Listar Contas de DDA
      tags:
        - Contas de DDA
      security:
        - bearerAuth: []
      description: Lista todas as contas DDA cadastradas na conta. Suporta paginação.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
      responses:
        '200':
          description: Lista vazia quando não há contas DDA
          content:
            application/json:
              example:
                status: 200
                data: []
                pagination:
                  prev_url: null
                  next_url: null
                  page: 1
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/v2_dda_account'
                  pagination:
                    $ref: '#/components/schemas/v2_pagination'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Scope obrigatório ausente.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "all payment.dda_accounts".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
    post:
      summary: Criar Conta de DDA
      tags:
        - Contas de DDA
      security:
        - bearerAuth: []
      description: |

        Cria uma nova conta DDA.

        ## Eventos de Webhook

        O evento `payment.dda.account.db.created` é disparado nesta operação.

        Após a criação, o sistema gera automaticamente a carta DDA (PDF), disparando os eventos `payment.dda.account.letter.pending`, `payment.dda.account.letter.waiting_signatures` e `payment.dda.account.letter.signed` à medida que o fluxo de assinatura progride.

        Após aprovação pelo Manager, os eventos `payment.dda.account.confirmed` ou `payment.dda.account.rejected` são disparados.

        Após `confirmed`, o sistema inicia o registro da conta no banco de forma assíncrona, disparando `payment.dda.account.register.requested` e `payment.dda.account.register.confirmed` (ou `failed`/`error`) conforme a resposta do provider.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
      responses:
        '201':
          description: Conta de DDA criada com sucesso
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f75f5-be11-7f5e-a5b3-e257ac561ab0
                  cnpj: 11.222.333/0001-81
                  name: null
                  signers:
                    - name: Joao Silva
                      document_number: 551.969.441-92
                      email: joao@example.com
                  editable: true
                  status: pending
                  letter_status: creating
                  external_letter_status: null
                  letter_signed_url: null
                  error_message: null
                  enabled_at: null
                  disabled_at: null
                  validated_at: null
                  rejected_at: null
                  rejection_reason: null
                  bank_billets_sync_last_updated_at: null
                  created_at: '2026-07-18T13:01:07-03:00'
                  updated_at: '2026-07-18T13:01:07-03:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `201`.'
                  data:
                    $ref: '#/components/schemas/v2_dda_account'
        '401':
          description: Falha de autenticacao. Token invalido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissao. Scope de escrita obrigatorio.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_new_dda_account'
        required: true
