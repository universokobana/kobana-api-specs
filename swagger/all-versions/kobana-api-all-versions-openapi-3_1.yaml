                              example: '237'
                            ispb_number:
                              type: string
                              nullable: true
                              description: ISPB do banco
                            agency_number:
                              type: string
                              description: Número da agência
                              example: '1234'
                            agency_digit:
                              type: string
                              nullable: true
                              description: Dígito da agência
                            account_number:
                              type: string
                              description: Número da conta
                              example: 56789-0
                            account_digit:
                              type: string
                              nullable: true
                              description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência TED
          required:
            - financial_account_uid
            - amount
            - kind
            - ted
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            transfer_account_uid:
              type: string
