      description: Deleta um Arquivo de Mailbox específico.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: uid
          in: path
          description: UID do Arquivo de Mailbox
          required: true
          example: 012ab34c-d567-8901-234e-5fghi6j789k0
          schema:
            type: string
      responses:
        '204':
          description: Arquivo deletado
        '401':
          description: Usuário não autorizado
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o `scope` obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '404':
          description: Arquivo não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v2_error'
