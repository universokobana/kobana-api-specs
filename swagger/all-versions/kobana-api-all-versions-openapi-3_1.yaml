    v2_error:
      type: object
      required:
        - status
        - errors
      properties:
        status:
          type: integer
          minimum: 100
          maximum: 599
          description: 'Status HTTP do erro. Ex: `400`.'
          examples:
            - 400
            - 401
            - 422
            - 500
        errors:
          type: array
          minItems: 1
          items:
            type: object
            properties:
              title:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
                examples:
                  - Token de API inválido
                  - Parâmetro obrigatório
              code:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Código do erro. Ex: `validation_error`.'
                examples:
                  - validation_error
                  - authentication_error
                  - not_found
              param:
                anyOf:
                  - type: string
                  - type: 'null'
                description: 'Nome do parâmetro que falhou a validação. Ex: `amount`.'
                examples:
                  - amount
                  - customer_email
                  - expire_at
              detail:
                anyOf:
                  - type: string
                  - type: 'null'
                  - type: object
                description: 'Detalhe da validação que gerou o erro. Ex: `não pode ficar em branco`.'
                examples:
                  - não pode ficar em branco
                  - deve ser um email válido
              errors:
                type: array
                items:
                  type: object
                  properties:
                    title:
                      anyOf:
                        - type: string
                        - type: 'null'
                    code:
                      anyOf:
                        - type: string
                        - type: 'null'
                    param:
                      anyOf:
                        - type: string
                        - type: 'null'
                    detail:
                      anyOf:
                        - type: string
                        - type: 'null'
                        - type: object
                  additionalProperties: false
                description: Erros aninhados
            additionalProperties: false
      additionalProperties: false
