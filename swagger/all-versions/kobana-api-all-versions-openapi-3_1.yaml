                agency_digit:
                  type: string
                  description: Dígito da Agência
                account_number:
                  type: string
                  description: Número da Conta
                account_digit:
                  type: string
                  description: Dígito da Conta
            beneficiary:
              type: object
              description: Dados do Recebedor
              properties:
                document_number:
                  type: string
                  nullable: false
