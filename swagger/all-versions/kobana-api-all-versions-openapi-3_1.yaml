              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
        '404':
          description: Lote não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
  /v1/bank_billet_discharges:
    get:
      summary: Listar Registros de Retorno
      tags:
        - Registro de Retorno
      security:
        - bearerAuth: []
      description: Lista registros de retorno.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: processed_from
          in: query
          description: A partir da Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: processed_to
          in: query
          description: Até a Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: bank_billet_id
          in: query
          schema:
            type: string
          description: ID do Boleto.
          example: '999'
          required: false
        - name: discharge_id
          in: query
          schema:
            type: string
          description: ID do Retorno.
          example: '999'
          required: false
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
