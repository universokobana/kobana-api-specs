            account_number:
              type: string
              description: Número da conta (sem o dígito verificador)
              example: '12345'
            account_digit:
              type: string
              description: Dígito verificador da conta
              example: '6'
            agency_number:
              type: string
              description: Número da agência
              example: '0001'
        external_id:
          type: string
          nullable: true
