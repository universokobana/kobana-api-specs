                    id: 1
                    uid: 019e6755-70f3-724b-908b-a5c4515a07c8
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-05-27T13:48:33+11:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
                    beneficiary:
                      document_number: null
