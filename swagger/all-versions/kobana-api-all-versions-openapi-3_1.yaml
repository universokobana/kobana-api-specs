    v2_dda_account:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: 'Identificador único da conta DDA (UUID). Utilize para consultar, atualizar, habilitar ou desabilitar via API.'
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
        cnpj:
          type: string
          description: CNPJ ou CPF da empresa/pessoa para a qual o DDA foi habilitado. Cada conta Kobana pode ter apenas uma conta DDA ativa.
          example: 11.222.333/0001-81
        name:
          type: string
          nullable: true
          description: 'Nome descritivo da carta DDA, gerado automaticamente com base nos dados da empresa.'
          example: Carta DDA Empresa X
        signers:
          type: array
          description: 'Lista de signatários da carta de adesão ao DDA (mínimo 1, máximo 3). Cada signatário recebe um e-mail com link para assinatura digital.'
          items:
            type: object
            properties:
              name:
                type: string
                description: Nome completo do signatário conforme documento de identidade.
              document_number:
                type: string
                description: CPF do signatário.
              email:
                type: string
                nullable: true
                description: Email do signatário para envi-o do link de assinatura digital.
              role:
                type: string
                nullable: true
                description: 'Cargo/função do signatário na empresa. Valores: `partner` (sócio), `witness` (testemunha), `legal` (jurídico), `attorney` (procurador), `financial` (financeiro), `director` (diretor), `representative` (representante).'
                enum:
                  - partner
                  - witness
                  - legal
                  - attorney
                  - financial
                  - director
                  - representative
                example: partner
        editable:
          type: boolean
          readOnly: true
          description: 'Indica se a conta permite edição de signatários. `true`: conta recém-criada ou reabilitada — é possível adicionar/remover/editar signatários. `false`: carta já foi gerada e enviada para assinatura — não é possível editar. Para editar quando `false`: desabilite a conta (PUT /disable), habilite novamente (PUT /enable), depois atualize os signatários (PUT /dda_accounts/:uid).'
          example: true
        status:
          type: string
          enum:
            - pending
            - awaiting_approval
            - approved
            - signature_rejected
          readOnly: true
          description: 'Status geral de aprovação da conta DDA. `pending` (aguardando conclusão da carta de adesão — signatários ainda não assinaram), `awaiting_approval` (carta assinada por todos — aguardando aprovação pelo Manager Kobana), `approved` (conta aprovada e ativa — boletos DDA sincronizados automaticamente — campo `enabled_at` preenchido), `signature_rejected` (carta rejeitada pelo Manager Kobana — consulte `rejection_reason` e `rejected_at`).'
          example: pending
        letter_status:
          type: string
          enum:
            - not_created
            - creating
            - created
            - failed
          readOnly: true
          description: 'Status da geração do PDF da carta de adesão. `not_created` (PDF ainda não gerado), `creating` (geração em andamento), `created` (PDF gerado com sucesso — carta enviada para assinatura), `failed` (falha na geração — consulte `error_message`).'
          example: not_created
        external_letter_status:
          type: string
          nullable: true
          enum:
            - pending
            - waiting_signatures
            - signed
            - failed
          readOnly: true
          description: 'Status da assinatura digital da carta de adesão junto ao provedor. `pending` (carta gerada, aguardando envio para assinatura), `waiting_signatures` (carta enviada — aguardando assinatura dos signatários), `signed` (todos os signatários assinaram — carta concluída), `failed` (falha no processo de assinatura junto ao provedor).'
          example: pending
        error_message:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem de erro detalhada quando ocorre falha na geração da carta de adesão. Retorna `null` quando não há erro.
          example: null
        enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: 'Data e hora (ISO 8601) em que a conta DDA foi habilitada/ativada. Quando `null`, a conta está desabilitada.'
        disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: 'Data e hora (ISO 8601) em que a conta DDA foi desabilitada. Após desabilitação, há um período de carência de 21 minutos antes de poder reabilitar (exigência do provedor).'
        validated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que a carta DDA foi validada/aprovada pelo Manager Kobana.
        rejected_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que a carta foi rejeitada pelo Manager Kobana. Preenchido quando `status` é `signature_rejected`.
        rejection_reason:
          type: string
          nullable: true
          readOnly: true
          description: Motivo informado pelo Manager Kobana ao rejeitar a carta de adesão. Preenchido quando `status` é `signature_rejected`.
        bank_billets_sync_last_updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) da última sincronização bem-sucedida de boletos DDA. Indica quando o sistema buscou e processou novos boletos do provedor para esta conta.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora (ISO 8601) em que a conta DDA foi criada na plataforma Kobana.
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora (ISO 8601) da última atualização desta conta DDA.
    v2_new_dda_account:
      type: object
      required:
        - cnpj
      properties:
        cnpj:
          type: string
          description: CNPJ ou CPF da empresa/pessoa para a qual o DDA será habilitado. Deve ser um documento válido. Cada conta Kobana pode ter apenas uma conta DDA ativa.
          example: 11.222.333/0001-81
        signers:
          type: array
          description: Lista de 1 a 3 signatários da carta de adesão ao DDA. Cada signatário receberá um e-mail com link para assinatura digital.
          items:
            type: object
            properties:
              name:
                type: string
                description: Nome completo do signatário conforme documento de identidade.
                example: João da Silva
              document_number:
                type: string
                description: 'CPF do signatário (formato: 000.000.000-00 ou somente números).'
                example: 111.222.333-44
              email:
                type: string
                description: E-mail do signatário para envio do link de assinatura digital.
                example: joao@exemplo.com
              role:
                type: string
                nullable: true
                description: 'Cargo/função do signatário na empresa. Campo opcional. Valores: `partner` (sócio), `witness` (testemunha), `legal` (jurídico), `attorney` (procurador), `financial` (financeiro), `director` (diretor), `representative` (representante).'
                enum:
                  - partner
                  - witness
                  - legal
                  - attorney
                  - financial
                  - director
                  - representative
                example: partner
            required:
              - name
              - document_number
              - email
    v2_update_dda_account:
      type: object
