        discharge_id:
          type: integer
          nullable: true
          description: ID do Retorno.
          example: null
        bank_billet_id:
          type: integer
          nullable: true
          description: ID do Boleto.
          example: null
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
        date_of_occurrence:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data da ocorrência.
        occurrence:
          type: string
          maxLength: 2
          nullable: true
          description: Código da operação no banco.
        occurrence_detail:
          type: string
          nullable: true
          description: Descrição do evento no Retorno.
        occurrence_error:
          type: string
          nullable: true
          description: Erro no retorno.
        occurrence_error_detail:
          type: string
          nullable: true
          description: Descrição do erro no retorno.
        line_raw:
          type: string
          format: json
          nullable: true
          description: Linha plana com informações vindas do banco.
          example: null
        line_parsed:
          type: string
          format: json
          nullable: true
          description: |-
            Linha parseada com informações vindas do banco:

            Conteúdo do retorno bancário. Pode mudar de acordo com o banco e o formato 240 ou 400. Se algum dos campos estiver em branco é porque o seu banco não disponibiliza essa informação.

            | Valor | Descrição |
            |---|---|
            | paid_at | Data de pagamento |
            | paid_amount | Valor pago |
            | bank_rate | Taxa do boleto paga ao banco |
            | credit_at | Data de crédito |
            | credit_amount | Valor do Crédito |
            | our_number | Nosso número |
            | processed_our_number_raw | Nosso número formatado |
            | discount | Desconto |
            | billet_fine | Acréscimos(Multa/Juros cobrados) |
            | other_fines | Outras cobranças adicionais |
            | other_credit | Outros valores pagos |
            | value_rebate | Outras taxas |
            | error_code | Código de erro |
            | event_type | Ocorrência bancária |
            | agency_number | Agência |
            | account_number | Conta |
            | banco_recebedor | Banco recebedor |
            | agencia_recebedora | Agência recebedora |
            | control_number | Número de Controle |
            | document_number | Número do Documento |
    v2_bank_billet_payment:
      type: object
      required:
        - paid_at
        - paid_amount
        - kind
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID do Recebimento (deprecated, use uid)'
          example: 123
        uid:
          type: string
          readOnly: true
          description: UID do Recebimento de Boleto
        bank_billet_id:
          type: integer
          nullable: true
          deprecated: true
          description: 'ID do Boleto (deprecated, use bank_billet_uid)'
          example: null
        bank_billet_uid:
          type: string
          nullable: true
          description: UID do Boleto.
          example: null
        pix_id:
          type: integer
          nullable: true
          readOnly: true
          deprecated: true
          description: 'ID do Pix vinculado (deprecated, use pix_uid)'
          example: null
        pix_uid:
          type: string
          nullable: true
          readOnly: true
          description: UID do Pix vinculado ao recebimento (quando pago via Pix)
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          deprecated: true
          description: 'ID da Carteira (deprecated, use bank_billet_account_uid)'
          example: null
        bank_billet_account_uid:
          type: string
          nullable: true
          description: UID da Carteira.
          example: null
        discharge_id:
          type: integer
          nullable: true
          deprecated: true
          description: 'ID do Retorno (deprecated, use discharge_uid)'
          example: null
        discharge_uid:
          type: string
          nullable: true
          description: UID do Retorno.
          example: null
        amount:
          type: number
          format: float
          description: Valor do Boleto
          example: 10.99
        paid_amount:
          type: number
          format: float
          description: Valor Pago
          example: 10.99
        paid_at:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data do Recebimento.
        paid_bank:
          type: string
          maxLength: 3
          nullable: true
          description: Banco de Recebimento.
        paid_agency:
          type: string
          maxLength: 5
          nullable: true
          description: Agência de Recebimento (com dígito quando disponível).
        paid_agency_number:
          type: string
          maxLength: 4
          nullable: true
          description: Número da Agência de Recebimento (sem dígito).
        paid_agency_digit:
          type: string
          maxLength: 1
          nullable: true
          description: Dígito da Agência de Recebimento.
