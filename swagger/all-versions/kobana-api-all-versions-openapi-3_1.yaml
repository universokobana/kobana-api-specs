            description: Data e hora de criação do registro
          updated_at:
            type: string
            format: date-time
            nullable: true
            readOnly: true
            description: Data e hora da última atualização do registro
      data:
        type: object
        required: []
        properties:
          resource:
            type: object
            description: Recurso associado à caixa postal
            required:
              - type
              - uid
            example:
              type: financial.account
              uid: 01948afe-3014-7e81-9a88-badcfc1fd4d6
            properties:
              type:
                type: string
                example: financial.account
                description: |
                  Tipo do Recurso

                  `charge.bank_billet_account`: Carteira de Cobrança
                  `financial.account`: Conta Financeira
              uid:
                type: string
                description: UID do recurso
                example: 01948afe-3014-7e81-9a88-badcfc1fd4d6
          name:
            type: string
            nullable: true
            description: Nome de identificação da caixa postal
          operation:
            type: string
            enum:
              - charge
              - statement
              - payment
            description: |
              Tipo de operação que será trafegada na caixa postal

              `charge`: Cobrança
              `statement`: Extrato
              `payment`: Pagamento
          kind:
            type: string
            enum:
              - cnab400
              - cnab240
              - cnab200
            description: |
              Formato do arquivo CNAB que será trafegado na caixa postal

              `cnab400`: CNAB 400
              `cnab240`: CNAB 240
              `cnab200`: CNAB 200
          account_owner:
            type: object
            description: Proprietário da conta
            example:
              name: Margret Santos Contas
              document_number: 16.974.923/0001-84
              phone_number: '2130030386'
              email: conta@example.com
            properties:
              name:
                type: string
                required: true
                description: Nome
                example: Margret Santos Contas
              document_number:
                type: string
                required: true
                description: Número do documento
                example: 16.974.923/0001-84
              phone_number:
                type: string
                required: true
                writeOnly: true
                description: Número de telefone (com DDD)
                example: '2130030386'
              email:
                type: string
                required: true
                writeOnly: true
                description: E-mail
                example: nome@example.com
          bank_manager:
            type: object
            description: Gerente do banco
            example:
              name: Margret Santos Bancos
              email: banco@example.com
              phone_number: '11988888888'
            properties:
              name:
                type: string
                required: true
                description: Nome
                example: Margret Santos Bancos
              phone_number:
                type: string
                required: true
                writeOnly: true
                description: Número de telefone (com DDD)
                example: '2130030386'
              email:
                type: string
                required: true
                writeOnly: true
                description: E-mail
                example: nome@example.com
          letter_owner:
            type: object
            description: Responsável pela carta
            nullable: true
            example:
              name: Margret Santos Cartas
              phone_number: '2130030386'
              email: carta@example.com
            properties:
              name:
                type: string
                required: true
                description: Nome
                example: Margret Santos Cartas
              phone_number:
                type: string
                required: true
                writeOnly: true
                description: Número de telefone (com DDD)
                example: '2130030386'
              email:
                type: string
                required: true
                writeOnly: true
                description: E-mail
                example: nome@example.com
          business_logo:
            type: string
            format: base64
            description: Logo da Empresa. A imagem deve ser menor que 500KB ter 150x150 pixels e estar no formato base64 JPG ou PNG.
            example: 'data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAABAAAAAQCAYAAAFwF...'
          letter_pdf:
            type: string
            nullable: true
            readOnly: true
            description: URL para download do PDF da carta
          letter_creation_errors:
            type: array
            items:
              type: string
            nullable: true
            readOnly: true
            description: 'Erros de validação na geração da carta EDI (ex: campos obrigatórios ausentes)'
          letter_status:
            type: string
            readOnly: true
            description: |-
              Status do PDF da carta na Kobana:
              * `not_created` Não criada
              * `creating` Criando
              * `created` Criada
          status:
            type: string
            nullable: true
            readOnly: true
            description: |-
              Status da caixa postal:
              * `generated` Carta gerada
              * `demand_received` Demanda recepcionada
              * `confirming_at_bank` Aguardando confirmação do banco
              * `testing_by_customer` Aguardando teste do cliente
              * `waiting_for_validations` Aguardando validações
              * `activated` Caixa postal ativada
          uid:
            type: string
            format: uuid
            readOnly: true
            description: UID da caixa postal
            example: 012ab34c-d567-8901-234e-5fghi6j789k0
          enabled_at:
            type: string
            nullable: true
            format: date-time
            readOnly: true
            description: Data e hora de habilitação da caixa postal
          validated_at:
            type: string
            nullable: true
            format: date-time
            readOnly: true
            description: Data e hora de validação da caixa postal
          created_at:
            type: string
            format: date-time
            nullable: true
            readOnly: true
            description: Data e hora de criação do registro
          updated_at:
            type: string
            format: date-time
            nullable: true
            readOnly: true
            description: Data e hora da última atualização do registro
