                    id: 1
                    uid: 019f0446-0380-71f5-9e99-ac39e9bdd915
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-06-26T07:12:05-07:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
                    beneficiary:
                      document_number: null
