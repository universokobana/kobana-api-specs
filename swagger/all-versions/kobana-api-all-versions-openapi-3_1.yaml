            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          description: |
            Status do Pix.

            `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            `paid`: Cobrança Pix paga.
            `overdue`: Cobrança Pix em atraso.
            `canceled`: Cobrança Pix cancelada.
            `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        revoke_days:
          type: integer
          nullable: true
          description: Número de dias ativo após o vencimento
          example: 1
        message:
          type: string
          nullable: true
          description: Mensagem de solicitação ao pagador
        additional_info:
          type: object
          nullable: true
          description: Informações adicionais para o pagador
          example:
            Chave: Valor
        fine_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Multa:
                                * `0` Sem multa (isento)
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        fine_amount:
          type: string
          nullable: true
          example: '50.00'
          description: Valor da Multa
        fine_percentage:
          type: string
          nullable: true
          example: '5'
          description: Percentual da Multa
        reduction_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Abatimento:
                                * `0` Não se aplica
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        reduction_amount:
          type: string
          nullable: true
          example: '25.00'
          description: Valor do Abatimento
        reduction_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual do Abatimento
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Juros:
                              * `0` Não se Aplica (isento)
                              * `1` Por valor Diário
                              * `2` Por porcentagem Diária
                              * `3` Por porcentagem Mensal
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        interest_amount:
          type: string
          nullable: true
          example: '20.00'
          description: Valor da Multa
        interest_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual da Multa
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
