    v2_financial_account:
      type: object
      required:
        - account_number
        - account_digit
        - agency_number
        - financial_provider_slug
        - person_info
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID da Conta Financeira
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        kind:
          type: string
          description: |
            Tipo da Conta

            `checking`: Conta Corrente
            `savings`: Conta Poupança
            `payment`: Conta Pagamento
        account_number:
          type: string
          description: Número da Conta
        account_digit:
          type: string
          description: Dígito da Conta
        agency_number:
          type: string
          description: Número da Agência
        agency_digit:
          type: string
          nullable: true
          description: 'Dígito da Agência. Opcional: será calculado automaticamente usando Módulo 11 quando o banco exigir e não for fornecido.'
        financial_provider_slug:
          type: string
          description: Provedor Financeiro
        bank_number:
          type: integer
          description: Número COMPE do Banco. Obrigatório se bank_id não for informado.
        created_at:
          type: string
          readOnly: true
          format: date-time
          description: Data da criação. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        custom_data:
          type: object
          nullable: true
          description: Hash com chave e valor no formato JSON. Opcional para controle interno.
        custom_name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome da Conta Financeira para identificação dentro da Kobana.
        external_id:
          type: string
          nullable: true
          example: 123456-abc-789
          description: ID no seu sistema. Opcional para controle interno.
        payment_agreement_code:
          type: string
          nullable: true
          description: Número do Convênio de Pagamento contratado junto ao Banco.
        person_info:
          type: object
          nullable: true
          description: Dados do Titular
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        tags:
          type: array
          nullable: true
          description: Tags associadas a importação. Opcional para controle interno.
          items:
            type: string
            example: tag 1
        updated_at:
          type: string
          readOnly: true
          format: date-time
          description: Data da última atualização. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
