          description: Indicativo se boleto em pdf
        bcc:
          type: string
          nullable: true
          description: Lista do destinatários das cópias ocultas
        cc:
          type: string
          nullable: true
          description: Lista do destinatários
        from_address:
          type: string
          nullable: true
          description: Endereço do remetente
        reply_to_address:
          type: string
          nullable: true
          description: Endereço de resposta
    v2_webhook:
      type: object
      required:
        - url
        - events
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook
        uid:
          type: string
          readOnly: true
          description: UID do webhook
        name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome de identificação do webhook
        url:
          type: string
          maxLength: 255
          description: Endereço onde as requisições serão realizadas
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
        events:
          type: array
          description: Eventos que devem gerar notificações para o webhook. Escolha um ou mais eventos.
