          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: ID da Carteira de Cobrança.
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
