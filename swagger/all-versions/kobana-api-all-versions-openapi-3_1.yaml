          description: Apelido ou Nome Fantasia do Pagador
          example: null
        customer_notes:
          type: string
          nullable: true
          description: Observações do Pagador
          example: null
        customer_contact_person:
          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
            * `7` Para porcentagem mensal - Bancos suportados: Bradesco, BB, BTG, Caixa, Inter, Itaú, Safra, Santander, Sicoob e Sicredi
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Porcentagem de juros. De 0.0 a 100.0 (Ex 1.5% = 1.5) Obrigatório se interest_type é igual a 1 ou 7. Até 2 casas decimais.
          example: null
        interest_value:
          type: number
          format: float
          nullable: true
          description: Valor diário de juros (R$). Obrigatório se interest_type é igual a 2. Até 2 casas decimais.
          example: null
        interest_days_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Dias para juros:
            * `0` Corridos
            * `1` Úteis
          enum:
            - 0
            - 1
          default: 0
        fine_type:
          type: integer
          nullable: true
