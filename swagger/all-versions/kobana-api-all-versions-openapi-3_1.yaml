          example: null
        configuration:
          type: string
          format: json
          readOnly: true
          nullable: true
          description: Configuração de dados padrões para boleto
          example: null
        api_access_token:
          type: string
          readOnly: true
          nullable: true
          description: Token de acesso da subconta
