            properties:
              title:
                type: string
                description: 'Descrição breve do erro. Ex: `Token de API inválido`.'
              code:
                type: string
                description: 'Código do erro. Ex: `unprocessable_content`.'
              detail:
                type: string
                description: 'Descrição do erro em detalhe. Ex: `"O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso"`.'
