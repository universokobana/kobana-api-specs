                              * `1` Por valor Diário
                              * `2` Por porcentagem Diária
                              * `3` Por porcentagem Mensal
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        interest_amount:
          type: string
          nullable: true
          example: '20.00'
          description: Valor da Multa
        interest_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual da Multa
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
