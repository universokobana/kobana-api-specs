        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Lote de Pagamento criado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f0447-b99f-7afb-a54b-dcf342831f69
                  status: pending
                  registration_status: pending
                  financial_account_uid: 019f0447-b972-7d21-80de-d44b23b3b6b4
