          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID do Carnê
          example: 999
          schema:
            type: string
      responses:
        '204':
          description: Carnê cancelado
        '404':
          description: Carnê não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
  /v1/email_deliveries:
    get:
      summary: Listar E-mails Enviados
      tags:
        - Histórico de E-mails
      security:
        - bearerAuth: []
      description: |-
        Listar e-mails enviados

        O `ID do Objeto` vai retornar todos e qualquer tipo de objeto que tenha o ID enviado, ou seja, se você enviar 1, poderá retornar boletos, clientes e etc. Caso queira um filtro mais refinado, combine o `ID do Objeto` com o `Código do evento`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
        - name: resource_owner_id
