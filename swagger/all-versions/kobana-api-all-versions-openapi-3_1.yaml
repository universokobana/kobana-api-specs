          type: integer
          readOnly: true
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto associado ao evento
          example: null
        occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de quando o evento ocorreu.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do evento
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de atualização do evento
