        status:
          type: integer
          nullable: true
          description: |-
            Situação:
            * `0` Pendente
            * `1` Entregue
            * `2` Falhou
          enum:
            - '0'
            - '1'
            - '2'
        created_from:
          type: string
          format: date
          nullable: true
          description: A partir da Data de criação (DD/MM/YYYY) ou (YYYY-MM-DD)
          example: '2020-01-01'
        created_to:
          type: string
          format: date
          nullable: true
          description: Até a Data de criação (DD/MM/YYYY) ou (YYYY-MM-DD)
          example: '2020-01-01'
    v1_webhook_object:
      type: object
      required:
        - url
        - events
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook
        name:
          type: string
          maxLength: 255
          nullable: true
          description: Nome de identificação do webhook
        url:
          type: string
          maxLength: 255
          description: Endereço onde as requisições serão realizadas
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
        events:
          type: array
          description: Eventos que devem gerar notificações para o webhook. Escolha um ou mais eventos.
          items:
            type: string
            enum:
              - ping
              - access_token.db.created
              - access_token.db.updated
              - access_token.db.deleted
              - access_token.reminder
              - access_token.expired
              - account.updated
