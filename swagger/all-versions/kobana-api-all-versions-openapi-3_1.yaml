                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    $ref: '#/components/schemas/v2_payment_command'
                  message:
                    type: string
                    description: Mensagem de sucesso
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Pagamento já foi confirmado ou rejeitado
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: unprocessable_content
                    title: Não foi possível gerar Comando de Cancelamento de Pagamento.
                    detail: Pagamento já foi confirmado ou rejeitado.
              schema:
                $ref: '#/components/schemas/v2_error'
  /v2/payment/batches:
    get:
      summary: Listar Lotes de Pagamentos
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: 'Retorna uma lista paginada de todos os lotes de pagamentos da conta. Os lotes são retornados em ordem decrescente de data de criação, com os mais recentes primeiro. Este endpoint permite filtrar e paginar os resultados para facilitar a navegação através de grandes volumes de lotes.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
