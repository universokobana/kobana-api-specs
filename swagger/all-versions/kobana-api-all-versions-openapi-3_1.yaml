          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v1_user_object:
      type: object
      required:
        - email
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do usuário
        uid:
          type: string
          readOnly: true
          description: UID do Evento
        email:
          type: string
          format: email
          description: E-mail
          example: cliente@example.com
        first_name:
          type: string
          nullable: true
          description: Primeiro Nome
          example: null
        middle_name:
          type: string
          nullable: true
          description: Nome do Meio
          example: null
        last_name:
          type: string
          nullable: true
          description: Último Nome
          example: null
        full_name:
          type: string
          nullable: true
          description: Nome completo
          example: null
        created_via_api:
          type: boolean
          nullable: true
          description: Enviado pela API
          example: null
        permissions:
          type: array
          nullable: true
          items:
            type: string
          example: bank_billet.*
          description: Permissões
        enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação de ativação do usuário
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do evento
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de atualização do evento
