    v1_bank_billet_object:
      type: object
      required:
        - expire_at
        - amount
        - customer_person_name
        - customer_cnpj_cpf
        - customer_zipcode
        - customer_address
        - customer_neighborhood
        - customer_city_name
        - customer_state
      properties:
        id:
