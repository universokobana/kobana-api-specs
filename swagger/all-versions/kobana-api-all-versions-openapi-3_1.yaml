        message:
          type: string
          description: Mensagem de sms
          example: null
        phone_to:
          type: string
          maxLength: 14
          description: Telefone (com DDI e DDD) do pagador
          example: null
        sent_error:
          type: string
          nullable: true
          maxLength: 255
          description: Erro ocorrido no envio
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        failed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega falhou
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto
          example: null
        status:
          type: string
          readOnly: true
          description: |-
            Situação:
            * `pending` Pendente
            * `submitted` Submetido para o Gateway
            * `failed` Falha ao Enviar para o Gateway
            * `rejected` Rejeitado pelo Gateway
            * `auditing` Sendo Auditado para Liberação
            * `sent` Enviado pelo Gateway
            * `delivered` Recebido pelo Destinatário
            * `n_delivered` Não Recebido pelo Destinatário
            * `read` Lido pelo Destinatário
            * `clicked` Link Acessado pelo Destinatário
          enum:
            - pending
            - submitted
            - failed
            - rejected
            - sent
            - delivered
            - n_delivered
            - read
            - auditing
            - clicked
        bank_billet_account_id:
          type: integer
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        sms_notification_id:
          type: integer
          description: ID da notificação
          example: null
        email_notification_id:
          type: integer
          nullable: true
          description: ID da Notificação
          example: null
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v1_webhook_delivery_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do webhook enviado
        uid:
          type: string
          maxLength: 255
          description: UID usado no cabeçalho da requisição
        url:
          type: string
          maxLength: 255
          nullable: true
          description: 'Endereço onde a entrega foi realizada, herdado do webhook'
        request_payload:
          type: object
          nullable: true
          description: 'Payload que será enviado no corpo da mensagem. Ver possíveis valores em [Payloads](/reference/payloads)'
        request_error:
          type: string
          maxLength: 255
          nullable: true
          description: Mensagem de erro retornada na requisição
        response_headers:
          type: string
          nullable: true
          description: Cabeçalhos da resposta
        response_body:
          type: string
          nullable: true
          deprecated: true
          description: Conteúdo do corpo da resposta
        response_code:
          type: integer
          nullable: true
          description: 'Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
        response_message:
          type: string
          maxLength: 255
          nullable: true
          description: 'Mensagem relativa ao Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
        content_type:
          type: string
          maxLength: 255
          nullable: true
          description: Content-type da requisição que será realizada. Valores válidos `application/json` (valor padrão) ou `application/x-www-form-urlencoded`.
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        first_try:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da primeira tentativa
        failed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a falha ocorreu.
        duration:
          type: integer
          nullable: true
          description: Duração em milesegundos do round trip entre requisição e resposta
        event_code:
          type: string
          maxLength: 255
          example: bank_billet.created
          description: |-
            Código do evento.
            * `ping` Ping
            * `access_token.db.created` Token de Acesso criado.
            * `access_token.db.updated` Token de Acesso atualizado.
            * `access_token.db.deleted` Token de Acesso excluído.
            * `access_token.reminder` Lembrete de expiração do Token de Acesso.
            * `access_token.expired` Token de Acesso expirou.
            * `account.updated` Conta atualizada.
            * `account.blocked` Conta bloqueada.
            * `account.bank_billet_creation_blocked` Emissão de boletos bloqueada.
            * `bank_billet.created` Boleto criado.
            * `bank_billet.updated` Boleto atualizado.
            * `bank_billet.generated` PDF do Boleto Gerado ou Atualizado.
            * `bank_billet.canceled` Boleto cancelado.
            * `bank_billet.blocked` Boleto foi bloqueado.
            * `bank_billet.overdue` Boleto ficou vencido.
            * `bank_billet.paid` Boleto foi pago.
            * `bank_billet.due_date` Notifica boleto com 15, 7, 3 e 1 dias antes do vencimento.
