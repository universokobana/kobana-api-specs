                    id: 1
                    uid: 019f75f4-087c-7734-93ea-0385235d7c01
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-07-18T12:59:15-03:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
                    beneficiary:
                      document_number: null
