openapi: 3.1.0
info:
  title: KOBANA API all-versions
  version: all-versions
  description: Documentação da API da Kobana
  termsOfService: 'https://l.kobana.com.br/termos-uso'
  contact:
    name: Suporte de API
    url: 'https://ajuda.kobana.com.br'
    email: suporte@kobana.com.br
servers:
  - url: 'https://{apiHost}/'
    variables:
      apiHost:
        enum:
          - api-sandbox.kobana.com.br
          - api.kobana.com.br
        default: api-sandbox.kobana.com.br
paths:
  /v1/bank_billet_accounts:
    post:
      summary: Criar Carteira de Cobrança
      tags:
        - Carteiras de Cobrança
      security:
        - bearerAuth: []
      description: Cria uma nova carteira de cobrança para emissão de boletos bancários. A carteira precisa ser homologada antes de poder ser utilizada em produção.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Carteira de cobrança criada com financial_account_uid
          content:
            application/json:
              example:
                id: 2
                uid: 019ec80e-8d6c-76ac-bdd0-928c40b0132c
                bank_contract_slug: bb-bs-18-19-7
                financial_account:
                  uid: 019ec80e-8cf5-7396-b37a-1ee24b967434
                next_our_number: 1
                agency_number: '7043'
                agency_digit: '2'
                account_number: '35241908'
                account_digit: '3'
                extra1: 0229385
                extra1_digit: null
                extra2: null
                extra2_digit: null
                extra3: 0229385
                payment_place: Pagável em qualquer banco até a data de vencimento.
                contract: '18'
                contract_type: '1'
                beneficiary_name: Kobana Tecnologia Ltda.
                beneficiary_cnpj_cpf: 05.813.794/0001-26
                beneficiary_address: 'Av. Presidente Vargas, 633, sala 1716, Centro, Rio de Janeiro, RJ, 20071004'
                name: 'Banco do Brasil 18-19  CC: 35241908-3 229385'
                status: pending
                bank_contract:
                  bank:
