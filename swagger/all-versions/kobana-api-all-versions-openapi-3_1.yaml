    put:
      summary: Cancelar um Pagamento Pix
      tags:
        - Pix - Pagamento
      security:
        - bearerAuth: []
      description: |-

        [block:callout]
        {
          "type": "info",
          "body": "Este endpoint é processado assincronamente e cria um comando de cancelamento para o Pagamento.",
          "title": "Processamento Assíncrono"
        }
        [/block]
        O cancelamento de um Pagamento é feito assincronamente, ou seja, ao receber a requisição, a nossa API guarda a solicitação e cria um Comando. Esse comando é processado em segundo plano e depois de confirmado, o Pagamento tem seu status alterado para Cancelado. Você recebe na resposta desta requisição o ID do comando criado e pode consultá-lo a qualquer momento.

        ## Eventos de Webhook

        Quando a requisição é realizada, um evento `payment.pix.cancel.requested` é disparado.
        O nosso servidor então começa as tentativas de envio do cancelamento para a instituição financeira.
        Somente depois de confirmado na instituição financeira, aí então o pagamento é marcado como cancelado em nosso banco de dados.
        Neste momento o evento `payment.pix.cancel.confirmed` é disparado.

        [block:callout]
        {
          "type": "warning",
          "body": "O status de Cancelado é terminal. O pagamento não poderá mais ser processado após o cancelamento.",
          "title": "Atenção ao status Cancelado"
        }
        [/block]
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          description: UUID do Pagamento
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '200':
          description: Pagamento cancelado sem interação com provedor
          content:
            application/json:
              example:
                status: 200
                data:
                  id: 103
                  status: pending
                  operation: cancel
                  params: null
                  payload: null
                  created_at: '2026-04-14T10:24:32+10:00'
                  updated_at: '2026-04-14T10:24:32+10:00'
                  message: null
                  error_message: null
                  warning_message: null
                  payment:
                    uid: 019d8960-2312-7b2f-92ab-ced2f961a923
                    kind: pix
                    amount: 100
                    scheduled_to: null
                    status: pending
                    registration_status: confirmed
                    financial_account_uid: 019d8960-22f4-7a90-bd14-d60f13fdbafb
                    confirmed_at: null
                    rejected_error: null
                    rejected_at: null
                    transaction_code: null
                    transaction_date: null
                    source: view
                    identifier: null
                    external_id: null
                    financial_provider_external_id: null
                    beneficiary:
                      name: Margret Santos LTDA
                      document_number: 34.414.342/0000-99
                    custom_data: null
                    tags: []
                    tag_list: null
                    formats:
                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-04-14T10:24:32+10:00'
                    updated_at: '2026-04-14T10:24:32+10:00'
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    $ref: '#/components/schemas/v2_payment_command'
                  message:
                    type: string
                    description: Mensagem de sucesso
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
