              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
