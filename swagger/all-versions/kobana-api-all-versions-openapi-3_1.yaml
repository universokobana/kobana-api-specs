        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_pix_update:
      type: object
      properties:
        amount:
          type: number
          format: float
          description: Quantia
          example: 120.99
        pix_account_uid:
          type: string
          format: uuid
          nullable: true
          description: |
            UID da Conta Pix para alterar a chave Pix do recebedor.

            Este campo é útil quando você deseja alterar a chave Pix no provedor financeiro.

            **Importante**: Somente são aceitas contas Pix que estejam ativas (status `active`).
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          description: |
            Status do Pix.

            `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            `paid`: Cobrança Pix paga.
            `overdue`: Cobrança Pix em atraso.
            `canceled`: Cobrança Pix cancelada.
            `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        revoke_days:
          type: integer
          nullable: true
          description: Número de dias ativo após o vencimento
          example: 1
        message:
          type: string
          nullable: true
          description: Mensagem de solicitação ao pagador
        additional_info:
          type: object
          nullable: true
          description: Informações adicionais para o pagador
          example:
            Chave: Valor
        fine_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Multa:
                                * `0` Sem multa (isento)
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        fine_amount:
          type: string
          nullable: true
          example: '50.00'
          description: Valor da Multa
        fine_percentage:
          type: string
          nullable: true
          example: '5'
          description: Percentual da Multa
        reduction_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Abatimento:
                                * `0` Não se aplica
                                * `1` Por valor
                                * `2` Por porcentagem
          enum:
            - 0
            - 1
            - 2
          default: 0
        reduction_amount:
          type: string
          nullable: true
          example: '25.00'
          description: Valor do Abatimento
        reduction_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual do Abatimento
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo do Juros:
                              * `0` Não se Aplica (isento)
                              * `1` Por valor Diário
                              * `2` Por porcentagem Diária
                              * `3` Por porcentagem Mensal
          enum:
            - 0
            - 1
            - 2
            - 3
          default: 0
        interest_amount:
          type: string
          nullable: true
          example: '20.00'
          description: Valor da Multa
        interest_percentage:
          type: string
          nullable: true
          example: '2.5'
          description: Percentual da Multa
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o Pix foi criado por API
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
