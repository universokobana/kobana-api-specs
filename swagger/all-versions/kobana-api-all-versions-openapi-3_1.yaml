    v2_bank_billet_query:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: ID único do registro no formato UUID
        status:
          type: string
          readOnly: true
          description: |-
            Situação da consulta:
            * `pending` Pendente (somente quando configurado para não processar automaticamente)
            * `success` Realizada com sucesso
            * `error` Falha na consulta
          enum:
            - pending
            - success
            - error
        error_message:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem de erro quando a consulta é processada mas os dados não são retornados.
        line_or_barcode:
          type: string
          required: true
          writeOnly: true
          description: |-
            Linha Digitável ou Código de Barras, nos formatos:
            Linha Digitável: 34191.79001 01043.510047 91020.150008 7 75870000001000
            Código de Barras: 34197758700000010001790010104351004791020150
        line:
          type: string
          readOnly: true
          description: Linha Digitável
          example: 34191.79001 01043.510047 91020.150008 7 75870000001000
        barcode:
          type: string
          readOnly: true
          description: Código de Barras
          example: '34197758700000010001790010104351004791020150'
        expire_at:
          type: string
          nullable: true
          format: date
          readOnly: true
          description: Data de Vencimento
          example: '2023-10-10'
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor a pagar
          example: 30
        minimum_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor mínimo
          example: 20
        maximum_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor máximo
          example: 50
        original_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor original
          example: 25
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário
          properties:
            document_number:
              type: string
              nullable: true
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: true
              description: Nome Completo ou Razão Social
              example: João da Silva
        guarantor:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário Final
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        guarantor_drawer:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Sacador Avalista
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        payer:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        fine:
          type: object
          nullable: true
          readOnly: true
          description: Multa
          example: '{"amount": 100, "percentage": 2.0}'
        interest:
          type: object
          nullable: true
          readOnly: true
          description: Juros
          example: '{"amount": 50, "percentage": 1.0}'
        discount:
          type: object
          nullable: true
          readOnly: true
          description: Desconto
          example: '{"amount": 200, "percentage": 5.0}'
        external_id:
          type: string
          nullable: true
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          example: null
          items:
            type: string
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o registro foi criado por API
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_pix_qrcode_query:
      type: object
      properties:
        uid:
          type: string
          readOnly: true
          description: ID único do registro no formato UUID
        qrcode:
          type: string
          required: true
          writeOnly: true
          description: QR Code Pix para decodificação
          example: 00020126330014br.gov.bcb.pix0111123456789005204000053039865802BR5913EXAMPLE NAME6008BRASILIA62190515ABCDEF123456789630461D0
        pix_key:
          type: string
          readOnly: true
          nullable: true
          description: Chave Pix do beneficiário
          example: user@example.com
        expires_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de expiração do QR Code
          example: '2024-12-31T23:59:59Z'
        finality:
          type: string
          nullable: true
          readOnly: true
          description: 'Finalidade do pagamento (pagamento, saque, troco)'
          example: payment
        amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor principal
          example: 100
        amount_change:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor do troco
          example: 5
        interest:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor dos juros
          example: 2
        fine:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor da multa
          example: 3
        discount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor do desconto
          example: 1
        total_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor total a pagar
          example: 104
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Beneficiário/Recebedor
          properties:
            document_type:
              type: string
              nullable: false
              description: Tipo do documento (cpf ou cnpj)
              example: cnpj
              enum:
                - cpf
                - cnpj
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: '12345678000190'
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: Empresa Exemplo LTDA
        debtor:
          type: object
          readOnly: true
          nullable: true
          description: Dados do Devedor
          properties:
            document_type:
              type: string
              nullable: true
              description: Tipo do documento (cpf ou cnpj)
              example: cpf
              enum:
                - cpf
                - cnpj
            document_number:
              type: string
              nullable: true
              description: Número do Documento (CPF ou CNPJ)
              example: '12345678901'
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
        description:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem ao pagador
          example: Pagamento de serviços
        can_be_paid:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o QR Code pode ser pago
          example: true
        can_be_paid_with_different_value:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se pode ser pago com valor diferente
          example: false
        cannot_be_paid_reason:
          type: string
          nullable: true
          readOnly: true
          description: Motivo pelo qual não pode ser pago
          example: QR Code expirado
        external_id:
