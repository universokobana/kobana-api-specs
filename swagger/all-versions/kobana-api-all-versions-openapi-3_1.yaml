    v2_certificate:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID
          deprecated: true
        uid:
          type: string
          readOnly: true
          format: uuid
          description: UID do Certificado
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        account_id:
          type: integer
          readOnly: true
          description: ID da Conta
        label:
          type: string
          nullable: true
          maxLength: 255
          description: Nome dado ao certificado
          example: Meu Certificado
        subaccounts:
          type: boolean
          nullable: true
          description: Indica se o certificado está liberado para uso nas subcontas
        common_name:
          type: string
          nullable: true
          maxLength: 255
          description: Nome comum
          example: null
        issuer:
          type: string
          nullable: true
          maxLength: 255
          description: Emissor
          example: null
        cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ
          example: 16.974.923/0001-84
        created_via_api:
          type: boolean
          nullable: true
          readOnly: true
          description: Indica se o registro foi criado por API
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
        expiration_date:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data de expiração do certificado
        status:
          type: string
          readOnly: true
          description: |-
            Status do certificado:
            * `draft` Rascunho
            * `validated` Válido
            * `expired` Expirado
          enum:
            - draft
            - validated
            - expired
        created_by:
          type: string
          readOnly: true
          description: |-
            Criado por:
            * `user` Cliente
            * `system` Sistema
          enum:
            - user
            - system
    v2_certificate_create:
      type: object
      required:
        - label
        - cnpj_cpf
        - type
        - files
      properties:
        label:
          type: string
          nullable: true
          maxLength: 255
          description: Nome dado ao certificado
          example: Meu Certificado
        cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ
          example: 16.974.923/0001-84
        subaccounts:
          type: boolean
          nullable: true
          description: Indica se o certificado está liberado para uso nas subcontas
        type:
          type: string
          description: |-
            Tipo do certificado:
            Se o tipo do certificado for `CRT` é obrigatório enviar o `crt_file` e o `crt_private_key_file`, se o tipo for `PFX` é obrigatório `pfx_file` e `pfx_password`.

            * `crt` CRT
            * `pfx` PFX
          enum:
            - crt
            - pfx
        files:
          type: object
          description: |-
            Arquivo do certificado e senha.
            Se o tipo do certificado for `CRT` é obrigatório enviar o `crt_file` e o `crt_private_key_file`, se o tipo for `PFX` é obrigatório `pfx_file` e `pfx_password`.
          properties:
            crt_file:
              type: string
              format: binary
              description: Arquivo .cer/.crt
            crt_private_key_file:
              type: string
              format: binary
              description: Arquivo .key para certificado `crt`
            pfx_file:
              type: string
              format: binary
              description: Arquivo .p12/.pfx
            pfx_password:
              type: string
              format: password
              description: Senha do certificado para certificado `pfx`
    v2_transaction:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do transação
        uid:
          type: string
          readOnly: true
          description: UID da transação
        financial_provider_external_id:
          type: string
          readOnly: true
          description: ID da transação no provedor financeiro
        amount:
          type: number
