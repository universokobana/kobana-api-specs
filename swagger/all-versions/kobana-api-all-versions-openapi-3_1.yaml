            type: string
      responses:
        '201':
          description: Transferência Interna criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f0447-ee1f-7de4-bf64-d2bb242fedd1
                  status: pending
                  scheduled_to: null
