  '/v2/admin/users/{uid}':
    put:
      summary: Alterar Dados De Um Usuário
      tags:
        - Usuário
      security:
        - bearerAuth: []
      description: 'Atualiza as informações de um usuário existente, incluindo nome, email e permissões.'
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          required: true
          description: UID do Usuário (UUID). Também aceita o ID inteiro para compatibilidade.
          example: 019ae1b7-a1b2-7c3d-8e4f-9a0b1c2d3e4f
          schema:
            type: string
