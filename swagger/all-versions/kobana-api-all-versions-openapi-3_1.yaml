          type: integer
          nullable: true
          description: ID do Modelo de Boleto
          example: null
        amount:
          type: number
          format: float
          description: Quantia
          example: 10.99
        expire_at:
          type: string
          format: date
          description: Data de vencimento
          example: '2023-12-12'
