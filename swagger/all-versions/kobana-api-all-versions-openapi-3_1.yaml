        outbox_phones:
          type: array
          readOnly: true
          description: Lista de telefones de saída (WhatsApp)
          items:
            type: object
            properties:
              country_code:
                type: string
                description: Código do país
                example: '55'
              local_code:
                type: string
                description: Código de área (DDD)
                example: '21'
              number:
                type: string
                description: Número do telefone
                example: '999999999'
              complete:
                type: string
                readOnly: true
                description: Número completo formatado
                example: '+5521999999999'
        activation_token:
          type: string
          nullable: true
          readOnly: true
          description: Token de ativação (retornado apenas quando o canal está sendo ativado)
    v2_mailbox_syncthing_channel:
      type: object
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID único do canal
          example: 012ab34c-d567-8901-234e-5fghi6j789k0
        mailbox_entry:
          type: object
          nullable: true
          readOnly: true
          description: Entrada de mailbox associada ao canal
        status:
          type: string
          readOnly: true
          description: Status do canal
        external_id:
          type: string
          nullable: true
          description: Identificador externo para integração
        custom_data:
          type: object
          nullable: true
          description: Dados customizados em formato JSON
        tags:
          type: array
          items:
            type: string
          description: Tags para categorização
        created_via_api:
          type: boolean
          readOnly: true
          description: Se o registro foi criado via API
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização
        name:
          type: string
          nullable: true
          description: Nome do dispositivo Syncthing
        device_id:
          type: string
          nullable: true
          description: Identificador do dispositivo Syncthing
        inbox_folder_id:
          type: string
          nullable: true
          description: ID da pasta de entrada no Syncthing
        outbox_folder_id:
          type: string
          nullable: true
          description: ID da pasta de saída no Syncthing
        server_status:
          type: string
          readOnly: true
          enum:
            - connected
            - disconnected
            - updating
            - error
          description: |-
            Status do servidor Syncthing:
            `connected`: Conectado
            `disconnected`: Desconectado
            `updating`: Atualizando
            `error`: Erro
        error_message:
          type: string
          nullable: true
          readOnly: true
          description: Mensagem de erro quando o status é error
    v2_account:
      type: object
      properties:
        id:
          type: integer
          deprecated: true
          description: 'ID da conta (deprecated, use uid)'
          example: 123
        uid:
          type: string
          description: UID público da conta
          example: acc_1234567890
        email:
          type:
            - string
            - 'null'
          format: email
          description: E-mail da conta
          example: conta@example.com
        account_type:
          type:
            - string
            - 'null'
          description: Tipo da conta
          example: business
        gender:
          type:
            - string
            - 'null'
          description: Gênero
          example: male
        cpf:
          type:
            - string
            - 'null'
          description: CPF
          example: 123.456.789-00
        business_name:
          type:
            - string
            - 'null'
          description: Nome fantasia
          example: Empresa LTDA
        business_legal_name:
          type:
            - string
            - 'null'
          description: Razão social
          example: Empresa LTDA ME
        business_cnpj:
          type:
            - string
            - 'null'
          description: CNPJ
          example: 12.345.678/0001-90
        full_name:
          type:
            - string
            - 'null'
          description: Nome completo
          example: João Silva Santos
        nickname:
          type:
            - string
            - 'null'
          description: Apelido da conta
          example: Conta Principal
        parent_id:
          type:
            - integer
            - 'null'
          deprecated: true
          description: 'ID da conta principal (deprecated, use parent_uid)'
          example: 123
        parent_uid:
          type:
            - string
            - 'null'
          format: uuid
          description: UID da conta principal
          example: acc_1234567890
        feature_flags:
          type: array
          description: Feature flags habilitadas para a conta
          items:
            type: string
          example:
            - feature_1
            - feature_2
  securitySchemes:
    v1_bearerAuth:
      type: http
      scheme: bearer
    v2_bearerAuth:
      type: http
      scheme: bearer
  parameters:
    v1_page:
      name: page
      in: query
      description: number of page to start
      required: false
      schema:
        type: integer
        format: int32
    v1_per_page:
      name: per_page
      in: query
      description: max records to return
      required: false
      schema:
        type: integer
        format: int32
  responses: {}
