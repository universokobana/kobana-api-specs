          type: string
          nullable: true
          readOnly: true
          description: Descrição da transação.
        document_number:
          type: string
          nullable: true
          readOnly: true
          description: Número do documento da transação.
        kind:
          type: string
          readOnly: true
          description: |
            Tipo da transação

            `credit`: Crédito
            `debit`: Débito
