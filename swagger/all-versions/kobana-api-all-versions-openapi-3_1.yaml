                    `cpf`: CPF.
                    `cnpj`: CNPJ.
                    `random`: Aleatória.
                    `email`: E-mail.
                    `phone`: Celular
                key:
                  type: string
                  nullable: true
                  description: Chave Pix (Presente se o campo `pix_type` for `key`)
            bank_account:
