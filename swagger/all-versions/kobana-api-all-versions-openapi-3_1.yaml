                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
      requestBody:
        content:
          application/json:
            schema:
              type: object
              required:
                - bank_billet_id
              properties:
                bank_billet_id:
                  type: integer
                  nullable: true
                  description: 'ID dos [Boleto](/reference/post_v1-bank-billets-1) separados por vírgula.'
                  example: null
        required: true
        description: ID dos Boleto
