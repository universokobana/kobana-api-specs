              description: |-
                ID da conta pix que será usada na configuração do boleto híbrido.
                                      Se o responsável pelo gerenciamento do pix for o banco, a conta pix deve informada deve ser obrigatóriamente uma conta pix mesmo banco
              example: null
            pix_account:
              type: object
              nullable: true
              description: Conta Pix que será usada na configuração do boleto híbrido.
              properties:
                id:
                  type: integer
                  readOnly: true
                  description: ID da Conta Pix
                uid:
