        custom_data:
          type: object
          nullable: true
          description: Dados personalizados da cobrança Pix
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Lista de etiquetas da cobrança Pix
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao registro
        created_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T09:00:00Z'
        updated_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T12:00:00Z'
