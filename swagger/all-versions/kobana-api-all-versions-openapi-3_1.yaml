            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Porcentagem diária de juros. De 0.0 a 100.0 (Ex 1.5% = 1.5) Obrigatório se interest_type é igual a 1.
          example: null
        interest_value:
          type: number
          format: float
          nullable: true
          description: Valor diário de juros (R$). Obrigatório se interest_type é igual a 2.
          example: null
        interest_days_type:
          type: integer
          nullable: true
          description: |-
            Tipo de Dias para juros:
            * `0` Corridos
            * `1` Úteis
          enum:
            - 0
            - 1
          default: 0
        fine_type:
          type: integer
          nullable: true
          description: |-
            Tipo de multa:
            * `0` Inexistente (Padrão)
            * `1` Para percentual do valor do boleto
            * `2` Para valor fixo
          enum:
            - 0
            - 1
            - 2
          default: 0
