                Conta pix que será usada na configuração do boleto híbrido.
                                      Se o responsável pelo gerenciamento do pix for o banco, a conta pix deve informada deve ser obrigatóriamente uma conta pix mesmo banco
                                      Escolha um dos formatos para associar uma conta pix a esta carteira:
              oneOf:
                - type: object
