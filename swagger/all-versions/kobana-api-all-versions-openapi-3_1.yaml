    v2_person:
      type: object
      required:
        - name
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Registro
        name:
          type: string
          nullable: true
          description: Nome Completo ou Razão Social
          example: Kobana Tecnologia Ltda.
        nickname:
          type: string
          nullable: true
          description: Apelido ou Nome Fantasia
          example: Kobana
