          maxLength: 120
          description: Nome do cliente
          example: João Silva
        customer_nickname:
          type: string
          nullable: true
          maxLength: 255
          description: Apelido ou Nome Fantasia do Pagador
          example: null
        customer_cnpj_cpf:
