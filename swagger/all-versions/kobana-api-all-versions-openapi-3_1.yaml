                beneficiary_address_city: Rio de Janeiro
                beneficiary_address_neighborhood: Centro
                beneficiary_address_state: RJ
                beneficiary_address_zipcode: '20071004'
                bolepix_enabled_at: null
                bolepix:
                  pix_mode: 2
                  pix_account_id: null
                  pix_account:
                    id: 1
                    uid: 019e4dab-1dc9-77f0-b1b7-ff1caf92c87b
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-05-22T14:12:00+11:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
                    beneficiary:
                      document_number: null
                      name: Kobana Tecnologia Ltda.
                      address:
                        zip_code: '20071004'
                        street: Av. Presidente Vargas
                        number: '633'
                        complement: sala 1716
                        neighborhood: Centro
                        city_name: Rio de Janeiro
                        state: RJ
                    configuration: null
                    created_at: '2026-05-22T14:12:00+11:00'
                    updated_at: '2026-05-22T14:12:00+11:00'
                  pix_billing_options: null
                bolepix_key: null
                allow_expiration_on_weekends: false
                allow_duplicate_charge_payments: false
                created_at: '2026-05-22T14:12:01+11:00'
                updated_at: '2026-05-22T14:12:01+11:00'
              schema:
                $ref: '#/components/schemas/v1_bank_billet_account_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
        '422':
          description: Carteira inválida - Beneficiário CPF
          content:
            application/json:
              example:
                errors:
                  bank_contract_slug:
                    - não pode ficar em branco
                  beneficiary_name:
                    - não pode ficar em branco
                  beneficiary_cnpj_cpf:
                    - não é um CNPJ válido
                  kind:
                    - não pode ficar em branco
                  beneficiary_address_street:
                    - não pode ficar em branco
                  beneficiary_address_city:
                    - não pode ficar em branco
                  beneficiary_address_neighborhood:
                    - não pode ficar em branco
                  beneficiary_address_state:
                    - não pode ficar em branco
                  beneficiary_address_zipcode:
                    - não pode ficar em branco
              schema:
                $ref: '#/components/schemas/v1_errors_object'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v1_new_bank_billet_account_object'
        required: true
        description: Informações a serem salvas na carteira de cobrança
