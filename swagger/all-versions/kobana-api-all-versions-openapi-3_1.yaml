              description: Data de Agendamento
              example: '2023-12-12'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            external_id:
              type: string
              nullable: true
              example: 123456-abc-789
              description: ID no seu sistema. Opcional para controle interno.
            custom_data:
              type: object
              nullable: true
              example: '{"codigo": "123", "vip": true}'
              description: Hash com chave e valor no formato JSON.
            tags:
              type: array
              nullable: true
              description: Tags associadas
              items:
                type: string
                example: tag1
            tax:
              type: object
              required:
                - kind
                - format
              description: Dados do Tributo - formato especificado pelo campo "format"
              oneOf:
                - type: object
                  required:
                    - kind
                    - format
                    - code
                  description: Tributo via código de barras
                  properties:
                    kind:
                      type: string
                      enum:
                        - itbi
                        - icms
                        - iss
                        - iptu
                        - fgts
                        - dare
                        - darf
                        - gru
                        - gps
                      description: Tipo do Tributo
                    format:
                      type: string
                      enum:
                        - code
                      description: Formato do payload - código de barras
                    code:
                      type: string
                      description: Código de Barras ou Linha Digitável do Tributo
                - type: object
                  required:
                    - kind
                    - format
                    - data
                  description: Tributo DARF via campos estruturados
                  properties:
