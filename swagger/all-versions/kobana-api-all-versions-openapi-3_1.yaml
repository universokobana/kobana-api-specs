          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora (ISO 8601) em que o boleto foi rejeitado pelo cliente. Preenchido apenas quando `status` é `rejected`.
        payment_uid:
          type: string
          format: uuid
          nullable: true
          readOnly: true
