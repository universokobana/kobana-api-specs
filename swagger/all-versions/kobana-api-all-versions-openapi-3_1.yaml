                        key_type:
                          type: string
                          enum:
                            - random
                            - phone
                            - email
                            - cnpj
                            - cpf
                          description: Tipo da Chave Pix
                        key:
                          type: string
                          description: Chave Pix
                    - type: object
                      required:
                        - type
                        - bank_account
