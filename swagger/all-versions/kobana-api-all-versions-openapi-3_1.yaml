              description: Objetivo da Transferência (código)
              example: '98'
            financial_account_uid:
              type: string
              format: uuid
              description: UID da Conta Financeira de Origem
              example: 018df180-7208-727b-a10a-ea545e4a75a8
            transfer_account_uid:
              type: string
              format: uuid
