          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v1_remittance_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do CNAB
        content:
          type: string
          nullable: true
          description: Conteúdo da remessa
        filename:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do arquivo
