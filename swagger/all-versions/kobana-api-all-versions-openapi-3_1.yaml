  /v2/payment/darf_batches:
    post:
      summary: Criar um Lote de Pagamento de DARF
      tags:
        - DARF (beta)
      security:
        - bearerAuth: []
      description: |
        Esse endpoint é utilizado para a geração de um lote de pagamento de DARF.

        [block:callout]
        {
          "type": "warning",
          "title": "⚠️**Novidade em Desenvolvimento!**",
          "body": "Esta API está em versão beta - isso significa que estamos constantemente melhorando e ajustando suas funcionalidades. Embora seja totalmente funcional, algumas coisas podem mudar conforme recebemos feedback dos desenvolvedores.

        Para dúvidas sobre esta funcionalidade, entre em contato conosco."
        }
        [/block]

        ## Pré-requisito

        Para emitir um pagamento é necessário ter cadastrado uma Conta Financeira.

        ## Eventos de Webhook

        O evento `payment.batch.db.created` é disparado nesta operação.

        Ao cadastrar um Lote de Pagamento, o sistema cria um comando para registrá-lo na instituição financeira. Após o registro do lote ser confirmado na instituição, o evento `payment.darf_batch.confirmed` é disparado.

        O evento `payment.db.created` também é disparado nesta operação caso o lote contenha um novo pagamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Lote de Pagamento criado
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019cff12-9d3c-77ed-b961-363081586c04
                  status: pending
