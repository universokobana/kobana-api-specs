                `internal`: Entre Contas
            pix:
              type: object
              nullable: true
              description: Dados do Pix (Presente se o campo `transfer_kind` for `pix`)
              properties:
                txid:
                  type: string
                  nullable: true
                  description: TXID
                pix_type:
                  type: string
                  description: |
                    Tipo do Pix

                    `key`: Chave.
                    `bank_account`: Dados bancários
                key_type:
                  type: string
                  nullable: true
