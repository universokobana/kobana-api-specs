            Quantia
        scheduled_to:
          type: string
          readOnly: true
          nullable: true
          format: date
          example: '2023-12-12'
          description: Data de Agendamento
        status:
          readOnly: true
          type: string
          description: |
            Status do Pagamento.

            `pending`: Pendente.
            `rejected`: Rejeitado.
            `approved`: Aprovado.
            `reproved`: Reprovado.
            `failed`: Falha.
            `confirmed`: Confirmado.
            `canceled`: Cancelado.
            `awaiting_approval`: Aguardando Aprovação.
            `scheduled`: Agendado.
            `awaiting_scheduled_date`: Aguardando Data Agendada.
            `overdue`: Vencido.
            `awaiting_funds`: Aguardando Saldo.
            `finishing`: Finalizando
        registration_status:
          readOnly: true
          type: string
          description: |
            Status de Registro.

            `pending`: Pendente.
            `requested`: Requisitado.
            `confirmed`: Confirmado.
            `rejected`: Rejeitado.
            `failed`: Falha
        confirmed_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Confirmação
        rejected_at:
          type: string
          nullable: true
          format: date-time
          example: '2023-12-12'
          description: Data da Rejeição
        rejected_error:
          type: string
          readOnly: true
          nullable: true
          description: Motivo da rejeição retornado pelo banco
        transaction_code:
          readOnly: true
          nullable: true
          type: string
          description: Código de Autenticação
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        transaction_date:
          readOnly: true
          nullable: true
          type: string
          format: date-time
          description: Data de Autenticação
          example: '2023-12-12'
        financial_account_uid:
          type: string
          readOnly: true
          format: uuid
          description: UID da Conta Financeira de Origem
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        external_id:
          type: string
          nullable: true
          example: 123456-abc-789
          description: ID no seu sistema. Opcional para controle interno.
        custom_data:
          type: object
          nullable: true
          example: '{"codigo": "123", "vip": true}'
          description: Hash com chave e valor no formato JSON.
        tags:
          type: array
          nullable: true
          description: Tags associadas
          items:
            type: string
            example: tag1
        source:
          readOnly: true
          nullable: true
          type: string
          description: |
            Origem do Pagamento.

            `api`: API.
            `dda`: DDA.
            `view`: Manual
        beneficiary:
          readOnly: true
          nullable: true
          type: object
          description: Dados do Beneficiário (quando disponível)
          properties:
            name:
              type: string
              nullable: true
              description: Nome ou Razão Social do Beneficiário
              example: João da Silva
            document_number:
              type: string
              nullable: true
              description: CPF ou CNPJ do Beneficiário
              example: 111.321.322-09
        bank_billet:
          type: object
