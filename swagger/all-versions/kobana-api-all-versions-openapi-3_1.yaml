          nullable: true
          readOnly: true
          description: ID na instituição financeira
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro no banco de dados
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro no banco de dados
      required:
