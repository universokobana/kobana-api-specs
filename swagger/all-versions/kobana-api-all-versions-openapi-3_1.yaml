        data:
          type: object
          description: 'Mais informações relativas ao evento. Ver possíveis valores em [Payloads](/reference/payloads)'
        bank_billet_account_id:
          type: integer
          readOnly: true
          nullable: true
          description: ID da Carteira de Cobrança
          example: null
        resource_owner_id:
          type: integer
          nullable: true
          description: ID do Objeto associado ao evento
          example: null
        occurred_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de quando o evento ocorreu.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do evento
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de atualização do evento
    v1_email_delivery_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do e-mail enviado
        uid:
          type: string
          maxLength: 36
          description: UID usado no cabeçalho da requisição
        delivered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega foi realizada
        failed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora que a entrega falhou
