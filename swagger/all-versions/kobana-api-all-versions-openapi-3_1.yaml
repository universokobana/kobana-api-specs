                          description: Tipo do Pix - por conta bancária
                        bank_account:
                          type: object
                          required:
                            - compe_number
                            - agency_number
                            - account_number
                          description: Dados bancários
                          properties:
                            compe_number:
                              type: string
                              description: Código do banco (COMPE)
                              example: '237'
                            ispb_number:
                              type: string
                              nullable: true
                              description: ISPB do banco
                            agency_number:
                              type: string
                              description: Número da agência
                              example: '1234'
                            agency_digit:
                              type: string
                              nullable: true
                              description: Dígito da agência
                            account_number:
                              type: string
                              description: Número da conta
                              example: 56789-0
                            account_digit:
                              type: string
                              nullable: true
                              description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência TED
          required:
            - financial_account_uid
            - amount
            - kind
            - ted
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
