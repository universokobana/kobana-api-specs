                - recipient_provider
                - payer
                - payer_provider
              example: recipient
            occurred_at:
              type: string
              format: date_time
              example: '2024-07-03T13:00:00Z'
            code:
              type: string
              enum:
                - accl
                - cpcl
                - dcsd
                - ersl
                - frud
                - pcfd
                - slcr
                - sldb
              example: frud
            description:
              type: string
              example: Fraude identificada pelo recebedor
        rejection:
          type: object
          nullable: true
          readOnly: true
          properties:
            occurred_at:
              type: string
              format: date_time
              example: '2024-07-03T13:00:00Z'
            code:
              type: string
              enum:
                - ap13
                - ap14
              example: ap13
            description:
              type: string
              example: Erro de autenticação
        use_line_of_credit:
          type: boolean
          readOnly: true
          example: false
        created_at:
          type: string
          format: date_time
          readOnly: true
          example: '2024-01-01T12:00:00Z'
        updated_at:
          type: string
          format: date_time
          readOnly: true
          example: '2024-02-01T12:00:00Z'
