openapi: 3.1.0
info:
  title: KOBANA API all-versions
  version: all-versions
  description: Documentação da API da Kobana
  termsOfService: 'https://l.kobana.com.br/termos-uso'
  contact:
    name: Suporte de API
    url: 'https://ajuda.kobana.com.br'
    email: suporte@kobana.com.br
servers:
  - url: 'https://{apiHost}/'
    variables:
      apiHost:
        enum:
          - api-sandbox.kobana.com.br
          - api.kobana.com.br
        default: api-sandbox.kobana.com.br
paths:
  /v1/bank_billet_accounts:
    post:
      summary: Criar Carteira de Cobrança
      tags:
        - Carteiras de Cobrança
      security:
        - bearerAuth: []
      description: Cria uma nova carteira de cobrança para emissão de boletos bancários. A carteira precisa ser homologada antes de poder ser utilizada em produção.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Carteira de cobrança criada com financial_account_uid
          content:
            application/json:
              example:
                id: 2
                uid: 019f75f4-0ad0-7c04-a802-433deb8454d1
                bank_contract_slug: bb-bs-18-19-7
                financial_account:
