    v2_new_automatic_pix_recurrence:
      type: object
      description: Nova Recorrência do Pix Automático.
      required:
        - charge_automatic_pix_account_uid
        - start_at
        - document
        - debtor
        - retry_policy
        - cycle
        - recurrence_term
        - amount_term
      properties:
        charge_automatic_pix_account_uid:
          type: string
          description: UID da conta Pix Automático. A conta financeira e a connection são herdadas desta conta.
          example: df329c26-7b88-4b1d-ae22-4c2df9e04dc2
        pix_uid:
          type: string
          nullable: true
          description: 'UID do Pix (opcional). Quando informado junto com location_uid: o qrcode gerado será da jornada instant (Jornada 3) para Pix instantâneo ou offer (Jornada 4) para Pix com vencimento.'
        location_uid:
          type: string
          nullable: true
          description: 'UID da localização. Quando informado, o QR Code será gerado conforme a jornada (recurrent / instant / offer).'
        document:
          type: string
          maxLength: 35
          description: 'Número, identificador, ou código que representa o objeto da autorização (contrato, pedido etc.).'
        description:
          type: string
          maxLength: 35
          nullable: true
          description: Descrição da recorrência.
        start_at:
          type: string
          format: date_time
          description: Data de início da recorrência.
        finish_at:
          type: string
          format: date_time
          nullable: true
          description: Data de fim da recorrência.
        recurrence_term:
          type: string
          enum:
            - indefinite
            - fixed
          description: Prazo da recorrência.
        cycle:
          type: string
          enum:
            - weekly
            - monthly
            - quarterly
            - semiannual
            - annual
          description: Ciclo da recorrência.
        amount_term:
          type: string
          enum:
            - fixed
            - variable
          description: Tipo do valor da recorrência.
        amount:
          type: number
          format: float
          nullable: true
          description: Valor (quando amount_term é fixed).
        minimum_amount:
          type: number
          format: float
          nullable: true
          description: Valor mínimo (quando amount_term é variable).
        agreement_code:
          type: string
          maxLength: 60
          nullable: true
          description: Número do Convênio de Pagamento.
        retry_policy:
          type: string
          enum:
            - disallow
            - allow_3r7d
          description: Política de retentativa.
        external_id:
          type: string
          nullable: true
          description: ID externo da recorrência.
        custom_data:
          type: object
          nullable: true
          description: Dados personalizados.
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags.
        debtor:
          type: object
          description: Informações da pessoa devedora
          required:
            - document_type
            - document_number
            - kind
            - name
          properties:
            document_type:
              type: string
              enum:
                - CPF
                - CNPJ
              description: Tipo do documento.
            document_number:
              type: string
              description: Número do documento.
            kind:
              type: string
              enum:
                - natural
                - juridical
              description: Tipo de pessoa.
            name:
              type: string
              maxLength: 140
              description: Nome do devedor.
    v2_update_automatic_pix_recurrence:
      type: object
      description: Atualização de Recorrência do Pix Automático.
      properties:
        external_id:
          type: string
          nullable: true
          description: ID externo da recorrência.
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags.
        custom_data:
          type: object
          nullable: true
          description: Dados personalizados.
    v2_command_update_automatic_pix_recurrence:
      type: object
      description: 'Atualização da Recorrência do Pix Automático. São editáveis a data de início, o nome do devedor, o Pix e a Location associados.'
      properties:
        pix_uid:
          type: string
          nullable: true
          description: UID do Pix a ser associado à recorrência.
        location_uid:
          type: string
          nullable: true
          description: UID da Location a ser associada à recorrência.
        start_at:
          type: string
          format: date_time
          description: Data estimada de primeiro pagamento.
        debtor:
          type: object
          description: Informações da pessoa devedora (apenas nome é editável).
          properties:
            name:
              type: string
              maxLength: 140
              description: Nome do devedor.
    v2_new_automatic_pix_pix:
