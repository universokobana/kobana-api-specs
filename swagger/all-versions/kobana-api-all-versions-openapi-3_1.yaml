  '/v1/bank_billet_batches/{id}/pdf':
    post:
      summary: Exportar Lote no Formato .pdf
      tags:
        - Lotes
      security:
        - bearerAuth: []
      description: |-
        Exportar lote no formato .pdf.

        Após a requisição a exportação entra numa fila para gerar o arquivo do lote. A URL do arquivo do lote será retornada pelo endpoint de [Exportação do Lote](/reference/get_v1-bank-billet-batch-exports-id).
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID do Lote
          example: 999
          schema:
            type: string
      responses:
        '201':
          description: Solicitação de exportação do lote criada com sucesso
          content:
            application/json:
              example:
                id: 4
                account_id: 191
                account_public_id: null
                bank_billet_batch_id: 13
                created_at: '2026-04-03T21:55:56+03:00'
                file_format: pdf
                output_url: null
                processed_at: null
                public_id: 019d54b3-b519-761e-bcff-1022a5df5657
                status: enqueued
                updated_at: '2026-04-03T21:55:56+03:00'
              schema:
                $ref: '#/components/schemas/v1_bank_billet_batch_export_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
        '404':
          description: Lote não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
  /v1/bank_billet_discharges:
    get:
      summary: Listar Registros de Retorno
      tags:
        - Registro de Retorno
      security:
        - bearerAuth: []
      description: Lista registros de retorno.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: processed_from
          in: query
          description: A partir da Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: processed_to
          in: query
          description: Até a Data de processamento.
          example: '2020-01-01'
          required: false
          schema:
            type: string
            format: date
        - name: bank_billet_id
          in: query
          schema:
            type: string
          description: ID do Boleto.
          example: '999'
          required: false
        - name: discharge_id
          in: query
          schema:
            type: string
          description: ID do Retorno.
          example: '999'
          required: false
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
