          type: integer
          readOnly: true
          description: |
            Categoria do Lançamento.
        category_description:
          type: string
          readOnly: true
          description: |
            Descrição da Categoria do Lançamento.
        hashed_content:
          type: string
          readOnly: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
            occurrence_date

        hashed_id:
          type: string
          readOnly: true
          deprecated: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
