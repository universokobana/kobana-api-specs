    v2_automatic_pix_recurrence_object:
      type: object
      properties:
        uid:
          type: string
          description: UID público da recorrência
          example: 9e45d2e2-90b7-4908-a013-1e5ea23e5a00
          readOnly: true
        charge_automatic_pix_account_uid:
          type: string
          description: UID da conta Pix Automático
          example: df329c26-7b88-4b1d-ae22-4c2df9e04dc2
        financial_account_uid:
          type: string
          description: UID da conta financeira (derivado da conta Pix Automático)
          readOnly: true
          example: b71f1a3e-2b97-43c7-ae4e-21cba47b332b
        pix_uid:
          type: string
          description: 'UID do Pix (opcional). Quando informado junto com location_uid, o QR Code gerado será da jornada instant (Jornada 3) para Pix instantâneo ou offer (Jornada 4) para Pix com vencimento'
          example: 12345678-1234-1234-1234-123456789abc
          nullable: true
        location_uid:
          type: string
          nullable: true
          description: |-
            UID da localização. Quando informado, o QR Code será gerado conforme a jornada:
                              - **recurrent (Jornada 2)**: apenas `location_uid`, sem `pix_uid`;
                              - **instant (Jornada 3)**: `location_uid` + `pix_uid` para Pix instantâneo (Pix deve estar aberto e registrado);
                              - **offer (Jornada 4)**: `location_uid` + `pix_uid` para Pix com vencimento (Pix deve estar aberto e registrado).
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        external_id:
          type: string
          nullable: true
          example: recurrence_123
        custom_data:
          type: object
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao registro
        financial_provider_external_id:
          type: string
          readOnly: true
          nullable: true
        document:
          type: string
          maxLength: 35
          example: '12345678901'
          description: 'Número, identificador, ou código que representa o objeto da autorização (contrato, pedido etc.) e o vínculo usuário recebedor e usuário devedor.'
        description:
          type: string
          maxLength: 35
          example: Cobrança mensal
        debtor:
          type: object
          description: Informações da pessoa devedora
          properties:
            document_type:
              type: string
              enum:
                - CPF
                - CNPJ
              description: Tipo do documento da pessoa
              example: CPF
            document_number:
              type: string
              description: Número do documento da pessoa
              example: '12345678901'
            kind:
              type: string
              enum:
                - natural
                - juridical
              description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
              example: natural
            name:
              type: string
              maxLength: 140
              description: Nome completo ou razão social
              example: Maria da Silva
        start_at:
          type: string
          format: date_time
          example: '2024-01-01T00:00:00Z'
        finish_at:
          type: string
          format: date_time
          nullable: true
          example: '2025-01-01T00:00:00Z'
        recurrence_term:
          type: string
          enum:
            - indefinite
            - fixed
          example: fixed
        cycle:
          type: string
          enum:
            - weekly
            - monthly
            - quarterly
            - semiannual
            - annual
          example: monthly
        amount_term:
          type: string
          enum:
            - variable
            - fixed
          example: fixed
        amount:
          type: number
          format: float
          nullable: true
          example: 10000
        minimum_amount:
          type: number
          format: float
          nullable: true
          example: 5000
        agreement_code:
          type: string
          maxLength: 60
          example: '123123'
          description: Número do Convênio de Pagamento.
        retry_policy:
          type: string
          enum:
            - disallow
            - allow_3r7d
          example: allow_3r7d
        journey:
          type: string
          readOnly: true
          enum:
            - request
            - recurrent
            - instant
            - offer
            - awaiting
          example: recurrent
          description: |-
            Tipo de jornada da recorrência:
            * `request` (Jornada 1) Usuário pagador aceitou através de notificação externa
            * `recurrent` (Jornada 2) Usuário aceitou através de QR Code de recorrência
            * `instant` (Jornada 3) Usuário iniciou através de QR Code composto e pagamento imediato (requer pix_uid e location)
            * `offer` (Jornada 4) Usuário aderiu através de QR Code composto com vencimento (requer pix_uid e location)
            * `awaiting` Aguardando definição da jornada
        qrcode:
          type: object
          nullable: true
          readOnly: true
          properties:
            emv:
              type: string
              example: 000201...
            png:
              type: string
              example: 'data:image/png;base64,...'
            journey:
              type: string
              nullable: true
              enum:
                - request
                - recurrent
                - instant
                - offer
                - awaiting
              description: Tipo de jornada associada ao QR Code
              example: recurrent
        requests:
          type: array
          nullable: true
          readOnly: true
          items:
            type: object
            properties:
              expire_at:
                type: string
                format: date_time
                example: '2024-07-30T23:59:59Z'
              recipient:
                type: object
                description: Informações do beneficiário
                properties:
                  kind:
                    type: string
                    enum:
                      - checking
                      - savings
                      - payment
                    description: Tipo de conta
                    example: checking
                  account_number:
                    type: string
                    description: Número da conta
                    example: '12345'
                  agency_number:
                    type: string
                    description: Número da agência
                    example: '0001'
                  bank:
                    type: object
                    properties:
                      number:
                        type: string
                        description: Número do banco
                        example: '001'
                      ispb_number:
                        type: string
                        description: Código ISPB do banco
                        example: '00000000'
                      name:
                        type: string
                        description: Nome do banco
                        example: Banco do Brasil S.A.
                  person_info:
                    type: object
                    properties:
                      document_type:
                        type: string
                        enum:
                          - CPF
                          - CNPJ
                        description: Tipo do documento da pessoa
                        example: CPF
                      document_number:
                        type: string
                        description: Número do documento do titular
                        example: '12345678901'
                      kind:
                        type: string
                        enum:
                          - natural
                          - juridical
                        description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
                        example: natural
                      name:
                        type: string
                        description: Nome do titular
                        example: João Silva
        financial_provider_status:
          type: string
          nullable: true
          readOnly: true
          enum:
            - pending
            - created
            - approved
            - rejected
            - expired
            - canceled
          example: approved
        financial_provider_status_updates:
          type: array
          nullable: true
          readOnly: true
          items:
            type: object
            properties:
              status:
                type: string
                enum:
                  - pending
                  - created
                  - approved
                  - rejected
                  - expired
                  - canceled
                example: approved
              updated_at:
                type: string
                format: date_time
                example: '2024-02-01T10:00:00Z'
        cancellation:
          type: object
          nullable: true
          readOnly: true
          properties:
            origin:
              type: string
              enum:
                - recipient
                - recipient_provider
                - payer
                - payer_provider
              example: recipient
            occurred_at:
              type: string
              format: date_time
              example: '2024-07-03T13:00:00Z'
            code:
              type: string
              enum:
                - accl
                - cpcl
                - dcsd
                - ersl
                - frud
                - pcfd
                - slcr
                - sldb
              example: frud
            description:
              type: string
              example: Fraude identificada pelo recebedor
        rejection:
          type: object
          nullable: true
          readOnly: true
          properties:
            occurred_at:
              type: string
              format: date_time
              example: '2024-07-03T13:00:00Z'
            code:
              type: string
              enum:
                - ap13
                - ap14
              example: ap13
            description:
              type: string
              example: Erro de autenticação
        use_line_of_credit:
          type: boolean
          readOnly: true
          example: false
        created_at:
          type: string
          format: date_time
          readOnly: true
          example: '2024-01-01T12:00:00Z'
        updated_at:
          type: string
          format: date_time
          readOnly: true
          example: '2024-02-01T12:00:00Z'
    v2_automatic_pix_recurrence_command_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        recurrence:
          $ref: '#/components/schemas/v2_automatic_pix_recurrence_object'
    v2_automatic_pix_request_object:
      type: object
      required:
        - expire_at
        - addressee_financial_account
      properties:
        uid:
          type: string
          description: UID público da solicitação Pix automática
          example: 2f9dbf64-58d2-403e-9827-d99982aa116e
          readOnly: true
        automatic_pix_recurrence_uid:
          type: string
          description: UID da recorrência associada
          example: 9e45d2e2-90b7-4908-a013-1e5ea23e5a00
        charge_automatic_pix_account_uid:
          type: string
          description: UID da conta Pix Automático (derivado da recorrência)
          example: 73a7b219-0f8a-4097-9a6d-6e74b9e877fb
          readOnly: true
        expire_at:
          type: string
          format: date_time
          description: Data de expiração da solicitação
          example: '2025-01-01T23:59:59Z'
        financial_provider_external_id:
          type: string
          nullable: true
          readOnly: true
          description: Identificador externo no provedor financeiro
          example: req-874623
        financial_provider_status:
          type: string
          nullable: true
          readOnly: true
          enum:
            - pending
            - created
            - sent
            - received
            - rejected
            - accepted
            - expired
            - canceled
          description: Status da solicitação no provedor financeiro
          example: accepted
        financial_provider_status_updates:
          type: array
          nullable: true
          readOnly: true
          description: Histórico de atualizações de status da solicitação no provedor financeiro
          items:
            type: object
            properties:
              status:
                type: string
                nullable: true
                enum:
                  - created
                  - sent
                  - received
