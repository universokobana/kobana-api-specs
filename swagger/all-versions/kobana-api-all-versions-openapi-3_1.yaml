          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data e hora da última atualização do registro
    v2_new_payment_account:
      type: object
