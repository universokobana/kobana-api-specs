                - CPF
                - CNPJ
              description: Tipo do documento da pessoa
              example: CPF
            document_number:
              type: string
              description: Número do documento da pessoa
              example: '12345678901'
            kind:
              type: string
              enum:
                - natural
                - juridical
              description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
              example: natural
            name:
              type: string
              maxLength: 140
              description: Nome completo ou razão social
              example: Maria da Silva
        start_at:
          type: string
          format: date_time
          example: '2024-01-01T00:00:00Z'
        finish_at:
          type: string
          format: date_time
          nullable: true
          example: '2025-01-01T00:00:00Z'
        recurrence_term:
          type: string
          enum:
            - indefinite
            - fixed
          example: fixed
        cycle:
          type: string
          enum:
            - weekly
            - monthly
            - quarterly
            - semiannual
            - annual
          example: monthly
        amount_term:
          type: string
          enum:
            - variable
            - fixed
          example: fixed
        amount:
          type: number
          format: float
          nullable: true
          example: 10000
        minimum_amount:
          type: number
          format: float
          nullable: true
          example: 5000
        agreement_code:
          type: string
          maxLength: 60
          example: '123123'
          description: Número do Convênio de Pagamento.
        retry_policy:
          type: string
          enum:
            - disallow
            - allow_3r7d
          example: allow_3r7d
        journey:
          type: string
          readOnly: true
          enum:
            - request
            - recurrent
            - instant
            - offer
            - awaiting
          example: recurrent
          description: |-
            Tipo de jornada da recorrência:
            * `request` (Jornada 1) Usuário pagador aceitou através de notificação externa
            * `recurrent` (Jornada 2) Usuário aceitou através de QR Code de recorrência
            * `instant` (Jornada 3) Usuário iniciou através de QR Code composto e pagamento imediato (requer pix_uid e location)
            * `offer` (Jornada 4) Usuário aderiu através de QR Code composto com vencimento (requer pix_uid e location)
            * `awaiting` Aguardando definição da jornada
        qrcode:
          type: object
          nullable: true
          readOnly: true
          properties:
            emv:
              type: string
              example: 000201...
