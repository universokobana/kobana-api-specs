          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        financial_transfer:
          $ref: '#/components/schemas/v2_transfer'
