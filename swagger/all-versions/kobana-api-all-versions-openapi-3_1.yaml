            * `bank_billet.add_pix.failed` Falha na adição do Pix ao Boleto.
            * `bank_billet.add_pix.error` Ocorreu um erro na adição do Pix ao Boleto.
            * `bank_billet.protest.requested` Protesto do Boleto solicitado.
            * `bank_billet.protest.confirmed` Protesto do Boleto confirmado.
            * `bank_billet.protest.failed` Falha no protesto do Boleto.
            * `bank_billet.protest.error` Ocorreu um erro no protesto do Boleto.
            * `bank_billet_discharge.created` Registro de retorno criado.
