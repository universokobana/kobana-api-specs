  '/v1/bank_billet_discharges/{id}':
    get:
      summary: Informações do Registro de Retorno
      tags:
        - Registro de Retorno
      security:
        - bearerAuth: []
      description: Consulta informações específicas de um Registro de Retorno.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID do Registro de Retorno
          example: 999
          schema:
            type: string
      responses:
        '200':
          description: Registro de Retorno encontrado
          content:
            application/json:
              example:
                id: 4
                uid: 019f75f4-585a-70d9-a346-4a6a1fe80380
                occurrence: '03'
                date_of_occurrence: '2014-03-08'
                discharge_id: 4
                bank_billet_id: 89
                occurrence_error: 08
                line_parsed: null
                line_raw: null
                processed_at: null
                occurrence_detail: Comando Recusado
                occurrence_error_detail: Nosso Número Inválido
                our_occurrence: '2001'
                bank_billet_account_id: null
                bank_number: '756'
                created_at: '2026-07-18T12:59:35-03:00'
                updated_at: '2026-07-18T12:59:35-03:00'
                kind: '400'
              schema:
                $ref: '#/components/schemas/v1_bank_billet_discharge_object'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v1_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "read write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v1_error'
        '404':
          description: Registro de retorno não encontrado
          content:
            application/json:
              example:
                status: 404
                errors:
                  - title: Não foi possível encontrar o registro
                    code: not_found
                    detail: 'Este registro não existe, ou foi deletado.'
              schema:
                $ref: '#/components/schemas/v1_error'
