          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: ID do E-mail
          example: 999
          schema:
            type: string
      responses:
        '200':
          description: E-mail encontrado com sucesso
          content:
            application/json:
              example:
