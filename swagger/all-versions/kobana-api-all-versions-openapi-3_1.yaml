          type: integer
          nullable: true
          description: ID do Boleto.
          example: null
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
        date_of_occurrence:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data da ocorrência.
        occurrence:
          type: string
          maxLength: 2
          nullable: true
          description: Código da operação no banco.
        occurrence_detail:
          type: string
          nullable: true
          description: Descrição do evento no Retorno.
        occurrence_error:
          type: string
          nullable: true
          description: Erro no retorno.
        occurrence_error_detail:
          type: string
          nullable: true
          description: Descrição do erro no retorno.
        line_raw:
          type: string
          format: json
          nullable: true
          description: Linha plana com informações vindas do banco.
          example: null
        line_parsed:
          type: string
          format: json
          nullable: true
          description: |-
            Linha parseada com informações vindas do banco:

            Conteúdo do retorno bancário. Pode mudar de acordo com o banco e o formato 240 ou 400. Se algum dos campos estiver em branco é porque o seu banco não disponibiliza essa informação.

            | Valor | Descrição |
            |---|---|
            | paid_at | Data de pagamento |
            | paid_amount | Valor pago |
            | bank_rate | Taxa do boleto paga ao banco |
            | credit_at | Data de crédito |
            | credit_amount | Valor do Crédito |
            | our_number | Nosso número |
            | processed_our_number_raw | Nosso número formatado |
            | discount | Desconto |
            | billet_fine | Acréscimos(Multa/Juros cobrados) |
            | other_fines | Outras cobranças adicionais |
            | other_credit | Outros valores pagos |
            | value_rebate | Outras taxas |
            | error_code | Código de erro |
            | event_type | Ocorrência bancária |
            | agency_number | Agência |
            | account_number | Conta |
            | banco_recebedor | Banco recebedor |
            | agencia_recebedora | Agência recebedora |
            | control_number | Número de Controle |
            | document_number | Número do Documento |
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação do registro
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização do registro
    v1_remittance_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do CNAB
        content:
          type: string
          nullable: true
          description: Conteúdo da remessa
        filename:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do arquivo
        status:
          type: string
          readOnly: true
          description: |-
            Situação do arquivo:
            * `unprocessed` Pendente
            * `processed` Processado
            * `send` Enviada para o banco (Somente quando contratado envio automático)
          enum:
            - unprocessed
            - processed
            - send
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
        created_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de criação.
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização.
        url:
          type: string
          nullable: true
          description: URL do arquivo de remessa.
        created_via_api:
          type: boolean
          nullable: true
          description: Enviado pela API
          example: null
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts).'
          example: null
        remittance_number:
          type: integer
          nullable: true
          description: Número da remessa
          example: null
        sent_via_integration:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de envio automático para o banco.
        bank_billet_ids:
          type: array
          nullable: true
          example: null
          readOnly: true
          description: IDs de boletos.
          items:
            type: integer
        bank_billet_remittances:
          type: array
          nullable: true
          example: null
          description: Registros de Remessa.
          items:
            $ref: '#/components/schemas/v1_bank_billet_remittance_object'
