                beneficiary_address_neighborhood: Centro
                beneficiary_address_state: RJ
                beneficiary_address_zipcode: '20071004'
                bolepix_enabled_at: null
                bolepix:
                  pix_mode: 2
                  pix_account_id: null
                  pix_account:
                    id: 1
                    uid: 019ec80e-8afe-7b2b-a3db-b7d18d3ab200
                    custom_name: 'Bancoob/BB 01  CC: 00003666-8 0229385'
                    validated_at: null
                    enabled_at: '2026-06-15T10:34:16+13:00'
                    financial_provider_slug: bb
                    key: pix_key@email.com
                    status: pending
                    default: false
                    beneficiary:
                      document_number: null
                      name: Kobana Tecnologia Ltda.
                      address:
                        zip_code: '20071004'
