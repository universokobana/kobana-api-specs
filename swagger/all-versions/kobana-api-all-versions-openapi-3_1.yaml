        person:
          type: object
          nullable: true
          readOnly: true
          properties:
            document_number:
              type: string
              nullable: true
              description: Número do Documento.
              example: 05.813.794/0001-26
            name:
              type: string
              nullable: true
              description: Nome Completo ou Razão Social
              example: Kobana Tecnologia Ltda.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data/hora da criação da transação na Kobana
        updated_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora da última atualização da transação na Kobana
        occurrence_date:
          type: string
          format: date
          description: Data de ocorrência da transação.
          example: '2023-12-02'
        description:
          type: string
          nullable: true
          readOnly: true
          description: Descrição da transação.
        document_number:
          type: string
          nullable: true
          readOnly: true
          description: Número do documento da transação.
        kind:
          type: string
          readOnly: true
          description: |
            Tipo da transação

            `credit`: Crédito
            `debit`: Débito
        category:
          type: integer
          readOnly: true
          description: |
            Categoria do Lançamento.
        category_description:
          type: string
          readOnly: true
          description: |
            Descrição da Categoria do Lançamento.
        hashed_content:
          type: string
          readOnly: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
            occurrence_date

        hashed_id:
          type: string
          readOnly: true
          deprecated: true
          description: |+
            Hash Code em MD5 do conteúdo da transação.
            Não é único e pode se repetir.

            Formado por:
            kind,
            description,
            document_number,
            amount,
            occurrence_date

