        birthday:
          type:
            - string
            - 'null'
          format: date
          description: Data de nascimento
          example: '1990-05-20'
        languages:
          type: array
          items:
            type: string
          description: Idiomas preferidos do usuário
          example:
            - pt-BR
            - en
        timezone:
          type:
            - string
            - 'null'
          description: Fuso horário do usuário
          example: America/Sao_Paulo
