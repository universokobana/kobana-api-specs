  '/v1/events/{id}':
    get:
      summary: Informações do Evento
      tags:
        - Eventos
      security:
        - bearerAuth: []
      description: Consulta informações específicas de um Evento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: id
          in: path
          required: true
          description: UID do Evento (UUID)
          example: e596865f-07a4-4458-88c1-fbb4ffd196e1
          schema:
            type: string
      responses:
        '200':
          description: Evento encontrado com sucesso
          content:
            application/json:
              example:
                resource_owner:
                  uid: 019e4dab-5886-7398-a01c-42ee4ed52c99
                  type: bank_billet
