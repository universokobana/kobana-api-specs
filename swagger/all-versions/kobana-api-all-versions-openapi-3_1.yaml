                Bancos que aceitam esse campo (via API): Itaú
            kind:
              type: string
              enum:
                - ted
              description: Tipo da transferência (deve ser "ted")
            ted:
              type: object
              required:
                - data
              description: Dados específicos do TED (dados dentro de data)
              properties:
                data:
                  type: object
                  required:
                    - bank_account
                  description: Payload com os dados reais do TED
                  properties:
                    bank_account:
                      type: object
                      required:
                        - compe_number
                        - agency_number
                        - account_number
                      description: Dados bancários
                      properties:
                        compe_number:
                          type: string
                          description: Código do banco (COMPE)
                          example: '341'
                        ispb_number:
                          type: string
                          nullable: true
                          description: ISPB do banco
                        agency_number:
                          type: string
                          description: Número da agência
                          example: '4321'
                        agency_digit:
                          type: string
                          nullable: true
                          description: Dígito da agência
                          example: '5'
                        account_number:
                          type: string
                          description: Número da conta
                          example: 98765-4
                        account_digit:
                          type: string
                          nullable: true
                          description: Dígito da conta
        - type: object
          description: Payload para criar uma Transferência Interna
          required:
            - financial_account_uid
            - amount
            - kind
            - internal
            - beneficiary
          properties:
            amount:
              type: number
              format: float
              example: 120.99
              description: Quantia
            scheduled_to:
              type: string
              nullable: true
              format: date
              example: '2023-12-12'
              description: Data de Agendamento
            transfer_purpose:
              type: string
              nullable: true
