      description: 'Atualiza atributos editáveis de uma conta de transferência. Aceita `remittance_enabled` (booleano, controla a geração de remessas EDI), `provider_data.service_point_number` (string, ponto de atendimento — por exemplo `numeroPa` em TED Sicoob) e `provider_data.cooperative_cnpj` (string, CNPJ da cooperativa Sicoob). O corpo aceita PATCH parcial: envie apenas os campos que deseja atualizar.'
