    v2_event:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Evento
        uid:
          type: string
          readOnly: true
          description: UID do Evento
        code:
          type: string
          readOnly: true
          example: payment.pix.cancel.confirmed
          description: "Código do evento.\n\n**IMPORTANTE:** Além dos eventos listados abaixo, o sistema gera eventos específicos por tipo de operação:\n\n- Para **pagamentos**, use: `payment.{tipo}.{operação}.{status}`\n  - Tipos: `pix`, `bank_billet`, `darf`, `tax`, `utility`, `gru`\n  - Operações: `register`, `approve`, `reschedule`, `cancel`, `get`, `sync`\n  - Status: `requested`, `confirmed`, `failed`, `error`\n  - Exemplo: `payment.pix.cancel.confirmed`\n\n- Para **transferências**, use: `transfer.{tipo}.{operação}.{status}`\n  - Tipos: `ted`, `pix`, `internal`\n  - Operações: `register`, `reschedule`, `approve`, `cancel`, `get`, `sync`\n  - Status: `requested`, `confirmed`, `failed`, `error`\n  - Exemplo: `transfer.ted.register.confirmed`\n\n- Para **lotes**, use: `payment.{tipo}_batch.*` ou `transfer.{tipo}_batch.*`\n  - Exemplo: `payment.pix_batch.register.confirmed`\n\n**Lista de eventos comuns:**\n* `ping` Ping\n* `access_token.db.created` Token de Acesso criado.\n* `access_token.db.updated` Token de Acesso atualizado.\n* `access_token.db.deleted` Token de Acesso excluído.\n* `access_token.reminder` Lembrete de expiração do Token de Acesso.\n* `access_token.expired` Token de Acesso expirou.\n* `account.updated` Conta atualizada.\n* `account.blocked` Conta bloqueada.\n* `account.bank_billet_creation_blocked` Emissão de boletos bloqueada.\n* `bank_billet.created` Boleto criado.\n* `bank_billet.updated` Boleto atualizado.\n* `bank_billet.generated` PDF do Boleto Gerado ou Atualizado.\n* `bank_billet.canceled` Boleto cancelado.\n* `bank_billet.blocked` Boleto foi bloqueado.\n* `bank_billet.overdue` Boleto ficou vencido.\n* `bank_billet.paid` Boleto foi pago.\n* `bank_billet.due_date` Notifica boleto com 15, 7, 3 e 1 dias antes do vencimento.\n* `bank_billet.rejected` Boleto rejeitado.\n* `bank_billet.cancel.requested` Cancelamento do Boleto solicitado.\n* `bank_billet.cancel.confirmed` Cancelamento do Boleto confirmado.\n* `bank_billet.cancel.failed` Falha n