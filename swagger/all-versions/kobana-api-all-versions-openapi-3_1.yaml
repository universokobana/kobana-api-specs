  /v1/webhook_deliveries:
    get:
      summary: Listar Webhooks Enviados
      tags:
        - Log de Webhooks
      security:
        - bearerAuth: []
      description: |-
        Listar webhooks enviados

        O `ID do Objeto` vai retornar todos e qualquer tipo de objeto que tenha o ID enviado, ou seja, se você enviar 1, poderá retornar boletos, clientes e etc. Caso queira um filtro mais refinado, combine o `ID do Objeto` com o `Código do evento`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
        - name: resource_owner_id
          in: query
          description: ID do objeto.
          required: false
          schema:
            type: integer
        - name: webhook_id
          in: query
          description: ID do Webhook
          required: false
          schema:
            type: integer
        - name: uid
          in: query
          description: UID usado no cabeçalho da requisição
          required: false
          schema:
            type: string
        - name: response_code
          in: query
          description: 'Código HTTP da resposta. [Leia mais](https://en.wikipedia.org/wiki/List_of_HTTP_status_codes)'
          required: false
          schema:
            type: integer
        - name: event_code
          in: query
          description: Código do evento.
