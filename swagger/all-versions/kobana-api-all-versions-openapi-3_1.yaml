                        - paid
                        - canceled
                        - rejected
                        - expired
                      example: paid
                    occurred_at:
                      type: string
                      format: date_time
                      example: '2025-07-02T12:00:00Z'
              rejection:
                type: object
                nullable: true
                properties:
                  code:
                    type: string
                    enum:
                      - ab10
                      - ac05
                      - ac06
                      - ag12
                      - am02
                      - am09
                      - denc
                      - ds27
                      - dted
                      - dtnt
                      - fbrd
                      - irnt
                      - midi
                      - msuc
                      - niec
                      - nipa
                      - nitx
                      - qunt
                      - rc09
                      - udei
                    example: rc09
                  description:
                    type: string
                    example: Erro no roteamento bancário
        received_pix:
          type: array
          nullable: true
          readOnly: true
          description: Lista de pagamentos recebidos (Pix)
          items:
            type: object
            properties:
