        discharge_id:
          type: integer
          nullable: true
          description: ID do Retorno.
          example: null
        bank_billet_id:
          type: integer
          nullable: true
          description: ID do Boleto.
          example: null
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
        date_of_occurrence:
          type: string
          format: date
          nullable: true
          readOnly: true
          description: Data da ocorrência.
        occurrence:
          type: string
          maxLength: 2
          nullable: true
          description: Código da operação no banco.
        occurrence_detail:
          type: string
          nullable: true
          description: Descrição do evento no Retorno.
        occurrence_error:
          type: string
          nullable: true
          description: Erro no retorno.
        occurrence_error_detail:
          type: string
          nullable: true
          description: Descrição do erro no retorno.
        line_raw:
          type: string
          format: json
          nullable: true
          description: Linha plana com informações vindas do banco.
          example: null
        line_parsed:
          type: string
          format: json
          nullable: true
          description: |-
            Linha parseada com informações vindas do banco:

            Conteúdo do retorno bancário. Pode mudar de acordo com o banco e o formato 240 ou 400. Se algum dos campos estiver em branco é porque o seu banco não disponibiliza essa informação.

            | Valor | Descrição |
            |---|---|
            | paid_at | Data de pagamento |
            | paid_amount | Valor pago |
            | bank_rate | Taxa do boleto paga ao banco |
            | credit_at | Data de crédito |
            | credit_amount | Valor do Crédito |
            | our_number | Nosso número |
            | processed_our_number_raw | Nosso número formatado |
            | discount | Desconto |
            | billet_fine | Acréscimos(Multa/Juros cobrados) |
            | other_fines | Outras cobranças adicionais |
            | other_credit | Outros valores pagos |
            | value_rebate | Outras taxas |
            | error_code | Código de erro |
            | event_type | Ocorrência bancária |
            | agency_number | Agência |
            | account_number | Conta |
            | banco_recebedor | Banco recebedor |
            | agencia_recebedora | Agência recebedora |
            | control_number | Número de Controle |
            | document_number | Número do Documento |
    v2_custom_bank_billets_object:
      type: object
      required:
        - expire_at
        - amount_cents
      properties:
        amount_cents:
          type: integer
          maxLength: 15
          description: 'Valor da parcela (R$) com 2 casas decimais. Formato: 134556 corresponde 1.345,56'
        expire_at:
          type: string
          format: date
          description: Data de vencimento
          example: '2023-12-12'
    v2_discharge_send_cnab_object:
      type: object
      properties:
        file:
          type: string
          format: binary
          description: Arquivo
        filename:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do arquivo
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts).'
          example: null
        external_id:
          type: string
          maxLength: 255
          nullable: true
          description: ID externo do CNAB
        custom_data:
          type: object
          nullable: true
          description: Dados customizados
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags para categorização
    v2_remittance_create_cnab_object:
      type: object
      properties:
        bank_billet_account_id:
          type: integer
          nullable: true
          description: 'ID da [Carteira de Cobrança](/reference/post_v1-bank-billet-accounts).'
          example: null
        bank_billet_remittance_ids:
          type: array
          nullable: true
          example: null
          description: 'IDs de [Registros de Remessa](/reference/get_v1-bank-billet-remittances).'
          items:
            type: integer
        external_id:
          type: string
          maxLength: 255
          nullable: true
          description: ID externo do CNAB
        custom_data:
          type: object
          nullable: true
          description: Dados customizados
        tags:
          type: array
          items:
            type: string
          nullable: true
          description: Tags para categorização
    v2_automatic_pix_recurrence_object:
      type: object
      properties:
        uid:
          type: string
          description: UID público da recorrência
          example: 9e45d2e2-90b7-4908-a013-1e5ea23e5a00
          readOnly: true
        charge_automatic_pix_account_uid:
          type: string
          description: UID da conta Pix Automático
          example: df329c26-7b88-4b1d-ae22-4c2df9e04dc2
        financial_account_uid:
          type: string
          description: UID da conta financeira (derivado da conta Pix Automático)
          readOnly: true
          example: b71f1a3e-2b97-43c7-ae4e-21cba47b332b
        pix_uid:
          type: string
          description: 'UID do Pix (opcional). Quando informado junto com location_uid, o QR Code gerado será da jornada instant (Jornada 3) para Pix instantâneo ou offer (Jornada 4) para Pix com vencimento'
          example: 12345678-1234-1234-1234-123456789abc
          nullable: true
        location_uid:
          type: string
          nullable: true
          description: |-
            UID da localização. Quando informado, o QR Code será gerado conforme a jornada:
                              - **recurrent (Jornada 2)**: apenas `location_uid`, sem `pix_uid`;
                              - **instant (Jornada 3)**: `location_uid` + `pix_uid` para Pix instantâneo (Pix deve estar aberto e registrado);
                              - **offer (Jornada 4)**: `location_uid` + `pix_uid` para Pix com vencimento (Pix deve estar aberto e registrado).
          example: a1b2c3d4-e5f6-7890-abcd-ef1234567890
        external_id:
          type: string
          nullable: true
          example: recurrence_123
        custom_data:
          type: object
          nullable: true
        tags:
          type: array
          items:
            type: string
          nullable: true
        tag_list:
          type: string
          nullable: true
          readOnly: true
          description: Tags associadas ao registro
        financial_provider_external_id:
          type: string
          readOnly: true
          nullable: true
        document:
          type: string
          maxLength: 35
          example: '12345678901'
          description: 'Número, identificador, ou código que representa o objeto da autorização (contrato, pedido etc.) e o vínculo usuário recebedor e usuário devedor.'
        description:
          type: string
          maxLength: 35
          example: Cobrança mensal
        debtor:
          type: object
          description: Informações da pessoa devedora
          properties:
            document_type:
              type: string
              enum:
                - CPF
                - CNPJ
              description: Tipo do documento da pessoa
              example: CPF
            document_number:
              type: string
              description: Número do documento da pessoa
              example: '12345678901'
            kind:
              type: string
              enum:
                - natural
                - juridical
              description: 'Tipo de pessoa: física (natural) ou jurídica (juridical)'
              example: natural
            name:
              type: string
              maxLength: 140
              description: Nome completo ou razão social
              example: Maria da Silva
        start_at:
          type: string
          format: date_time
          example: '2024-01-01T00:00:00Z'
        finish_at:
          type: string
          format: date_time
          nullable: true
          example: '2025-01-01T00:00:00Z'
        recurrence_term:
          type: string
          enum:
            - indefinite
            - fixed
          example: fixed
        cycle:
          type: string
          enum:
            - weekly
            - monthly
            - quarterly
            - semiannual
            - annual
          example: monthly
        amount_term:
          type: string
          enum:
            - variable
            - fixed
          example: fixed
        amount:
          type: number
          format: float
          nullable: true
          example: 10000
        minimum_amount:
          type: number
          format: float
          nullable: true
          example: 5000
        agreement_code:
          type: string
          maxLength: 60
          example: '123123'
          description: Número do Convênio de Pagamento.
        retry_policy:
          type: string
          enum:
            - disallow
            - allow_3r7d
          example: allow_3r7d
        journey:
          type: string
          readOnly: true
          enum:
            - request
            - recurrent
            - instant
            - offer
            - awaiting
          example: recurrent
          description: |-
            Tipo de jornada da recorrência:
            * `request` (Jornada 1) Usuário pagador aceitou através de notificação externa
            * `recurrent` (Jornada 2) Usuário aceitou através de QR Code de recorrência
            * `instant` (Jornada 3) Usuário iniciou através de QR Code composto e pagamento imediato (requer pix_uid e location)
            * `offer` (Jornada 4) Usuário aderiu através de QR Code composto com vencimento (requer pix_uid e location)
            * `awaiting` Aguardando definição da jornada
        qrcode:
          type: object
          nullable: true
          readOnly: true
          properties:
            emv:
              type: string
              example: 000201...
            png:
              type: string
              example: 'data:image/png;base64,...'
            journey:
              type: string
              nullable: true
              enum:
                - request
                - recurrent
                - instant
                - offer
                - awaiting
              description: Tipo de jornada associada ao QR Code
              example: recurrent
        requests:
          type: array
          nullable: true
          readOnly: true
          items:
            type: object
            properties:
              expire_at:
                type: string
                format: date_time
                example: '2024-07-30T23:59:59Z'
              recipient:
                type: object
                description: Informações do beneficiário
                properties:
                  kind:
                    type: string
                    enum:
                      - checking
                      - savings
                      - payment
                    description: Tipo de conta
                    example: checking
                  account_number:
                    type: string
                    description: Número da conta
                    example: '12345'
                  agency_number:
                    type: string
                    description: Número da agência
                    example: '0001'
                  bank:
                    type: object
                    properties:
                      number:
                        type: string
                        description: Número do banco
                        example: '001'
                      ispb_number:
                        type: string
                        description: Código ISPB do banco
                        example: '00000000'
                      name:
                        type: string
                        description: Nome do banco
                        example: Banco do Brasil S.A.
                  person_info:
                    type: object
                    properties:
                      document_type:
                        type: string
                        enum:
                          - CPF
                          - CNPJ
                        description: Tipo do documento da pessoa
                        example: CPF
                      document_number:
                        type: string
