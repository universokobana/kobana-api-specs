          description: Código do convênio
          example: '123456'
        service_point_number:
          type: string
          nullable: true
          description: Número do ponto de atendimento
          example: '0001'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        balance_validation_enabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a validação de saldo foi habilitada
        remittance_disabled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora em que a remessa foi desabilitada
        created_at:
          type: string
          format: date-time
          readOnly: true
