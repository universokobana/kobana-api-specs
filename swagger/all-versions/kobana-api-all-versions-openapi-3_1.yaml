    post:
      summary: Criar uma Transferência
      tags:
        - Todos
      security:
        - bearerAuth: []
      description: |
        Endpoint genérico para criação de transferências de qualquer tipo. O tipo é especificado pelo campo obrigatório 'kind' no nível raiz do payload:

        ## Pré-requisitos

        Para emitir uma transferência é necessário ter uma Conta Financeira, informada em `financial_account_uid`. A conta de transferência que registra a operação é definida em `transfer_account_uid`; se omitida, usa-se a mais antiga vinculada à conta financeira; se informada, deve pertencer à `financial_account_uid`.

        ## Tipos Suportados

        ### PIX por Chave
        Especificar `kind: "pix"` e fornecer os dados PIX dentro de `pix.data` (padrão Payment):
        ```json
        {
          "financial_account_uid": "...",
          "amount": 100.0,
          "kind": "pix",
          "pix": {
            "kind": "pix",
            "data": {
              "type": "key",
              "key_type": "email",
              "key": "destinatario@example.com"
            }
          },
          "beneficiary": {
            "name": "João Silva",
            "document": "123.456.789-10"
          }
        }
        ```

        ### PIX por Conta Bancária
        Especificar `kind: "pix"` e fornecer os dados PIX dentro de `pix.data` com `type: "bank_account"`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 200.0,
          "kind": "pix",
          "pix": {
            "kind": "pix",
            "data": {
              "type": "bank_account",
              "bank_account": {
                "bank_code": "237",
                "agency_number": "1234",
                "account_number": "56789-0"
              }
            }
          },
          "beneficiary": {
            "name": "Maria Santos",
            "document": "987.654.321-00"
          }
        }
        ```

        ### TED
        Especificar `kind: "ted"` e fornecer os dados bancários dentro de `ted.data`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 300.0,
          "kind": "ted",
          "ted": {
            "kind": "ted",
            "data": {
              "bank_account": {
                "bank_code": "341",
                "agency_number": "4321",
                "agency_digit": "5",
                "account_number": "98765-4",
                "account_type": "checking"
              }
            }
          },
          "beneficiary": {
            "name": "Pedro Oliveira",
            "document": "11.222.333/0001-44"
          }
        }
        ```

        ### Transferência Interna
        Especificar `kind: "internal"` e fornecer os dados da conta destino dentro de `internal.data`:
        ```json
        {
          "financial_account_uid": "...",
          "amount": 400.0,
          "kind": "internal",
          "internal": {
            "kind": "internal",
            "data": {
              "agency_number": "0001",
              "account_number": "12345-6"
            }
          },
          "beneficiary": {
            "name": "Ana Costa",
            "document": "555.666.777-88"
          }
        }
        ```

        ## Eventos de Webhook

        O evento `transfer.db.created` é disparado nesta operação.

        > **Endpoint Unificado:** Este endpoint unifica a criação de todos os tipos de transferência. Para criar transferências de um tipo específico, você também pode usar os endpoints dedicados em `/api/v2/transfer/{type}`.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
      responses:
        '201':
          description: Transferência Interna criada
          content:
            application/json:
              example:
                status: 201
                data:
                  uid: 019f1bab-96e2-7fe2-9e84-1fd91acbe12e
                  status: pending
                  scheduled_to: null
                  registration_status: pending
                  financial_account_uid: 019f1bab-96c0-7014-ab3a-48dc06d313de
                  transfer_account_uid: 019f1bab-96cb-7920-98de-1b3384254012
                  amount: 400.25
                  target:
                    beneficiary:
                      document_number: 111.444.777-35
                      name: Ana Costa
                    bank_account: null
                    internal:
                      agency_number: '0001'
                      agency_digit: '0'
                      account_number: '12345'
                      account_digit: '6'
                    pix: null
                    transfer_kind: internal
                  kind: internal
                  pix: null
                  ted: null
                  internal:
                    agency_number: '0001'
                    agency_digit: '0'
                    account_number: '12345'
                    account_digit: '6'
                  beneficiary:
                    document_number: 111.444.777-35
                    name: Ana Costa
                  source: null
                  confirmed_at: null
                  rejected_error: null
                  rejected_at: null
                  transaction_code: null
                  transaction_date: null
                  transfer_purpose: null
                  identifier: null
                  external_id: null
                  financial_provider_external_id: null
                  custom_data: null
                  tags: []
                  tag_list: null
                  formats:
                    default:
                      html: null
                      png: null
                      pdf: null
                  created_at: '2026-07-01T05:14:17+02:00'
                  updated_at: '2026-07-01T05:14:17+02:00'
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `201`.'
                  data:
                    $ref: '#/components/schemas/v2_transfer_internal'
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Tipo de transferência não identificado
          content:
            application/json:
              example:
                status: 422
                errors:
                  - title: 'Campo ''kind'' é obrigatório e deve ser um dos valores: pix, ted, internal não pode ficar em branco'
                    code: unprocessable_content
              schema:
                $ref: '#/components/schemas/v2_error'
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/v2_new_generic_transfer'
        required: true
        description: Parâmetros para criação de uma Transferência
