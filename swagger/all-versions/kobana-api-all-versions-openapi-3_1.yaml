    v2_pix_command:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        uid:
          type: string
          format: uuid
          readOnly: true
          description: 'Identificador público (UUID) do Comando. Utilizado como parâmetro na consulta individual (`GET /commands/{uid}`).'
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
            `destroy`: Exclusão do registro.
        resource_type:
          type: string
          readOnly: true
          nullable: true
          description: 'Tipo do recurso ao qual o Comando pertence (ex.: `BankBillet`, `Pix`, `Financial::Account`).'
        resource_uid:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Identificador público (UUID) do recurso ao qual o Comando pertence.
        financial_provider_slug:
          type: string
          readOnly: true
          nullable: true
          description: Slug do provedor financeiro (banco) responsável pela execução do Comando.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        confirmation_via:
          type: string
          enum:
            - api
            - edi
          readOnly: true
          nullable: true
          description: |
            Origem da confirmação do Comando.

            `api`: confirmado via resposta da API do banco (inclui webhooks, Recuperator e sync).
            `edi`: confirmado via retorno CNAB (arquivo de baixa).
            `null`: Sem origem registrada.
        pix:
          $ref: '#/components/schemas/v2_pix'
    v2_pix:
      type: object
      required:
        - amount
        - pix_account_uid
        - expire_at
      properties:
        id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID do Pix (DEPRECATED: use uid)'
          example: 123
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Pix
          examples:
            - 018df180-7208-727b-a10a-ea545e4a75a8
        amount:
          type: number
          minimum: 0.01
          multipleOf: 0.01
          description: Quantia em reais
          examples:
            - 120.99
            - 50
            - 1000.5
        payer:
          type: object
          description: Dados do Pagador
          properties:
            document_number:
              type: string
              nullable: false
              description: Número do Documento (CPF ou CNPJ)
              example: 111.321.322-09
            name:
              type: string
              nullable: false
              description: Nome Completo ou Razão Social
              example: João da Silva
            email:
              type: string
              nullable: true
              description: Email do Pagador
              example: joao@example.com
            address:
              type: object
              description: Endereço do Pagador. Obrigatório para Pix com tipo de registro Cobrança para o banco Sicoob
              properties:
                street:
                  type: string
                  nullable: false
                  description: Rua
                  example: Rua das Flores
                zip_code:
                  type: string
                  nullable: false
                  description: CEP
                  example: 12345-678
                complement:
                  type: string
                  nullable: true
                  description: Complemento
                  example: Casa 2
                number:
                  type: string
                  nullable: false
                  description: Número
                  example: '123'
                neighborhood:
                  type: string
                  nullable: false
                  description: Bairro
                  example: Centro
                city_name:
                  type: string
                  nullable: false
                  description: Nome da Cidade
                  example: São Paulo
                state:
                  type: string
                  nullable: false
                  description: Sigla do Estado
                  example: SP
          required:
            - document_number
            - name
          example:
            document_number: 111.321.322-09
            name: João da Silva
            email: joao@example.com
            address:
              street: Rua das Flores
              zip_code: 12345-678
              complement: Casa 2
              number: '123'
              neighborhood: Centro
              city_name: São Paulo
              state: SP
        status:
          readOnly: true
          type: string
          enum:
            - opened
            - paid
            - overdue
            - canceled
            - generation_failed
          description: |
            Status do Pix.

            * `opened`: Cobrança Pix em aberto (não pago). [Estado Inicial]
            * `paid`: Cobrança Pix paga.
            * `overdue`: Cobrança Pix em atraso.
            * `canceled`: Cobrança Pix cancelada.
            * `generation_failed`: Cobrança Pix criada, mas não foi registrada no banco.
          examples:
            - opened
            - paid
            - canceled
        pix_account_id:
          type: integer
          readOnly: true
          deprecated: true
          description: 'ID da Conta Pix (DEPRECATED: use pix_account_uid)'
          example: 456
        pix_account_uid:
          type: string
          format: uuid
          description: UID da Conta Pix
          example: 018df180-7208-727b-a10a-ea545e4a75a8
        txid:
          anyOf:
            - type: string
              minLength: 1
              maxLength: 35
            - type: 'null'
          description: TXID do Pix - Identificador único da transação
          examples:
            - E12345678202201011200123456789AB
            - null
        expire_at:
          type: string
          format: date-time
          description: Data e hora de vencimento. Formato iso8601
          example: '2023-12-02T10:03:56-03:00'
        canceled_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de cancelamento do Pix
          example: '2023-12-02T10:03:56-03:00'
        registered_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora de registro no provedor
          example: '2023-12-02T10:03:56-03:00'
        paid_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data e hora do pagamento
          example: '2023-12-02T10:03:56-03:00'
        paid_amount:
          type: number
          format: float
          nullable: true
          readOnly: true
          description: Valor efetivamente pago
          example: 120.99
        registration_status:
          type: string
          readOnly: true
          nullable: true
          description: Status do registro no provedor
          enum:
            - pending
            - skipped
            - requested
            - confirmed
            - rejected
            - failed
          example: confirmed
        revoke_days:
          anyOf:
            - type: integer
              minimum: 1
              maximum: 365
            - type: 'null'
          description: Número de dias ativo após o vencimento. OBRIGATÓRIO e deve ser maior que zero quando o Pix possui juros (interest) ou multa (fine) configurados.
          examples:
            - 1
            - 7
            - 30
            - null
        message:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          description: Mensagem de solicitação ao pagador
          examples:
            - Pagamento da fatura 123
            - Cobrança mensal
            - null
        message_payer:
          anyOf:
            - type: string
              maxLength: 140
            - type: 'null'
          readOnly: true
          description: Mensagem para o pagador (campo readOnly)
          examples:
            - Pagamento da fatura 123
            - null
        beneficiary:
          type: object
          readOnly: true
          nullable: true
          description: Dados do beneficiário do Pix
          properties:
            document_number:
              type: string
              description: CPF/CNPJ do beneficiário
              example: '12345678900'
            name:
              type: string
              description: Nome do beneficiário
              example: João Silva
        url:
          type: string
          readOnly: true
          nullable: true
          description: URL para visualização do Pix
          example: 'https://kobana.com.br/p/abc123'
        formats:
          type: object
          readOnly: true
          nullable: true
          description: URLs com formatos disponíveis para o Pix
          properties:
            default:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML padrão
                  example: 'https://kobana.com.br/p/abc123'
                png:
                  type: string
                  description: URL PNG padrão
                  example: 'https://kobana.com.br/p/abc123.png'
                pdf:
                  type: string
                  description: URL PDF padrão
                  example: 'https://kobana.com.br/p/abc123.pdf'
            qrcode:
              type: object
              properties:
                html:
                  type: string
                  description: URL HTML QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode'
                png:
                  type: string
                  description: URL PNG QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.png'
                pdf:
                  type: string
                  description: URL PDF QRCode
                  example: 'https://kobana.com.br/p/abc123/qrcode.pdf'
        additional_info:
          anyOf:
            - type: object
              additionalProperties:
                type: string
                maxLength: 200
              maxProperties: 10
            - type: 'null'
          description: Informações adicionais para o pagador (máximo 10 pares chave-valor)
          examples:
            - Pedido: '12345'
              Cliente: João Silva
            - Referência: FATURA-001
            - null
        qrcode:
          type: object
          description: QR Code do Pix
          readOnly: true
          properties:
            emv:
              anyOf:
                - type: string
                  pattern: '^[0-9A-Za-z\+\/\=\.\:\-\*]+$'
                - type: 'null'
              description: QR Code no formato EMV.
              readOnly: true
              examples:
                - 00020126...
                - null
            png:
              anyOf:
                - type: string
                  contentEncoding: base64
                  contentMediaType: image/png
                - type: 'null'
              description: QR Code no formato PNG em base64.
              readOnly: true
              examples:
                - iVBORw0KGgoAAAANSUhEUgAA...
                - null
        registration_kind:
          type: string
          enum:
            - instant
            - billing
          default: instant
          writeOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        kind:
          type: string
          enum:
            - instant
            - billing
          readOnly: true
          description: |
            Tipo do Pix.

            * `instant`: Imediato (padrão)
            * `billing`: Cobrança
          examples:
            - instant
            - billing
        command_ids:
          type: array
          readOnly: true
          items:
            type: integer
            description: IDs dos registros de Comandos do Pix
        payments:
          type: array
          readOnly: true
          items:
            type: string
            format: uuid
            description: UID do Recebimento
          description: Lista de UIDs dos Recebimentos vinculados ao Pix
          examples:
            - - 018df180-7208-727b-a10a-ea545e4a75a8
            - []
            - - 018df180-7208-727b-a10a-ea545e4a75a8
              - 018df180-8319-8a9c-b21b-fa656f5b86b9
        end_to_end_id:
          anyOf:
            - type: string
              pattern: '^[A-Z]{1}[0-9]{8}[0-9]{4}[0-9]{2}[0-9]{2}[0-9]{4}[0-9a-zA-Z]{11}$'
            - type: 'null'
          readOnly: true
          description: End To End Id do Pix - Identificador único da transferência
          examples:
            - E12345678202301011200123456789AB
            - null
        custom_data:
          anyOf:
            - type: object
              additionalProperties:
                anyOf:
                  - type: string
                  - type: number
                  - type: boolean
                  - type: 'null'
            - type: 'null'
          examples:
            - codigo: '123'
              vip: true
            - referencia: PEDIDO-001
              prioridade: alta
            - null
          description: Hash com chave e valor no formato JSON.
        external_id:
          type: string
          nullable: true
          description: Identificador externo para o Pix
          example: pix_123
        virtual_pix_uid:
          type: string
          readOnly: true
          nullable: true
          description: UID do Pix gerado por membro BackOffice. (BackOffice precisa estar habilitado).
          example: null
        fine_type:
          type: integer
          writeOnly: true
          enum:
            - 0
            - 1
            - 2
          description: |-
            Tipo da multa:
                                * `0` Sem multa (`none`)
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                No retorno os dados vêm no objeto `fine`.
          example: 1
        fine_amount:
          type: number
          format: float
          writeOnly: true
          description: Valor da multa em reais. Obrigatório quando `fine_type` = `amount`.
          example: 50
        fine_percentage:
          type: number
          format: float
          writeOnly: true
          description: Percentual da multa (0.0 a 100.0). Obrigatório quando `fine_type` = `percentage`.
          example: 5
        interest_type:
          type: integer
          writeOnly: true
          enum:
            - 0
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
            - 7
            - 8
          description: |-
            Tipo de juros:
                                * `0` Não se aplica / isento (`none`)
                                * `1` Valor diário — dias corridos (`daily_amount_calendar`)
                                * `2` Percentual diário — dias corridos (`daily_percentage_calendar`)
                                * `3` Percentual mensal — dias corridos (`monthly_percentage_calendar`)
                                * `4` Percentual anual — dias corridos (`yearly_percentage_calendar`)
                                * `5` Valor diário — dias úteis (`daily_amount_business`)
                                * `6` Percentual diário — dias úteis (`daily_percentage_business`)
                                * `7` Percentual mensal — dias úteis (`monthly_percentage_business`)
                                * `8` Percentual anual — dias úteis (`yearly_percentage_business`)
                                No retorno os dados vêm no objeto `interest`.
          example: 2
        interest_amount:
          type: number
          format: float
          writeOnly: true
          description: Valor diário de juros em reais. Obrigatório quando `interest_type` for por valor (`daily_amount_*`).
          example: 2
        interest_percentage:
          type: number
          format: float
          writeOnly: true
          description: Percentual de juros. Obrigatório quando `interest_type` for por percentual.
          example: 2.5
        reduction_type:
          type: integer
          writeOnly: true
          enum:
            - 1
            - 2
            - 3
          description: |-
            Tipo de abatimento:
                                * `1` Por valor (`amount`)
                                * `2` Por percentual (`percentage`)
                                * `3` Não se aplica — remove o abatimento (`none`)
                                No retorno os dados vêm no objeto `reduction`.
          example: 1
        reduction_amount:
          type: number
          format: float
          writeOnly: true
          description: Valor do abatimento em reais. Obrigatório quando `reduction_type` = `amount`.
          example: 25
        reduction_percentage:
          type: number
          format: float
          writeOnly: true
          description: Percentual do abatimento. Obrigatório quando `reduction_type` = `percentage`.
          example: 2.5
        discount_type:
          type: integer
          writeOnly: true
          enum:
            - 1
            - 2
            - 3
            - 4
            - 5
            - 6
