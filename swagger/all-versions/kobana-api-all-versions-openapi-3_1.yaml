        - amount
        - kind
        - paid_at
        - payable
      properties:
        uid:
          type: string
          format: uuid
          readOnly: true
          description: UID do Recebimento.
        amount:
          type: number
          format: float
          description: Valor do Recebimento.
          example: 10.99
        kind:
          type: string
          enum:
            - direct
            - bank_billet
            - pix
          description: Tipo de Recebimento.
          example: bank_billet
        paid_at:
          type: string
          format: date
          description: Data do Recebimento.
        payable:
          type: object
          nullable: true
          description: Recurso associado ao pagamento (Boleto ou Pix).
          properties:
            id:
              type: integer
              readOnly: true
              description: ID do recurso associado ao pagamento.
            uid:
              type: string
              description: UID do recurso associado ao pagamento.
            type:
              type: string
              enum:
                - BankBillet
                - Pix
              description: Tipo do recurso associado ao pagamento.
        debtor:
          type: object
          description: Informações do devedor (sacado) do boleto.
          properties:
            is_payer:
              type: boolean
              nullable: true
              description: Indica se o devedor é quem realizou o pagamento. Preenchido automaticamente via consulta ao banco (D+2 úteis após pagamento). Null quando a consulta ainda não foi realizada ou os dados não estão disponíveis.
            name:
              type: string
              description: Nome do devedor.
            document_number:
              type: string
              description: CPF ou CNPJ do devedor.
        payer:
          type: object
          nullable: true
          readOnly: true
          description: 'Informações de quem efetivamente realizou o pagamento (portador). Preenchido automaticamente via consulta diária ao banco, disponível D+2 dias úteis após o pagamento. Null quando a consulta ainda não foi realizada ou o banco não retornou os dados do pagador.'
          properties:
            name:
              type: string
              description: Nome do pagador.
            document_number:
              type: string
              description: CPF ou CNPJ do pagador.
        bank:
          type: object
          nullable: true
          readOnly: true
          description: Informações bancárias.
          properties:
            rate:
              type: number
              format: float
              description: Taxa bancária.
        receiving:
          type: object
          readOnly: true
          description: Informações de recebimento.
          properties:
            bank:
