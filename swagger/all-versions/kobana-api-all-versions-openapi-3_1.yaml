        - Pix - Pagamento
      security:
        - bearerAuth: []
      description: |-

        > **Processamento Assíncrono:** Este endpoint é processado assincronamente e cria um comando de cancelamento para o Pagamento.
        O cancelamento de um Pagamento é feito assincronamente, ou seja, ao receber a requisição, a nossa API guarda a solicitação e cria um Comando. Esse comando é processado em segundo plano e depois de confirmado, o Pagamento tem seu status alterado para Cancelado. Você recebe na resposta desta requisição o ID do comando criado e pode consultá-lo a qualquer momento.

        ## Eventos de Webhook

        Quando a requisição é realizada, um evento `payment.pix.cancel.requested` é disparado.
        O nosso servidor então começa as tentativas de envio do cancelamento para a instituição financeira.
        Somente depois de confirmado na instituição financeira, aí então o pagamento é marcado como cancelado em nosso banco de dados.
        Neste momento o evento `payment.pix.cancel.confirmed` é disparado.

        > ⚠️ **Atenção ao status Cancelado:** O status de Cancelado é terminal. O pagamento não poderá mais ser processado após o cancelamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: X-Idempotency-Key
          in: header
          required: false
          description: Chave de idempotência para evitar replay de processamento.
          example: 4wE7HVG5rW3R7Xg1
          schema:
            type: string
        - name: uid
          in: path
          description: UUID do Pagamento
          required: true
          example: 018c9160-5c85-725f-b56e-4af36f2564be
          schema:
            type: string
      responses:
        '200':
          description: Pagamento cancelado sem interação com provedor
          content:
            application/json:
              example:
                status: 200
                data:
                  id: 105
                  status: pending
                  operation: cancel
                  params: null
                  payload: null
                  created_at: '2026-06-25T09:31:38+13:00'
                  updated_at: '2026-06-25T09:31:38+13:00'
                  message: null
                  error_message: null
                  warning_message: null
                  payment:
                    uid: 019efb54-c958-7306-9245-f5817c422904
                    kind: pix
                    amount: 100
                    scheduled_to: null
                    status: pending
                    registration_status: confirmed
                    financial_account_uid: 019efb54-c934-7a43-b47a-1e6807656b0b
                    payment_account_uid: 019efb54-c932-79ce-9461-dc13d2507439
                    batch_uid: null
                    confirmed_at: null
                    rejected_error: null
                    rejected_at: null
                    transaction_code: null
                    transaction_date: null
                    source: view
                    identifier: null
                    external_id: null
                    financial_provider_external_id: null
                    beneficiary:
                      name: Margret Santos LTDA
                      document_number: 34.414.342/0000-99
                    custom_data: null
                    tags: []
                    tag_list: null
                    formats:
                      default:
                        html: null
                        png: null
                        pdf: null
                    created_at: '2026-06-25T09:31:38+13:00'
                    updated_at: '2026-06-25T09:31:38+13:00'
                    pix:
                      qrcode: 00020126330014br.gov.bcb.pix01111335366962052040000530398654040
                      beneficiary:
                        name: Margret Santos LTDA
                        document_number: 34.414.342/0000-99
                message: Pagamento cancelado com sucesso sem interação com provedor.
              schema:
                type: object
                properties:
                  status:
                    type: integer
                    description: 'Status HTTP. Ex: `200`.'
                  data:
                    $ref: '#/components/schemas/v2_payment_command'
                  message:
                    type: string
                    description: Mensagem de sucesso
        '401':
          description: Falha de autenticação. Token inválido
          content:
            application/json:
              example:
                status: 401
                errors:
                  - title: 'Token de API inválido (Servidor: development)'
                    code: unauthorized
                    detail: 'O Token de API é diferente para cada Servidor/URL, mais em https://developers.kobana.com.br/reference/token-de-acesso'
              schema:
                $ref: '#/components/schemas/v2_error'
        '403':
          description: Falha de permissão. Você não tem o Scope obrigatório para essa chamada.
          content:
            application/json:
              example:
                status: 403
                errors:
                  - title: 'Para acessar esse recurso você precisa de pelo menos um destes escopos: "write".'
                    code: forbidden
              schema:
                $ref: '#/components/schemas/v2_error'
        '422':
          description: Pagamento já foi confirmado ou rejeitado
          content:
            application/json:
              example:
                status: 422
                errors:
                  - code: unprocessable_content
                    title: Não foi possível gerar Comando de Cancelamento de Pagamento.
                    detail: Pagamento já foi confirmado ou rejeitado.
              schema:
                $ref: '#/components/schemas/v2_error'
  /v2/payment/tax_batches:
    post:
      summary: Criar Lote de Pagamentos de Tributo
      tags:
        - Tributo (beta)
      security:
        - bearerAuth: []
      description: |
        Esse endpoint é utilizado para a geração de um lote de pagamento de tributos municipais, estaduais e federais.

        > ⚠️ **Novidade em Desenvolvimento!** Esta API está em versão beta - isso significa que estamos constantemente melhorando e ajustando suas funcionalidades. Embora seja totalmente funcional, algumas coisas podem mudar conforme recebemos feedback dos desenvolvedores.
        >
        > Para dúvidas sobre esta funcionalidade, entre em contato conosco.

        ## Pré-requisito

        Para emitir um lote de pagamento é necessário ter uma Conta Financeira, informada em `financial_account_uid`. A conta de pagamento aplicada ao lote é definida em `payment_account_uid`; se omitida, usa-se a mais antiga vinculada à conta financeira; se informada, deve pertencer à `financial_account_uid`.

        ## Eventos de Webhook

        O evento `payment.batch.db.created` é disparado nesta operação.

        Ao cadastrar um Lote de Pagamento, o sistema cria um comando para registrá-lo na instituição financeira. Após o registro do lote ser confirmado na instituição, o evento `payment.tax_batch.confirmed` é disparado.

        O evento `payment.db.created` também é disparado nesta operação caso o lote contenha um novo pagamento.
      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
