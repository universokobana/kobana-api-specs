                  format: float
                  nullable: true
                  description: Valor do primeiro desconto
                  example: 10
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do primeiro desconto
                  example: 5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o primeiro desconto
                  example: 5
            discount_second:
              type: object
              nullable: true
              description: Segundo desconto
              properties:
                amount:
                  type: number
                  format: float
                  nullable: true
                  description: Valor do segundo desconto
                  example: 5
                percentage:
                  type: number
                  format: float
                  nullable: true
                  description: Percentual do segundo desconto
                  example: 2.5
                days:
                  type: integer
                  nullable: true
                  description: Dias para o segundo desconto
