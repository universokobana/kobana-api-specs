          description: Tags associadas ao registro
        created_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T09:00:00Z'
        updated_at:
          type: string
          format: date_time
          readOnly: true
          example: '2025-07-01T12:00:00Z'
    v2_automatic_pix_pix_command_object:
      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID do Comando.
        uid:
          type: string
          format: uuid
          readOnly: true
          description: 'Identificador público (UUID) do Comando. Utilizado como parâmetro na consulta individual (`GET /commands/{uid}`).'
        status:
          type: string
          readOnly: true
          description: |
            Status do comando.

            `pending`: Comando ainda não executado. [Estado inicial]
            `confirmed`: Comando executado e confirmado.
            `failed`: Execução do comando falhou.
        operation:
          type: string
          readOnly: true
          description: |
            Tipo da operação.

            `update`: Alteração de dados.
            `cancel`: Cancelamento.
        resource_type:
          type: string
          readOnly: true
          nullable: true
          description: 'Tipo do recurso ao qual o Comando pertence (ex.: `BankBillet`, `Pix`, `Financial::Account`).'
        resource_uid:
          type: string
          format: uuid
          readOnly: true
          nullable: true
          description: Identificador público (UUID) do recurso ao qual o Comando pertence.
        financial_provider_slug:
          type: string
          readOnly: true
          nullable: true
          description: Slug do provedor financeiro (banco) responsável pela execução do Comando.
        params:
          type: object
          readOnly: true
          nullable: true
          description: Parâmetros para a execução do Comando.
        payload:
          type: object
          readOnly: true
          nullable: true
          description: Resposta do servidor com o resultado da operação.
        created_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da criação do registro do Comando
        updated_at:
          type: string
          format: date-time
          readOnly: true
          description: Data da atualização do registro do Comando.
        confirmation_via:
          type: string
          enum:
            - api
            - edi
          readOnly: true
          nullable: true
          description: |
            Origem da confirmação do Comando.

            `api`: confirmado via resposta da API do banco (inclui webhooks, Recuperator e sync).
            `edi`: confirmado via retorno CNAB (arquivo de baixa).
            `null`: Sem origem registrada.
        pix:
          $ref: '#/components/schemas/v2_automatic_pix_pix_object'
    v2_automatic_pix_location_object:
