      type: object
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da Conta Pix
        uid:
          type: string
          readOnly: true
          description: UID da Conta Cix
        custom_name:
          type: string
          description: Nome personalizado para a conta pix
          example: Conta Pix Kobana
        key:
          type: string
          description: Chave pix da conta
          example: '+55999999999'
        financial_provider_slug:
          type: string
          description: Instituição financeira da conta pix
          example: bradesco
        enabled:
          type: boolean
          description: Indica se a conta pix está habilitada
          example: true
        default:
          type: boolean
          description: Indica se a conta pix é a padrão
          example: false
        beneficiary:
          type: object
          description: Beneficiário da conta pix
          properties:
            name:
              type: string
              description: Nome do beneficiário
            document:
              type: string
              description: Documento do beneficiário (CNPJ ou CPF)
              example: '12345678901'
            address:
              type: object
              description: Endereço do beneficiário
              properties:
                street:
                  type: string
                  description: Rua do beneficiário
                  example: Rua do Beneficiário
                number:
                  type: string
                  description: Número da rua do beneficiário
                  example: '123'
                complement:
                  type: string
                  description: Complemento do endereço do beneficiário
                  example: Apto 101
                neighborhood:
                  type: string
                  description: Bairro do beneficiário
                  example: Bairro do Beneficiário
                city_name:
                  type: string
                  description: Cidade do beneficiário
                  example: Cidade do Beneficiário
                state:
                  type: string
                  description: Estado do beneficiário
                  example: SP
                zip_code:
                  type: string
                  description: CEP do beneficiário (formato 99999999)
                  example: '01310100'
