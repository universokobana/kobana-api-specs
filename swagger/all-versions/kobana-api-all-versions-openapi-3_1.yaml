      parameters:
        - name: User-Agent
          in: header
          required: false
          description: Informar um e-mail válido para contatos.
          example: Kevin Mitnick <kmitnick@kobana.com.br>
          schema:
            type: string
        - name: page
          in: query
          description: Número da Página
          required: false
          schema:
            type: integer
        - name: per_page
          in: query
          description: Quantidade de registros por página
          required: false
          schema:
            type: integer
            default: 50
            maximum: 50
        - name: resource_owner_id
          in: query
          description: ID do objeto.
          required: false
          schema:
            type: integer
        - name: webhook_id
          in: query
          description: ID do Webhook
          required: false
