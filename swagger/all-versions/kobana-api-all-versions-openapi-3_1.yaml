          example: '123456'
        external_id:
          type: string
          nullable: true
          description: Identificador externo da conta de pagamento
          example: external-payment-123
        remittance_enabled:
          type: boolean
          nullable: true
          description: Habilita ou desabilita a geração de remessas EDI para esta conta.
        provider_data:
