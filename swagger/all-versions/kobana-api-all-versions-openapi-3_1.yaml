          type: string
          nullable: true
          description: Conteúdo da remessa
        filename:
          type: string
          maxLength: 255
          nullable: true
          description: Nome do arquivo
        status:
          type: string
          readOnly: true
          description: |-
            Situação do arquivo:
            * `unprocessed` Pendente
            * `processed` Processado
            * `send` Enviada para o banco (Somente quando contratado envio automático)
          enum:
            - unprocessed
            - processed
            - send
        processed_at:
          type: string
          format: date-time
          nullable: true
          readOnly: true
          description: Data de Processamento.
