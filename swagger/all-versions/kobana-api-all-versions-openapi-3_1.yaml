    v2_customer_subscription:
      type: object
      required:
        - amount
        - customer_person_name
        - customer_cnpj_cpf
        - customer_zipcode
        - customer_address
        - customer_neighborhood
        - customer_city_name
        - customer_state
        - bank_billet_account_id
      properties:
        id:
          type: integer
          readOnly: true
          description: ID da assinatura
        customer_id:
          type: integer
          nullable: true
          description: 'ID do Cliente. Quando esse ID é passado, os campos `customer_person_name`, `customer_cnpj_cpf`, `customer_zipcode`, `customer_address`, `customer_city_name`, `customer_state` e `customer_neighborhood` não são obrigatórios.'
          example: null
        customer_person_name:
          type: string
          maxLength: 120
          description: Nome do cliente
          example: João Silva
        customer_nickname:
          type: string
          nullable: true
          maxLength: 255
          description: Apelido ou Nome Fantasia do Pagador
          example: null
        customer_cnpj_cpf:
          type: string
          maxLength: 20
          description: CPF/CNPJ do cliente
          example: 16.974.923/0001-84
        customer_zipcode:
          type: string
          maxLength: 8
          description: CEP (formato 99999999)
          example: '01310100'
        customer_email:
          type: string
          nullable: true
          format: email
          maxLength: 80
          description: E-mail do Pagador
          example: null
        customer_email_cc:
          type: string
          nullable: true
          format: email
          maxLength: 80
          description: E-mail alternativo do Pagador
          example: null
        customer_address:
          type: string
          maxLength: 255
          description: Endereço
          example: 'Rua F, alamenda G'
        customer_city_name:
          type: string
          maxLength: 60
          description: Cidade(Nome deve estar correto e completo)
          example: São Paulo
        customer_state:
          type: string
          maxLength: 2
          description: Estado
          example: SP
        customer_neighborhood:
          type: string
          maxLength: 80
          description: Bairro
          example: Centro
        customer_address_number:
          type: string
          maxLength: 10
          description: Número
          example: null
        customer_address_complement:
          type: string
          nullable: true
          maxLength: 120
          description: Complemento
          example: null
        customer_phone_number:
          type: string
          nullable: true
          maxLength: 11
          description: Telefone (com DDD)
          example: null
        customer_person_type:
          type: string
          readOnly: true
          nullable: true
          maxLength: 10
          description: |-
            Tipo de Pagador.
            * `individual` Pessoa Física
            * `juridical` Pessoa Jurídica
          enum:
            - individual
            - juridical
        customer_mobile_local_code:
          type: string
          nullable: true
          maxLength: 2
          description: DDD do Celular
          example: null
        customer_mobile_number:
          type: string
          nullable: true
          maxLength: 9
          description: Celular
          example: null
        customer_notes:
          type: string
          nullable: true
          description: Observações do Pagador
          example: null
        customer_ignore_email:
          type: boolean
          nullable: true
          description: Nunca enviar e-mail para este cliente
          example: null
        customer_ignore_sms:
          type: boolean
          nullable: true
          description: Nunca enviar SMS para este cliente
          example: null
        customer_contact_person:
          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        customer_update:
          type: string
          nullable: true
          maxLength: 120
          description: Contato
          example: null
        bank_billet_account_id:
          type: integer
          description: 'ID da Carteira de Cobrança. Se não informado, usará a carteira padrão.'
          example: null
        amount:
          type: number
          format: float
          description: Valor da Assinatura (R$)
          example: 10.99
        cycle:
          type: string
          readOnly: true
          nullable: true
          maxLength: 20
          description: |-
            Ciclo da assinatura. Default: monthly

            * `biweekly` Quinzenal
            * `bimonthly` Bimestral
            * `monthly` Mensal
            * `quarterly` Trimestral
            * `semiannual` Semestral
            * `annual` Anual
          enum:
            - biweekly
            - bimonthly
            - monthly
            - quarterly
            - semiannual
            - annual
        next_billing:
          type: string
          format: date
          description: 'Data da Primeira ou Próxima cobrança. Caso não seja enviado uma data, esse campo será calculado para ter o valor do dia da criação da assinatura mais o ciclo escolhido. Ex.: Mensal(Hoje + 30 dias)'
          example: '2022-12-12'
        end_at:
          type: string
          format: date
          nullable: true
          description: 'Data em que deseja parar as cobranças. Caso em branco, as cobranças serão geradas automaticamente até que se informe uma data ou se exclua a assinatura.'
          example: '2023-12-12'
        description:
          type: string
          nullable: true
          description: Descrição do produto ou serviço
          example: null
        instructions:
          type: string
          nullable: true
          description: Instruções para o Caixa
          example: null
        days_in_advance:
          type: integer
          description: 'Com quantos dias de antecedência à data de vencimento a cobrança será gerada. Default: 7.'
          example: 10
        fine_type:
          type: integer
          nullable: true
          description: |-
            Tipo de multa:
            * `0` Inexistente (Padrão)
            * `1` Para percentual do valor do boleto
            * `2` Para valor fixo
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_fine:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a multa começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        fine_percentage:
          type: number
          format: float
          nullable: true
          description: 'Porcentagem de Multa por Atraso Ex: 2% x R$ 250,00 = R$ 5,00. Obrigatória se fine_type é igual a 1'
          example: null
        fine_value:
          type: number
          format: float
          nullable: true
          description: Valor da multa (R$). Obrigatório se fine_type é igual a 2.
          example: null
        interest_type:
          type: integer
          nullable: true
          description: |-
            Tipo de juros/mora:
            * `0` Inexistente (Padrão)
            * `1` Para porcentagem diária
            * `2` Para valor diário
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_interest:
          type: integer
          nullable: true
          description: Quantidade de dias após o vencimento que a mora começará a incidir. O valor default é 1 dia (o dia posterior ao vencimento).
          example: null
        interest_percentage:
          type: number
          format: float
          nullable: true
          description: Porcentagem diária de juros. De 0.0 a 100.0 (Ex 1.5% = 1.5) Obrigatório se interest_type é igual a 1.
          example: null
        interest_value:
          type: number
          format: float
          nullable: true
          description: Valor diário de juros (R$). Obrigatório se interest_type é igual a 2.
          example: null
        discount_type:
          type: integer
          nullable: true
          description: |-
            Tipo de desconto:

            O tipo de desconto será o mesmo para todos os três descontos, caso existam. :
            * `0` Inexistente (Padrão)
            * `1` Para valor fixo
            * `2` Para percentual do valor do boleto
          enum:
            - 0
            - 1
            - 2
          default: 0
        days_for_discount:
          type: integer
          nullable: true
          description: Dias para desconto. Obrigatório se discount_type é diferente de 0(zero)
          example: null
        discount_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do valor do boleto equivalente ao desconto. Obrigatório se discount_type é igual a 2
          example: null
        discount_value:
          type: number
          format: float
          nullable: true
          description: Valor do desconto (R$). Obrigatório se discount_type é igual a 1.
          example: null
        days_for_second_discount:
          type: integer
          nullable: true
          description: Dias para segundo desconto.
          example: null
        second_discount_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do valor do boleto equivalente ao segundo desconto.
          example: null
        second_discount_value:
          type: number
          format: float
          nullable: true
          description: Valor do segundo desconto (R$).
          example: null
        days_for_third_discount:
          type: integer
          nullable: true
          description: Dias para terceiro desconto.
          example: null
        third_discount_percentage:
          type: number
          format: float
          nullable: true
          description: Percentual do valor do boleto equivalente ao terceiro desconto.
          example: null
        third_discount_value:
          type: number
          format: float
          nullable: true
          description: Valor do terceiro desconto (R$).
          example: null
        bank_billet_layout_id:
          type: integer
          nullable: true
          description: ID do Modelo de Boleto
          example: null
        notes:
          type: string
          nullable: true
          example: null
          description: Observações
        tags:
          type: array
          nullable: true
          description: Tags associadas ao boleto
          example: null
          items:
            type: string
        bank_billet_ids:
          type: array
          nullable: true
          readOnly: true
          description: IDs de boletos vinculados ao carnê
          example: null
          items:
            type: integer
        prevent_registration:
          type: boolean
          nullable: true
          example: null
          description: |-
            Impedir envio de registro ao banco:
            Caso `true`, impede que o boleto seja registrado. Para ser usado nos casos em que o boleto já foi registrado fora da KOBANA mas deseja-se incluí-lo no sistema.
        divergent_payment_type:
          type: integer
          nullable: true
          example: null
          description: |-
            Tipo de pagamento divergente:

            Válido apenas para Itaú e Caixa.
            * `1` Aceita qualquer valor divergente
            * `2` Aceita pagamentos dentro de uma faixa de valores ou percentuais
            * `3` Não aceita pagamento de valores divergentes
            * `4` Aceita pagamentos de valores superiores a um valor ou percentual mínimo
          enum:
            - null
            - 1
            - 2
            - 3
            - 4
        divergent_payment_value_type:
          type: integer
          nullable: true
          example: null
          description: |-
            Tipo de valor a considerar para os limites de pagamentos:

            Válido apenas para Itaú e Caixa.
            * `1` Informa pagamentos divergentes por valores
            * `2` Informa pagamentos divergentes por percentuais
          enum:
            - null
            - 1
            - 2
        divergent_payment_maximum_value:
          type: number
          format: float
          example: null
          nullable: true
          description: 'Valor máximo para a faixa de pagamentos divergentes. '
        divergent_payment_minimum_value:
          type: number
          format: float
          example: null
          nullable: true
          description: 'Valor mínimo para a faixa de pagamentos divergentes. '
        divergent_payment_maximum_percentage:
          type: number
          format: float
          example: null
          nullable: true
          description: 'Percentual máximo para a faixa de pagamentos divergentes. '
        divergent_payment_minimum_percentage:
          type: number
          format: float
          example: null
          nullable: true
          description: Percentual mínimo para a faixa de pagamentos divergentes.
        divergent_payment_limit:
          type: integer
          nullable: true
          example: null
          description: Quantidade de pagamentos permitida. Obrigatório se informados dados para pagamento divergente. Usado somente pela Caixa.
        custom_attachment_name:
          type: string
          nullable: true
          example: null
          description: 'Nome para ser usado nos arquivos de boleto enviados para o cliente em notificações. Aceita uso de variáveis. Caso seja deixado vazio, o padrão é a palavra “boleto” acompanhada do ID.'
        guarantor_name:
          type: string
          nullable: true
          maxLength: 100
          description: Nome do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_cnpj_cpf:
          type: string
          nullable: true
          maxLength: 20
          description: CNPJ/CPF do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_address_number:
          type: string
          nullable: true
          maxLength: 10
          description: Número do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_neighborhood:
          type: string
          nullable: true
          maxLength: 80
          description: Bairro do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_phone_number:
          type: string
          nullable: true
          maxLength: 11
          description: Telefone (com DDD) do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_city_name:
          type: string
          nullable: true
          maxLength: 60
          description: Cidade(Nome deve estar correto e completo) do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_state:
          type: string
          nullable: true
          maxLength: 2
          description: Estado do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_zipcode:
          type: string
          nullable: true
          maxLength: 8
          description: CEP (formato 99999999) do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_address:
          type: string
          nullable: true
          maxLength: 255
          description: Endereço do Beneficiário final (Sacador/Avalista)
          example: null
        guarantor_address_complement:
          type: string
          nullable: true
          maxLength: 60
          description: Complemento do Beneficiário final (Sacador/Avalista)
          example: null
        days_for_revoke:
          type: integer
          nullable: true
          description: |-
            Dias corridos para Baixa/Devolução:

                              Nulo/Branco: Obedece ao padrão do banco.
                              0: Baixa/Devolução no mesmo dia do vencimento.
                              1 ou mais: Baixa/Devolução após o vencimento(Vencimento + X dias corridos).
                              
          example: null
        days_for_negativation:
          type: integer
          nullable: true
          maximum: 99
          example: null
          description: "Dias corridos para Negativação:\n\nDisponível apenas para os seguintes bancos e formatos.\n\n* Banco |\tCNAB 240|\tCNAB 400 |Webservice\n* Bradesco |\tSim |\tSim\t| Não\n* Itaú | Não | Sim | Não\n                "
        days_for_sue:
          type: integer
          nullable: true
          description: Dias corridos para Protesto
          example: null
        payment_count:
          type: integer
          nullable: true
          description: Quantidade de pagamentos parciais aceitos para este boleto.
        import_id:
          type: integer
          nullable: true
          readOnly: true
          description: ID da Importação
        ignore_whatsapp:
          type: boolean
          default: false
          nullable: true
          description: Nunca enviar esta asinatura por WhatsApp
          example: null
