                  properties:
                    kind:
                      type: string
                      enum:
                        - gru
                      description: Tipo do Tributo - apenas GRU aceita formato data
                    format:
                      type: string
                      enum:
                        - data
                      description: Formato do payload - campos estruturados
                    data:
                      type: object
                      required:
                        - total_amount
                        - expire_at
                      description: Campos estruturados do GRU
                      properties:
                        reference_number:
